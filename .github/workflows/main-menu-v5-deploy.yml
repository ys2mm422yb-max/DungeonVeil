name: Main Menu V5 Single Base Deploy

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/main-menu-v5-deploy.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-main-menu-v5-single-base
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
      - id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - run: pnpm run typecheck
      - name: Build Pages application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.commit.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build
      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages
      - name: Write deployment marker
        run: |
          printf '{"commit":"%s","deployedAt":"%s","source":"main-menu-run-ranger-v5-single-base"}\n' "${{ steps.commit.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public
      - uses: actions/deploy-pages@v4

  capture-proof:
    needs: build-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright and Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Capture fixed live link
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.build-deploy.outputs.sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            curl -fsSL "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?verify=${GITHUB_RUN_ID}-${attempt}" -o live-marker.json || true
            if python3 - <<'PY'
          import json, os
          from pathlib import Path
          try:
              data = json.loads(Path('live-marker.json').read_text())
              assert data.get('source') == 'main-menu-run-ranger-v5-single-base'
              assert data.get('commit') == os.environ['EXPECTED_COMMIT']
          except Exception:
              raise SystemExit(1)
          PY
            then break; fi
            sleep 5
          done
          cat > capture-live-v5.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({ viewport: { width: 393, height: 852 }, deviceScaleFactor: 3, isMobile: true, hasTouch: true, userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.5 Mobile/15E148 Safari/604.1' });
          await context.addInitScript(() => localStorage.setItem('dungeon-veil-language', 'de'));
          const page = await context.newPage();
          const errors = [], failed = [], responses = [];
          page.on('pageerror', error => errors.push(String(error?.stack || error)));
          page.on('requestfailed', request => failed.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
          page.on('response', response => { if (/DungeonVeil|assets\/kaykit/i.test(response.url())) responses.push({ url: response.url(), status: response.status() }); });
          await page.goto('https://ys2mm422yb-max.github.io/DungeonVeil/', { waitUntil: 'domcontentloaded', timeout: 60000 });
          await page.waitForTimeout(25000);
          await page.screenshot({ path: 'main-menu-v5-live.png', fullPage: true });
          const state = await page.evaluate(() => ({ canvases: document.querySelectorAll('canvas').length, bodyText: document.body.innerText.slice(0, 1500), resources: performance.getEntriesByType('resource').map(entry => entry.name).filter(name => /Ranger|quiver|Rig_Medium|bow|DungeonVeil/i.test(name)) }));
          const proof = {
            runId: process.env.GITHUB_RUN_ID,
            commit: process.env.EXPECTED_COMMIT,
            state,
            errors,
            failed,
            responses,
            duplicateBase: state.resources.filter(url => url.includes('/DungeonVeil/DungeonVeil/')),
            rangerLoads: state.resources.filter(url => /Characters\/gltf\/Ranger\.glb(?:$|\?)/.test(url)),
            quiverLoads: state.resources.filter(url => /Assets\/gltf\/quiver\.gltf(?:$|\?)/.test(url)),
            animationLoads: state.resources.filter(url => /Rig_Medium_(?:General|MovementBasic|MovementAdvanced)\.glb(?:$|\?)/.test(url)),
            badResponses: responses.filter(item => item.status >= 400),
            localFailures: failed.filter(item => item.url.includes('/DungeonVeil/')),
          };
          await writeFile('main-menu-v5-live.json', JSON.stringify(proof, null, 2));
          await browser.close();
          EOF
          EXPECTED_COMMIT="$EXPECTED_COMMIT" node capture-live-v5.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: main-menu-v5-live-proof
          path: |
            main-menu-v5-live.png
            main-menu-v5-live.json
            live-marker.json
          if-no-files-found: error
      - name: Publish proof pointer to branch
        run: |
          mkdir -p .diagnostics
          cp main-menu-v5-live.json .diagnostics/main-menu-v5-live.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .diagnostics/main-menu-v5-live.json
          git commit -m 'Publish Main Menu V5 live proof metadata'
          git push origin HEAD:fix/main-menu-equipped-ranger
