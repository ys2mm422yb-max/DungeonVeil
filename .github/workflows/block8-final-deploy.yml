name: Block 8 Final Device Review Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-block-8-final-device-review
  cancel-in-progress: true

jobs:
  validate-and-build:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'integration/block-8-final-device-review'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Resolve deployment commit
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Full Blocks 1-8 audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build GitHub Pages application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.commit.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s","source":"block-8-final-integration"}\n' "${{ steps.commit.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'integration/block-8-final-device-review'
    needs: validate-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-and-clean:
    if: github.event_name == 'pull_request' && github.head_ref == 'integration/block-8-final-device-review'
    needs: [validate-and-build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration/block-8-final-device-review
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify fixed live link and self-clean
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.validate-and-build.outputs.sha }}
        run: |
          set -euo pipefail
          verified=0
          for attempt in $(seq 1 24); do
            if curl -fsSL --retry 2 --retry-delay 2 "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?verify=${GITHUB_RUN_ID}-${attempt}" -o live-response.json; then
              if python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path('live-response.json').read_text())
          assert data.get('source') == 'block-8-final-integration', data
          assert data.get('commit') == os.environ['EXPECTED_COMMIT'], data
          PY
              then
                verified=1
                break
              fi
            fi
            sleep 5
          done
          test "$verified" = 1
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          live = json.loads(Path('live-response.json').read_text())
          result = {
              'checkedAt': datetime.now(timezone.utc).isoformat(),
              'expectedCommit': os.environ['EXPECTED_COMMIT'],
              'expectedSource': 'block-8-final-integration',
              'live': live,
              'verified': True,
          }
          Path('block8-live-verification.json').write_text(json.dumps(result, ensure_ascii=False, indent=2) + '\n')
          PY
          rm -f live-response.json .github/workflows/block8-final-deploy.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record verified Block 8 deployment and self-clean'
          git push origin HEAD:integration/block-8-final-device-review
