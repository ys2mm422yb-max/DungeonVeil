name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

# Explicitly approved integration of PR #40. The preparation job joins both histories
# and then adopts the already validated product snapshot without force-pushing main.
jobs:
  prepare-integration:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete main history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create exact product integration branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main work/blocks-1-7-production-pass
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B integration/dungeon-veil-main origin/main
          git merge -s ours --no-ff origin/work/blocks-1-7-production-pass -m "Merge Dungeon Veil production history"
          git read-tree --reset -u origin/work/blocks-1-7-production-pass
          git add -A
          git commit -m "Adopt validated Dungeon Veil product snapshot"
          git push --force-with-lease origin HEAD:integration/dungeon-veil-main

  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg build
