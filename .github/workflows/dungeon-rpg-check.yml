name: Dungeon RPG Check

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.github/workflows/dungeon-veil-pages.yml'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-unified-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      validated_sha: ${{ steps.validated.outputs.sha }}
    steps:
      - name: Checkout current Dungeon Veil test branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass

      - name: Resolve validated commit
        id: validated
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build Dungeon Veil for GitHub Pages
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify runtime asset base
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = 'artifacts/dungeon-rpg/dist/public';
          const extensions = new Set(['.js', '.mjs', '.html']);
          const files = [];
          const walk = directory => {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const full = path.join(directory, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (extensions.has(path.extname(entry.name))) files.push(full);
            }
          };
          walk(root);
          if (!files.length) throw new Error('No built runtime files found.');
          const prefixes = ['"/assets/', "'/assets/", '`/assets/'];
          const bad = [];
          for (const file of files) {
            const text = fs.readFileSync(file, 'utf8');
            for (const prefix of prefixes) {
              if (text.includes(prefix)) bad.push(`${file}: ${prefix}`);
            }
          }
          if (bad.length) throw new Error(`Root-relative runtime asset paths found:\n${bad.join('\n')}`);
          const js = files
            .filter(file => /\.(?:m?js)$/.test(file))
            .map(file => fs.readFileSync(file, 'utf8'))
            .join('\n');
          if (!js.includes('/DungeonVeil/assets/')) {
            throw new Error('Pages-prefixed asset paths are missing from the built JavaScript.');
          }
          if (!fs.existsSync(path.join(root, 'index.html'))) {
            throw new Error('Built index.html is missing.');
          }
          console.log(`Verified ${files.length} runtime files and the /DungeonVeil/ asset base.`);
          NODE

      - name: Write deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "${{ steps.validated.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json

      - name: Disable Jekyll processing
        run: touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  record:
    if: always()
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    steps:
      - name: Record unified validation and deployment result
        uses: actions/github-script@v7
        env:
          VALIDATED_SHA: ${{ needs.validate.outputs.validated_sha }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = 'main';
            const commit = process.env.VALIDATED_SHA || null;
            const validationSuccess = process.env.VALIDATE_RESULT === 'success';
            const deploymentSuccess = process.env.DEPLOY_RESULT === 'success';
            const completedAt = new Date().toISOString();

            async function write(path, data, message) {
              let sha;
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref });
                if (!Array.isArray(response.data)) sha = response.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              const content = Buffer.from(JSON.stringify(data, null, 2) + '\n').toString('base64');
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch: ref, sha, content, message,
              });
            }

            await write('.ci/dungeon-rpg-check.json', {
              workflow: 'Dungeon RPG Check',
              status: validationSuccess ? 'success' : 'failure',
              validatedCommit: commit,
              completedAt,
            }, `Record Dungeon RPG Check ${validationSuccess ? 'success' : 'failure'} for ${(commit || 'unknown').slice(0, 7)}`);

            await write('.ci/dungeon-rpg-ci.json', {
              workflow: 'Dungeon RPG CI',
              status: validationSuccess ? 'success' : 'failure',
              validatedCommit: commit,
              checks: ['asset audit', '50-room collision audit', 'workspace typecheck', 'Pages production build', 'runtime asset base'],
              completedAt,
            }, `Record Dungeon RPG CI ${validationSuccess ? 'success' : 'failure'} for ${(commit || 'unknown').slice(0, 7)}`);

            await write('.ci/dungeon-veil-pages.json', {
              workflow: 'Deploy Dungeon Veil Test Site',
              status: deploymentSuccess ? 'success' : 'failure',
              attemptedCommit: commit,
              deployedCommit: deploymentSuccess ? commit : null,
              pageUrl: process.env.PAGE_URL || 'https://ys2mm422yb-max.github.io/DungeonVeil/',
              completedAt,
            }, `Record Dungeon Veil Pages ${deploymentSuccess ? 'success' : 'failure'} for ${(commit || 'unknown').slice(0, 7)}`);
