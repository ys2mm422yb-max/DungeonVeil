name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-block-4:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/block-4-portal-priority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/block-4-portal-priority
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply portal-priority patch and self-clean
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main fix/block-1-email-confirmation-redirect
          git checkout origin/fix/block-1-email-confirmation-redirect -- artifacts/dungeon-rpg/src/game/runEngine.ts artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs
          python3 - <<'PY'
          from pathlib import Path
          engine = Path('artifacts/dungeon-rpg/src/game/runEngine.ts')
          text = engine.read_text()
          text = text.replace("  private enemyWindups = new Map<string, EnemyWindup>();", "  private enemyWindups = new Map<string, EnemyWindup>();\n  private exitCenterCache: { map: DungeonMap; x: number; y: number } | null = null;")
          marker = "  canExitRoom(): boolean {\n    return this.state.status === 'playing' && this.state.enemies.length === 0 && this.state.roomClearReady;\n  }\n\n  private updateRoomFlow(time: number): void {\n"
          replacement = "  canExitRoom(): boolean {\n    return this.state.status === 'playing' && this.state.enemies.length === 0 && this.state.roomClearReady;\n  }\n\n  private getRoomExitCenter(): { x: number; y: number } | null {\n    if (this.exitCenterCache?.map === this.state.map) return this.exitCenterCache;\n    for (let tileY = 0; tileY < this.state.map.height; tileY++) {\n      for (let tileX = 0; tileX < this.state.map.width; tileX++) {\n        if (this.state.map.tiles[tileY]?.[tileX] !== TileType.STAIRS_DOWN) continue;\n        this.exitCenterCache = { map: this.state.map, x: tileX * TILE_SIZE + TILE_SIZE / 2, y: tileY * TILE_SIZE + TILE_SIZE / 2 };\n        return this.exitCenterCache;\n      }\n    }\n    this.exitCenterCache = null;\n    return null;\n  }\n\n  private playerWithinOpenExit(radius = TILE_SIZE * 1.05): boolean {\n    if (!this.canExitRoom()) return false;\n    const exit = this.getRoomExitCenter();\n    if (!exit) return false;\n    const playerX = this.state.player.x + this.state.player.width / 2;\n    const playerY = this.state.player.y + this.state.player.height / 2;\n    return Math.hypot(playerX - exit.x, playerY - exit.y) <= radius;\n  }\n\n  private updateRoomFlow(time: number): void {\n"
          if marker not in text: raise SystemExit('canExitRoom marker missing')
          text = text.replace(marker, replacement)
          old = "    const p = this.state.player;\n    const tx = Math.floor((p.x + 16) / TILE_SIZE);\n    const ty = Math.floor((p.y + 16) / TILE_SIZE);\n    if (this.state.map.tiles[ty]?.[tx] !== TileType.STAIRS_DOWN) return;\n    if (!this.canExitRoom()) {\n      this.state.exitHintCount = living + (deathPending ? 1 : 0);\n      this.state.exitHintUntil = time + 850;\n      return;\n    }\n    this.nextRoom();\n"
          new = "    const p = this.state.player;\n    const exit = this.getRoomExitCenter();\n    if (!exit) return;\n    const playerX = p.x + p.width / 2;\n    const playerY = p.y + p.height / 2;\n    if (Math.hypot(playerX - exit.x, playerY - exit.y) > TILE_SIZE * 0.92) return;\n    if (!this.canExitRoom()) {\n      this.state.exitHintCount = living + (deathPending ? 1 : 0);\n      this.state.exitHintUntil = time + 850;\n      return;\n    }\n    this.nextRoom();\n"
          if old not in text: raise SystemExit('portal flow marker missing')
          text = text.replace(old, new)
          old = "  private blockedByRoomProp(entity: { x: number; y: number; width: number; height: number }) {\n    return !this.ignoreRoomPropCollisions && collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, entity.x, entity.y, entity.width, entity.height);\n  }\n"
          new = "  private blockedByRoomProp(entity: { x: number; y: number; width: number; height: number }) {\n    if (entity === this.state.player && this.playerWithinOpenExit(TILE_SIZE * 1.35)) return false;\n    return !this.ignoreRoomPropCollisions && collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, entity.x, entity.y, entity.width, entity.height);\n  }\n"
          if old not in text: raise SystemExit('prop marker missing')
          engine.write_text(text.replace(old, new))
          audit = Path('artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs')
          text = audit.read_text().replace("  const chapter = await server.ssrLoadModule('/src/game/chapterRun.ts');", "  const chapter = await server.ssrLoadModule('/src/game/chapterRun.ts');\n  const runEngineSource = await import('node:fs/promises').then(fs => fs.readFile(new URL('../src/game/runEngine.ts', import.meta.url), 'utf8'));")
          text = text.replace("  note('Rooms 1–20 retain their authored identities and known mobile fixes.');", "  if (!runEngineSource.includes('getRoomExitCenter') || !runEngineSource.includes('TILE_SIZE * 0.92') || !runEngineSource.includes('playerWithinOpenExit')) fail(0, 'portal priority regression');\n  if (/canExitRoom\\(\\)[\\s\\S]{0,240}state\\.items/.test(runEngineSource)) fail(0, 'optional loot blocks room exit');\n  note('Rooms 1–20 retain their authored identities and known mobile fixes.');")
          audit.write_text(text)
          PY
          git checkout origin/main -- .github/workflows/dungeon-rpg-check.yml
          rm -f .github/workflows/build-block-4-portal-priority.yml .ci/block4-trigger.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Give cleared-room portals interaction priority'
          git push origin HEAD:fix/block-4-portal-priority

  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg build
