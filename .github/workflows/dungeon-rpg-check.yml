name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace quietly
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Capture production room diagnostic
        run: |
          set +e
          node artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs > production-room.log 2>&1
          echo $? > production-room.status
          set -e
      - name: Upload production room diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: production-room-diagnostic
          path: |
            production-room.log
            production-room.status
          if-no-files-found: error
          retention-days: 1
      - name: Fail after production room diagnostic
        run: test "$(cat production-room.status)" = "0"
