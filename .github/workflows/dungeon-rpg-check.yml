name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: All rooms audit
        run: node artifacts/dungeon-rpg/scripts/validate-all-rooms.mjs
      - name: Production rooms audit
        run: node artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs
      - name: Spawn hitboxes audit
        run: node artifacts/dungeon-rpg/scripts/validate-spawn-hitboxes.mjs
      - name: Enemy visibility audit
        run: node artifacts/dungeon-rpg/scripts/validate-enemy-visibility.mjs
      - name: Mobile combat audit
        run: node artifacts/dungeon-rpg/scripts/validate-mobile-combat.mjs
      - name: World boss audit
        run: node artifacts/dungeon-rpg/scripts/validate-worldboss-performance.mjs
      - name: Social navigation audit
        run: node artifacts/dungeon-rpg/scripts/validate-social-navigation.mjs
      - name: Social progression audit
        run: node artifacts/dungeon-rpg/scripts/validate-social-progression.mjs
      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg build
