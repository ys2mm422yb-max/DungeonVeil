name: Dungeon RPG Check

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-profile-economy-live
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: balance/equipment-upgrade-gold-costs
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate final source
        run: |
          node artifacts/dungeon-rpg/scripts/validate-profile-badge-compact.mjs
          node artifacts/dungeon-rpg/scripts/validate-upgrade-economy.mjs
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:social
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm run typecheck
      - name: Build correct GitHub Pages root
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
          commit=$(git rev-parse HEAD)
          printf '{"source":"profile-badge-upgrade-economy-v1","commit":"%s"}\n' "$commit" > artifacts/dungeon-rpg/dist/public/deployment.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dungeon-rpg/dist/public
      - name: Deploy fixed test link
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify actual live page and marker
        run: |
          for attempt in $(seq 1 18); do
            status=$(curl -L -s -o /tmp/index.html -w '%{http_code}' "https://ys2mm422yb-max.github.io/DungeonVeil/?attempt=${attempt}" || true)
            marker=$(curl -fsSL "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?attempt=${attempt}" || true)
            if [ "$status" = "200" ] && grep -q '<div id="root"></div>' /tmp/index.html && echo "$marker" | grep -q 'profile-badge-upgrade-economy-v1'; then
              exit 0
            fi
            sleep 10
          done
          exit 1
      - name: Restore normal workflow
        run: |
          git checkout 6426422964ac8e6c10461fe17d78d815e8c69e14 -- .github/workflows/dungeon-rpg-check.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/dungeon-rpg-check.yml
          git commit -m 'Remove temporary profile economy deployment workflow'
          git push origin HEAD:balance/equipment-upgrade-gold-costs
