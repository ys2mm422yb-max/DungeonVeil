name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

# Verification also runs directly on the production-pass branch when the PR has conflicts.
# Final device-review validation covers natural status effects, skill HUD and lightweight projectiles.
jobs:
  apply-main-menu-v14-polish:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/main-menu-equipped-ranger'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply approved V14 patch and self-clean
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          python3 - <<'EXTRACT'
          from pathlib import Path
          source = Path('.github/workflows/main-menu-v14-polish.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply-main-menu-v14.py').write_text(script)
          EXTRACT
          python3 -c "from pathlib import Path; import base64; p=Path('/tmp/apply-main-menu-v14.py'); s=p.read_text(); a=s.index('replace_once(showcase, \"  let shrineHidden = false;\\\\n\", \"\")'); b=s.index(\"\\n\\naudit = Path('artifacts/dungeon-rpg/scripts/validate-main-menu-equipped-ranger.mjs')\", a); r=base64.b64decode('').decode(); p.write_text(s[:a]+r+s[b:])"
          python3 /tmp/apply-main-menu-v14.py
          rm -f .ci/main-menu-v14-apply.log
          git checkout origin/main -- .github/workflows/dungeon-rpg-check.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Polish the main-menu player focus and village composition'
          git push origin HEAD:fix/main-menu-equipped-ranger

  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg build
