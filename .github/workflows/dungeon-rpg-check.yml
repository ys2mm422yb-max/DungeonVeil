name: Dungeon RPG Check

on:
  push:
    branches: [fix/darkwood-mage-range-balance]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.ci/apply-darkwood-mage-range-balance.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.ci/apply-darkwood-mage-range-balance.py'

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/darkwood-mage-range-balance
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply focused ranged-enemy fix
        run: python3 .ci/apply-darkwood-mage-range-balance.py
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Focused darkwood mage audit
        run: node artifacts/dungeon-rpg/scripts/validate-darkwood-mage-balance.mjs
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Social and menu audit
        run: pnpm --filter @workspace/dungeon-rpg audit:social
      - name: Room and combat audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck
        run: pnpm run typecheck
      - name: Pages production build
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
      - name: Commit clean validated result
        run: |
          git checkout b2bc5b30fd76836674dfcbc8aea012d13bb2152d -- .github/workflows/dungeon-rpg-check.yml
          rm -f .ci/apply-darkwood-mage-range-balance.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Balance darkwood mage attacks and clarify Schnellzug'
          git push origin HEAD:fix/darkwood-mage-range-balance
