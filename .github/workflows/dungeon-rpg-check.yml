name: Dungeon RPG Check

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.ci/apply-menu-copy-relic-progression.py'

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/menu-copy-relic-progression
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply focused follow-up changes
        run: python3 .ci/apply-menu-copy-relic-progression.py
      - run: pnpm install --frozen-lockfile
      - name: Validate complete project
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:social
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm run typecheck
          pnpm --dir artifacts/dungeon-rpg run build
      - name: Commit clean validated changes
        shell: bash
        run: |
          git checkout 5f9ff270c9e8b34b14679b0634e7099451056e74 -- .github/workflows/dungeon-rpg-check.yml
          rm -f .ci/apply-menu-copy-relic-progression.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Clarify progression, relics and online routes'
          git push origin HEAD:fix/menu-copy-relic-progression
