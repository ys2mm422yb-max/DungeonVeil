name: Dungeon RPG Check

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Apply staged device review fixes
        if: github.event_name == 'pull_request' && github.head_ref == 'work/blocks-1-7-production-pass'
        run: |
          if [[ -f artifacts/dungeon-rpg/scripts/apply-device-review-fixes.mjs ]]; then
            node artifacts/dungeon-rpg/scripts/apply-device-review-fixes.mjs
          else
            echo "No staged device-review patch present."
          fi
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg build
      - name: Commit verified device review fixes
        if: github.event_name == 'pull_request' && github.head_ref == 'work/blocks-1-7-production-pass'
        run: |
          if [[ ! -f artifacts/dungeon-rpg/scripts/apply-device-review-fixes.mjs ]]; then
            echo "Nothing staged for commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f artifacts/dungeon-rpg/scripts/apply-device-review-fixes.mjs
          git rm -f .github/workflows/apply-device-review-fixes.yml || true
          git add -A
          git diff --cached --check
          git commit -m "Fix room 6 architecture and crossbow previews"
          git push origin HEAD:work/blocks-1-7-production-pass
