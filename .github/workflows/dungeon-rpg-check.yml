name: Dungeon RPG Check

on:
  push:
    branches: [balance/equipment-upgrade-gold-costs]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: balance/equipment-upgrade-gold-costs
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply upgrade economy patch
        run: python3 .ci/apply-upgrade-economy.py
      - run: pnpm install --frozen-lockfile
      - name: Validate combined profile and economy build
        run: |
          node artifacts/dungeon-rpg/scripts/validate-profile-badge-compact.mjs
          node artifacts/dungeon-rpg/scripts/validate-upgrade-economy.mjs
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:social
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm run typecheck
          pnpm --filter @workspace/dungeon-rpg build
      - name: Restore normal workflow and commit clean result
        run: |
          git checkout 5d5c8ba801818682adb89e5f53dc5bc14e1d24f8 -- .github/workflows/dungeon-rpg-check.yml
          rm -f .ci/apply-upgrade-economy.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Raise permanent equipment upgrade gold costs'
          git push origin HEAD:balance/equipment-upgrade-gold-costs
