name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-block-5:
    if: github.event_name == 'pull_request' && github.head_ref == 'rework/block-5-rooms-4-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rework/block-5-rooms-4-5
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply room rework and self-clean
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main fix/block-1-email-confirmation-redirect
          git checkout origin/fix/block-1-email-confirmation-redirect -- artifacts/dungeon-rpg/src/game/logicalRoomSetpieces.ts artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs
          python3 .ci/block5_patch.py
          git checkout origin/main -- .github/workflows/dungeon-rpg-check.yml
          rm -f .github/workflows/build-block-5-rooms-4-5.yml .ci/block5-trigger.txt .ci/block5_patch.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Recompose rooms four and five around clear themed stations'
          git push origin HEAD:rework/block-5-rooms-4-5

  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg build
