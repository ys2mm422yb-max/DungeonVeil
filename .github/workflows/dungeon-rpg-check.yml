name: Dungeon RPG Check

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-pages-root-repair
  cancel-in-progress: false

jobs:
  repair-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/menu-copy-relic-progression
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate and build
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:social
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm run typecheck
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
          test -d artifacts/dungeon-rpg/dist/public/assets
          printf '{"source":"pages-root-repair-v1","commit":"%s"}\n' "$(git rev-parse HEAD)" > artifacts/dungeon-rpg/dist/public/deployment.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dungeon-rpg/dist/public
      - name: Deploy corrected Pages root
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live index and marker
        run: |
          for attempt in $(seq 1 24); do
            status=$(curl -L -s -o /tmp/index.html -w '%{http_code}' "https://ys2mm422yb-max.github.io/DungeonVeil/?attempt=${attempt}" || true)
            marker=$(curl -fsSL "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?attempt=${attempt}" || true)
            echo "attempt=$attempt status=$status marker=$marker"
            if [ "$status" = "200" ] && grep -qi '<div id="root"' /tmp/index.html && echo "$marker" | grep -q 'pages-root-repair-v1'; then
              exit 0
            fi
            sleep 10
          done
          exit 1
      - name: Restore normal workflow
        shell: bash
        run: |
          git checkout 52c6333ba969e378e55163d93ec5c59e7c56906f -- .github/workflows/dungeon-rpg-check.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/dungeon-rpg-check.yml
          git commit -m 'Remove temporary Pages root repair workflow'
          git push origin HEAD:fix/menu-copy-relic-progression
