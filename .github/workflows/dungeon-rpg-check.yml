name: Dungeon RPG Check

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dungeon-rpg-check.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-menu-copy-relic-live
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/menu-copy-relic-progression
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate deployed source
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:social
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm run typecheck
      - name: Build GitHub Pages artifact
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          commit=$(git rev-parse HEAD)
          printf '{"source":"menu-copy-relic-progression-v1","commit":"%s"}\n' "$commit" > artifacts/dungeon-rpg/dist/deployment.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dungeon-rpg/dist
      - name: Deploy fixed test link
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live marker
        run: |
          for attempt in $(seq 1 18); do
            marker=$(curl -fsSL "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?attempt=${attempt}" || true)
            echo "$marker"
            if echo "$marker" | grep -q 'menu-copy-relic-progression-v1'; then
              exit 0
            fi
            sleep 10
          done
          exit 1
      - name: Remove temporary deployment workflow
        shell: bash
        run: |
          git checkout c2817fece19a84b4b312cacac3406d986de72c54 -- .github/workflows/dungeon-rpg-check.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/dungeon-rpg-check.yml
          git commit -m 'Remove temporary progression deployment workflow'
          git push origin HEAD:fix/menu-copy-relic-progression
