name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Upload room audit failure marker
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: room-audit-failure-marker
          if-no-files-found: warn
          retention-days: 1
          path: /tmp/dungeon-veil-room-audit-failure.txt
      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg build
