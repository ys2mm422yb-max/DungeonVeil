name: Dungeon RPG Check

on:
  push:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
  pull_request:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.ci/validation-trigger.txt'
  workflow_dispatch:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace quietly
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Capture focused room suite diagnostic
        run: |
          set +e
          cd artifacts/dungeon-rpg
          node scripts/run-room-audit-suite.mjs > ../../room-suite.log 2>&1
          echo $? > ../../room-suite.status
          set -e
      - name: Upload focused room suite diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: room-suite-diagnostic
          path: |
            room-suite.log
            room-suite.status
          if-no-files-found: error
          retention-days: 1
      - name: Fail after focused room suite diagnostic
        run: test "$(cat room-suite.status)" = "0"
