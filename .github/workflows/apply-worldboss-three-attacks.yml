name: Apply world boss three-attack kit

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/apply-worldboss-three-attacks.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'rework/worldboss-three-attack-kit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rework/worldboss-three-attack-kit
          fetch-depth: 0
      - name: Adopt validated boss base and apply three attacks
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin 6de0a59c03b515d99fae196e1709e5a9f7b620f4
          git checkout 6de0a59c03b515d99fae196e1709e5a9f7b620f4 -- \
            artifacts/dungeon-rpg/scripts/validate-mobile-combat.mjs \
            artifacts/dungeon-rpg/scripts/validate-social-navigation.mjs \
            artifacts/dungeon-rpg/scripts/validate-worldboss-performance.mjs \
            artifacts/dungeon-rpg/src/components/WorldBossBattleScreen.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossCohesiveStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossCombatBandStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx \
            artifacts/dungeon-rpg/src/components/worldBossMobileVisual3D.ts \
            artifacts/dungeon-rpg/src/game/runEngine.ts

          cat > artifacts/dungeon-rpg/src/components/WorldBossAggressiveStage.tsx <<'EOF'
          import React, { useCallback, useEffect, useRef } from 'react';
          import type { GameEngine } from '../game/runEngine';
          import { WorldBossPerspectiveStage } from './WorldBossPerspectiveStage';

          type Props = {
            engineRef: React.RefObject<GameEngine | null>;
            onReady: () => void;
          };

          type AttackKind = 'breath' | 'claw' | 'slam';
          type PendingAttack = {
            kind: AttackKind;
            serial: number;
            releaseAt: number;
            angle: number;
            targetX: number;
            targetY: number;
          };
          type ActiveBreath = {
            id: string;
            originX: number;
            originY: number;
            angle: number;
            maxRadius: number;
          };

          const RELEASE_DELAY_MS = 320;
          const PURSUIT_SPEED = 82;
          const ATTACK_READY_WINDOW_MS = 720;
          const ATTACK_GAP_MS = 980;
          const BREATH_WINDUP_MS = 760;
          const BREATH_TRAVEL_MS = 820;
          const BREATH_COOLDOWN_MS = 3100;
          const BREATH_MIN_DISTANCE = 210;
          const BREATH_MAX_DISTANCE = 840;
          const BREATH_HIT_RADIUS = 76;
          const CLAW_WINDUP_MS = 420;
          const CLAW_RANGE = 158;
          const CLAW_ARC_DOT = 0.12;
          const SLAM_WINDUP_MS = 620;
          const SLAM_RANGE = 205;

          export function WorldBossAggressiveStage({ engineRef, onReady }: Props) {
            const releasedAtRef = useRef(0);
            const frameRef = useRef(0);
            const nextAttackAtRef = useRef(0);
            const serialRef = useRef(0);
            const pendingRef = useRef<PendingAttack | null>(null);
            const activeBreathRef = useRef<ActiveBreath | null>(null);
            const lastAttackRef = useRef<AttackKind>('slam');

            const handleReady = useCallback(() => {
              const now = performance.now();
              releasedAtRef.current = now + RELEASE_DELAY_MS;
              nextAttackAtRef.current = now + 1350;
              onReady();
            }, [onReady]);

            useEffect(() => {
              let disposed = false;

              const applyHit = (engine: GameEngine, boss: any, now: number, multiplier: number, id: string, color: string, scale: number) => {
                const player = engine.state.player;
                if (now < player.invincibleUntil) return;
                const damage = Math.max(8, Math.round(boss.attack * multiplier - player.defense * 0.42));
                player.hp = Math.max(0, player.hp - damage);
                player.invincibleUntil = now + 720;
                player.lastHitTime = now;
                engine.state.damageNumbers.push({
                  id: `${id}-${Math.round(now)}`,
                  x: player.x,
                  y: player.y - 10,
                  value: `-${damage}`,
                  color,
                  lifeTime: 0,
                  maxLifeTime: 820,
                  scale,
                });
              };

              const startAttack = (engine: GameEngine, boss: any, now: number, distance: number, angle: number, playerX: number, playerY: number) => {
                if (pendingRef.current || activeBreathRef.current || now < nextAttackAtRef.current) return;
                let kind: AttackKind;
                if (distance >= BREATH_MIN_DISTANCE && distance <= BREATH_MAX_DISTANCE && lastAttackRef.current !== 'breath') kind = 'breath';
                else kind = lastAttackRef.current === 'claw' ? 'slam' : 'claw';

                const serial = ++serialRef.current;
                const windup = kind === 'breath' ? BREATH_WINDUP_MS : kind === 'claw' ? CLAW_WINDUP_MS : SLAM_WINDUP_MS;
                pendingRef.current = { kind, serial, releaseAt: now + windup, angle, targetX: playerX, targetY: playerY };
                boss.state = 'attack';
                boss.vx = 0;
                boss.vy = 0;
                const radius = kind === 'breath' ? 118 : kind === 'claw' ? CLAW_RANGE : SLAM_RANGE;
                const color = kind === 'breath' ? '#ff7a24' : kind === 'claw' ? '#ffb04a' : '#e44825';
                engine.state.effects.push({
                  id: `boss-${kind}-telegraph-${serial}`,
                  x: kind === 'breath' ? playerX : boss.x + boss.width / 2,
                  y: kind === 'breath' ? playerY : boss.y + boss.height / 2,
                  radius: 10,
                  maxRadius: radius,
                  color,
                  lifeTime: 0,
                  maxLifeTime: windup,
                  type: 'circle',
                  element: 'fire',
                  fromEnemyId: boss.id,
                });
              };

              const releaseAttack = (engine: GameEngine, boss: any, now: number, pending: PendingAttack, bossX: number, bossY: number, playerX: number, playerY: number) => {
                const dx = playerX - bossX;
                const dy = playerY - bossY;
                const distance = Math.max(1, Math.hypot(dx, dy));
                if (pending.kind === 'breath') {
                  const maxRadius = Math.max(320, Math.min(940, Math.hypot(pending.targetX - bossX, pending.targetY - bossY) + 220));
                  const id = `boss-shot-breath-${pending.serial}`;
                  engine.state.effects.push({
                    id,
                    x: bossX,
                    y: bossY,
                    radius: 46,
                    maxRadius,
                    color: '#ff6a1f',
                    lifeTime: 0,
                    maxLifeTime: BREATH_TRAVEL_MS,
                    type: 'beam',
                    angle: pending.angle,
                    width: 122,
                    element: 'fire',
                    fromEnemyId: boss.id,
                  });
                  activeBreathRef.current = { id, originX: bossX, originY: bossY, angle: pending.angle, maxRadius };
                  nextAttackAtRef.current = now + BREATH_COOLDOWN_MS;
                } else if (pending.kind === 'claw') {
                  const facingX = Math.cos(pending.angle);
                  const facingY = Math.sin(pending.angle);
                  const dot = (dx / distance) * facingX + (dy / distance) * facingY;
                  engine.state.effects.push({
                    id: `boss-claw-impact-${pending.serial}`,
                    x: bossX + facingX * 76,
                    y: bossY + facingY * 76,
                    radius: 24,
                    maxRadius: 148,
                    color: '#ffb04a',
                    lifeTime: 0,
                    maxLifeTime: 280,
                    type: 'circle',
                    element: 'fire',
                    fromEnemyId: boss.id,
                  });
                  if (distance <= CLAW_RANGE && dot >= CLAW_ARC_DOT) applyHit(engine, boss, now, 1.08, 'hit-claw', '#ffb04a', 1.34);
                  nextAttackAtRef.current = now + ATTACK_GAP_MS;
                } else {
                  engine.state.effects.push({
                    id: `boss-slam-impact-${pending.serial}`,
                    x: bossX,
                    y: bossY,
                    radius: 35,
                    maxRadius: SLAM_RANGE,
                    color: '#e44825',
                    lifeTime: 0,
                    maxLifeTime: 360,
                    type: 'circle',
                    element: 'fire',
                    fromEnemyId: boss.id,
                  });
                  if (distance <= SLAM_RANGE) applyHit(engine, boss, now, 0.82, 'hit-slam', '#e44825', 1.42);
                  nextAttackAtRef.current = now + 1420;
                }
                lastAttackRef.current = pending.kind;
                boss.lastAttackTime = now;
                boss.state = 'chase';
                pendingRef.current = null;
              };

              const enforceBossPressure = (now: number) => {
                if (disposed) return;
                const engine = engineRef.current;
                const boss = engine?.state.enemies.find(enemy => enemy.enemyType === 'boss' && enemy.hp > 0);

                if (engine && boss && releasedAtRef.current > 0 && now >= releasedAtRef.current) {
                  boss.speed = Math.max(boss.speed, PURSUIT_SPEED);
                  const player = engine.state.player;
                  const bossCenterX = boss.x + boss.width / 2;
                  const bossCenterY = boss.y + boss.height / 2;
                  const playerCenterX = player.x + player.width / 2;
                  const playerCenterY = player.y + player.height / 2;
                  const dx = playerCenterX - bossCenterX;
                  const dy = playerCenterY - bossCenterY;
                  const distance = Math.hypot(dx, dy);
                  const angle = Math.atan2(dy, dx);

                  if (distance > 112 && boss.state !== 'attack') boss.state = 'chase';
                  if (boss.nextAttackTime > now + ATTACK_READY_WINDOW_MS) boss.nextAttackTime = now + ATTACK_READY_WINDOW_MS;
                  startAttack(engine, boss, now, distance, angle, playerCenterX, playerCenterY);

                  const pending = pendingRef.current;
                  if (pending && now >= pending.releaseAt) releaseAttack(engine, boss, now, pending, bossCenterX, bossCenterY, playerCenterX, playerCenterY);

                  const active = activeBreathRef.current;
                  if (active) {
                    const effect = engine.state.effects.find(item => item.id === active.id);
                    if (!effect) activeBreathRef.current = null;
                    else {
                      const progress = Math.max(0, Math.min(1, effect.lifeTime / Math.max(1, effect.maxLifeTime)));
                      const projectileX = active.originX + Math.cos(active.angle) * active.maxRadius * progress;
                      const projectileY = active.originY + Math.sin(active.angle) * active.maxRadius * progress;
                      if (now >= player.invincibleUntil && Math.hypot(projectileX - playerCenterX, projectileY - playerCenterY) <= BREATH_HIT_RADIUS) {
                        applyHit(engine, boss, now, 0.96, 'hit-breath', '#ff6a2b', 1.38);
                        effect.lifeTime = effect.maxLifeTime;
                        activeBreathRef.current = null;
                      }
                    }
                  }
                }

                frameRef.current = requestAnimationFrame(enforceBossPressure);
              };

              frameRef.current = requestAnimationFrame(enforceBossPressure);
              return () => {
                disposed = true;
                cancelAnimationFrame(frameRef.current);
                pendingRef.current = null;
                activeBreathRef.current = null;
              };
            }, [engineRef]);

            return <WorldBossPerspectiveStage engineRef={engineRef} onReady={handleReady} />;
          }
          EOF

          python - <<'PY'
          from pathlib import Path
          path = Path('artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx')
          text = path.read_text()
          text = text.replace(
              "type ProjectileSlot = { mesh: any; material: any; fireCore: any; fireGlow: any; fireMaterial: any; glowMaterial: any };",
              "type ProjectileSlot = { mesh: any; material: any; fireCore: any; fireGlow: any; fireMaterial: any; glowMaterial: any; breath: any; breathMaterial: any };"
          )
          text = text.replace(
              "const fireGlowGeometry = keepGeometry(new THREE.SphereGeometry(0.72, 14, 10));",
              "const fireGlowGeometry = keepGeometry(new THREE.SphereGeometry(0.72, 14, 10));\n      const breathGeometry = keepGeometry(new THREE.ConeGeometry(0.58, 3.2, IS_ANDROID ? 8 : 12, 1, true));"
          )
          text = text.replace(
              "const fireGlow = new THREE.Mesh(fireGlowGeometry, glowMaterial);\n        mesh.visible = false;",
              "const fireGlow = new THREE.Mesh(fireGlowGeometry, glowMaterial);\n        const breathMaterial = keepMaterial(new THREE.MeshBasicMaterial({ color: 0xff7b24, transparent: true, opacity: 0.82, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide }));\n        const breath = new THREE.Mesh(breathGeometry, breathMaterial);\n        mesh.visible = false;"
          )
          text = text.replace(
              "fireGlow.visible = false;\n        scene.add(mesh, fireGlow, fireCore);\n        projectileSlots.push({ mesh, material, fireCore, fireGlow, fireMaterial, glowMaterial });",
              "fireGlow.visible = false;\n        breath.visible = false;\n        scene.add(mesh, fireGlow, fireCore, breath);\n        projectileSlots.push({ mesh, material, fireCore, fireGlow, fireMaterial, glowMaterial, breath, breathMaterial });"
          )
          text = text.replace(
              "projectileSlots.forEach(slot => { slot.mesh.visible = false; slot.fireCore.visible = false; slot.fireGlow.visible = false; });",
              "projectileSlots.forEach(slot => { slot.mesh.visible = false; slot.fireCore.visible = false; slot.fireGlow.visible = false; slot.breath.visible = false; });"
          )
          text = text.replace(
              "const bossShot = effect.id.startsWith('boss-shot-');",
              "const bossShot = effect.id.startsWith('boss-shot-');\n        const breathShot = effect.id.startsWith('boss-shot-breath-');"
          )
          text = text.replace(
              "if (bossShot) {\n          const pulse = 1 + Math.sin(now * 0.024 + slotIndex) * 0.14;",
              "if (breathShot) {\n          const pulse = 1 + Math.sin(now * 0.026 + slotIndex) * 0.12;\n          slot.breath.visible = true;\n          slot.fireGlow.visible = true;\n          slot.breath.position.set(projectileX, 1.55, projectileZ);\n          slot.fireGlow.position.set(projectileX - Math.cos(angle) * 0.55, 1.55, projectileZ - Math.sin(angle) * 0.55);\n          slot.breath.rotation.set(Math.PI / 2, -angle, 0);\n          slot.breath.scale.set(1.18 * pulse, 1.55, 1.18 * pulse);\n          slot.fireGlow.scale.set(1.45 + pulse * 0.22, 0.86, 1.45 + pulse * 0.22);\n          slot.breathMaterial.opacity = Math.max(0.42, 0.86 - progress * 0.28);\n          slot.glowMaterial.opacity = Math.max(0.12, 0.34 - progress * 0.12);\n        } else if (bossShot) {\n          const pulse = 1 + Math.sin(now * 0.024 + slotIndex) * 0.14;"
          )
          path.write_text(text)

          mobile = Path('artifacts/dungeon-rpg/scripts/validate-mobile-combat.mjs')
          m = mobile.read_text()
          m = m.replace(
              "[files.bossController.includes('const PURSUIT_SPEED = 82;') && files.bossController.includes('const ATTACK_READY_WINDOW_MS = 720;'), 'world-boss pressure tuning is missing'],",
              "[files.bossController.includes('const PURSUIT_SPEED = 82;') && files.bossController.includes(\"type AttackKind = 'breath' | 'claw' | 'slam'\") && files.bossController.includes('boss-shot-breath-') && files.bossController.includes('boss-claw-impact-') && files.bossController.includes('boss-slam-impact-'), 'world-boss three-attack kit is missing'],"
          )
          m = m.replace('aggressive dragon controller, single-floor hall and bounded mobile effects', 'three-attack dragon controller, single-floor hall and bounded mobile effects')
          mobile.write_text(m)

          perf = Path('artifacts/dungeon-rpg/scripts/validate-worldboss-performance.mjs')
          p = perf.read_text()
          p = p.replace(
              "[files.aggressiveStage.includes('const RELEASE_DELAY_MS = 320;') && files.aggressiveStage.includes('const PURSUIT_SPEED = 82;') && files.aggressiveStage.includes('const ATTACK_READY_WINDOW_MS = 720;'), 'world-boss pressure controller is not tuned'],",
              "[files.aggressiveStage.includes('const RELEASE_DELAY_MS = 320;') && files.aggressiveStage.includes(\"type AttackKind = 'breath' | 'claw' | 'slam'\") && files.aggressiveStage.includes('boss-shot-breath-') && files.aggressiveStage.includes('boss-claw-impact-') && files.aggressiveStage.includes('boss-slam-impact-'), 'world-boss three-attack controller is missing'],"
          )
          p = p.replace(
              "[files.stage.includes(\"slot.material.color.set('#d8b77a')\") && files.stage.includes('const fireCoreGeometry') && files.stage.includes('slot.fireCore.visible = true'), 'dedicated boss fireball or neutral player arrows are missing'],",
              "[files.stage.includes(\"slot.material.color.set('#d8b77a')\") && files.stage.includes('const breathGeometry') && files.stage.includes('slot.breath.visible = true'), 'dedicated dragon breath or neutral player arrows are missing'],"
          )
          p = p.replace('dedicated heavy fireball', 'fire breath, claw and slam kit')
          perf.write_text(p)
          PY

          rm .github/workflows/apply-worldboss-three-attacks.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add dragon fire breath, claw and slam attacks"
          git push origin HEAD:rework/worldboss-three-attack-kit
