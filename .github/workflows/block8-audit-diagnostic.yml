name: Block 8 Audit Diagnostic

on:
  push:
    branches: [integration/block-8-final-device-review]
    paths:
      - '.github/workflows/block8-audit-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/block-8-final-device-review
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture full audit output
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg audit:rooms > .ci/block8-audit.log 2>&1
          code=$?
          printf '\nEXIT_CODE=%s\n' "$code" >> .ci/block8-audit.log
          rm -f .github/workflows/block8-audit-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record Block 8 audit diagnostic'
          git push origin HEAD:integration/block-8-final-device-review
