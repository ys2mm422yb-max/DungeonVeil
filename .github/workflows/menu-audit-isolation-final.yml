name: Temporary Exact Menu Audit Isolation

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  isolate:
    if: github.head_ref == 'fix/menu-village-visible-mobile' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run exact audit chain
        working-directory: artifacts/dungeon-rpg
        shell: bash
        run: |
          mkdir -p audit-output
          set +e
          scripts=(
            validate-all-rooms.mjs
            validate-production-rooms.mjs
            validate-spawn-hitboxes.mjs
            validate-enemy-visibility.mjs
            validate-mobile-combat.mjs
            validate-worldboss-performance.mjs
            validate-social-navigation.mjs
            validate-social-progression.mjs
          )
          overall=0
          for script in "${scripts[@]}"; do
            echo "=== $script ===" | tee "audit-output/$script.log"
            node "scripts/$script" 2>&1 | tee -a "audit-output/$script.log"
            code=${PIPESTATUS[0]}
            echo "$code" > "audit-output/$script.exit"
            if [ "$code" -ne 0 ]; then overall=1; fi
          done
          exit "$overall"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: exact-menu-audit-isolation
          path: artifacts/dungeon-rpg/audit-output
