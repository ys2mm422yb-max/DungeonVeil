name: Apply World Boss Controls Fix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-worldboss-controls-fix.yml'
      - '.ci/worldboss-controls-fix-trigger.txt'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'rework/worldboss-full-3d-arena'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: rework/worldboss-full-3d-arena
          fetch-depth: 0
      - name: Apply control, collision and arrow fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('artifacts/dungeon-rpg')
          battle_path = root / 'src/components/WorldBossBattleScreen.tsx'
          engine_path = root / 'src/game/runEngine.ts'
          stage_path = root / 'src/components/WorldBossPerspectiveStage.tsx'
          audit_path = root / 'scripts/validate-worldboss-performance.mjs'

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          battle = battle_path.read_text()
          battle = replace_once(
              battle,
              "import { TILE_SIZE, isWalkable } from '../game/dungeon';",
              "import { TILE_SIZE, TileType, isWalkable } from '../game/dungeon';",
              'battle tile import',
          )
          battle = replace_once(
              battle,
              "}\n\nfunction findRaidSpawn(options: {",
              "}\n\nfunction prepareRaidArenaMap(map: GameState['map']) {\n  for (let tileY = 0; tileY < map.height; tileY++) {\n    for (let tileX = 0; tileX < map.width; tileX++) {\n      const boundary = tileX === 0 || tileY === 0 || tileX === map.width - 1 || tileY === map.height - 1;\n      map.tiles[tileY][tileX] = boundary ? TileType.WALL : TileType.FLOOR;\n    }\n  }\n  map.chests = [];\n  map.decorations = [];\n  map.torches = [];\n}\n\nfunction findRaidSpawn(options: {",
              'insert open arena map helper',
          )
          battle = replace_once(
              battle,
              "  minimumDistance?: number;\n}): RaidSpawn {\n  const { map, floor, width, height, desiredXRatio, desiredYRatio, fallbackX, fallbackY, avoid, minimumDistance = 0 } = options;",
              "  minimumDistance?: number;\n  ignoreRoomProps?: boolean;\n}): RaidSpawn {\n  const { map, floor, width, height, desiredXRatio, desiredYRatio, fallbackX, fallbackY, avoid, minimumDistance = 0, ignoreRoomProps = false } = options;",
              'spawn ignore option',
          )
          battle = replace_once(
              battle,
              "    if (collidesWithRoomProp(floor, map.width, map.height, x, y, width, height, 0.18)) continue;",
              "    if (!ignoreRoomProps && collidesWithRoomProp(floor, map.width, map.height, x, y, width, height, 0.18)) continue;",
              'spawn room prop bypass',
          )
          battle = replace_once(
              battle,
              "    const engine = new GameEngine();\n    engineRef.current = engine;",
              "    const engine = new GameEngine();\n    engine.ignoreRoomPropCollisions = true;\n    engineRef.current = engine;",
              'enable raid collision mode',
          )
          battle = replace_once(
              battle,
              "    engine.continueGame(raidSave);\n    engine.state.player.hp = engine.state.player.maxHp;",
              "    engine.continueGame(raidSave);\n    prepareRaidArenaMap(engine.state.map);\n    engine.state.player.hp = engine.state.player.maxHp;",
              'prepare raid arena map',
          )
          battle = replace_once(
              battle,
              "      fallbackX: player.x,\n      fallbackY: player.y,\n    });",
              "      fallbackX: player.x,\n      fallbackY: player.y,\n      ignoreRoomProps: true,\n    });",
              'player spawn ignores hidden props',
          )
          battle = replace_once(
              battle,
              "        fallbackX: boss.x,\n        fallbackY: boss.y,\n        avoid:",
              "        fallbackX: boss.x,\n        fallbackY: boss.y,\n        ignoreRoomProps: true,\n        avoid:",
              'boss spawn ignores hidden props',
          )
          battle = replace_once(
              battle,
              "  const handleMove = (x: number, y: number) => {\n    const engine = engineRef.current;\n    if (!engine || !arenaReady || phase !== 'fighting') return;\n    engine.input.joyX = x;\n    engine.input.joyY = y;\n  };\n\n  const handleDodge = () => {\n    const engine = engineRef.current;\n    if (!engine || !arenaReady || phase !== 'fighting') return;\n    engine.input.dodge = true;\n  };\n\n  const closeAndReset = () => {",
              "  const handleMove = useCallback((x: number, y: number) => {\n    const engine = engineRef.current;\n    if (!engine || !arenaReady || phase !== 'fighting') return;\n    engine.input.joyX = x;\n    engine.input.joyY = y;\n  }, [arenaReady, phase]);\n\n  const handleDodge = useCallback(() => {\n    const engine = engineRef.current;\n    if (!engine || !arenaReady || phase !== 'fighting') return;\n    engine.input.dodge = true;\n  }, [arenaReady, phase]);\n\n  const closeAndReset = useCallback(() => {",
              'stable world boss input callbacks',
          )
          battle = replace_once(
              battle,
              "    onClose();\n  };\n\n  return <div",
              "    onClose();\n  }, [onClose]);\n\n  return <div",
              'stable close callback',
          )
          battle_path.write_text(battle)

          engine = engine_path.read_text()
          engine = replace_once(
              engine,
              "  lastTime = 0;\n  private lastStepTime = 0;",
              "  lastTime = 0;\n  ignoreRoomPropCollisions = false;\n  private lastStepTime = 0;",
              'engine collision mode property',
          )
          engine = replace_once(
              engine,
              "    if (shotBlockedByRoomProp(this.state.floor, this.state.map.width, this.state.map.height, fromX, fromY, toX, toY, padding)) return true;",
              "    if (!this.ignoreRoomPropCollisions && shotBlockedByRoomProp(this.state.floor, this.state.map.width, this.state.map.height, fromX, fromY, toX, toY, padding)) return true;",
              'world boss shot prop bypass',
          )
          engine = replace_once(
              engine,
              "  private blockedByRoomProp(entity: { x: number; y: number; width: number; height: number }) {\n    return collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, entity.x, entity.y, entity.width, entity.height);\n  }",
              "  private blockedByRoomProp(entity: { x: number; y: number; width: number; height: number }) {\n    return !this.ignoreRoomPropCollisions && collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, entity.x, entity.y, entity.width, entity.height);\n  }",
              'world boss movement prop bypass',
          )
          engine = replace_once(
              engine,
              "      if (collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, spawn.x, spawn.y, enemy.width, enemy.height, 0.22)) continue;",
              "      if (!this.ignoreRoomPropCollisions && collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, spawn.x, spawn.y, enemy.width, enemy.height, 0.22)) continue;",
              'world boss enemy relocation bypass',
          )
          engine_path.write_text(engine)

          stage = stage_path.read_text()
          stage = replace_once(
              stage,
              "        slot.material.color.set(effect.color);",
              "        slot.material.color.set(bossShot ? effect.color : '#d8b77a');",
              'normal arrow palette',
          )
          stage_path.write_text(stage)

          audit = audit_path.read_text()
          audit = replace_once(
              audit,
              "  bossRig: await readFile(new URL('../src/components/worldBossMobileVisual3D.ts', import.meta.url), 'utf8'),\n};",
              "  bossRig: await readFile(new URL('../src/components/worldBossMobileVisual3D.ts', import.meta.url), 'utf8'),\n  engine: await readFile(new URL('../src/game/runEngine.ts', import.meta.url), 'utf8'),\n};",
              'audit engine source',
          )
          audit = replace_once(
              audit,
              "  [files.battle.includes('const TIMER_PAINT_MS = 250;') && files.battle.includes('if (!arenaReadyRef.current)'), 'timer throttling or ready gate is missing'],",
              "  [files.battle.includes('const TIMER_PAINT_MS = 250;') && files.battle.includes('if (!arenaReadyRef.current)'), 'timer throttling or ready gate is missing'],\n  [files.battle.includes('function prepareRaidArenaMap') && files.battle.includes('engine.ignoreRoomPropCollisions = true;') && files.battle.includes('ignoreRoomProps: true'), 'world-boss arena still uses invisible room-50 collision props'],\n  [files.battle.includes('const handleMove = useCallback') && files.battle.includes('}, [arenaReady, phase]);'), 'world-boss joystick callback is unstable across HUD rerenders'],\n  [files.engine.includes('ignoreRoomPropCollisions = false;') && files.engine.includes('!this.ignoreRoomPropCollisions && shotBlockedByRoomProp') && files.engine.includes('return !this.ignoreRoomPropCollisions && collidesWithRoomProp'), 'engine collision bypass is missing or affects normal rooms'],\n  [files.stage.includes(\"bossShot ? effect.color : '#d8b77a'\"), 'normal player arrows still inherit red or blue elemental colors'],",
              'audit controls and arrows',
          )
          audit = replace_once(
              audit,
              "console.log('World-boss performance audit passed: single-floor KayKit hall, simplified Ash King and adaptive mobile rendering are active.');",
              "console.log('World-boss performance audit passed: low-call hall, open raid collision, stable joystick input and normal arrow palette are active.');",
              'audit success message',
          )
          audit_path.write_text(audit)
          PY
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Validate world boss controls fix
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:worldboss
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm --filter @workspace/dungeon-rpg typecheck
          pnpm --filter @workspace/dungeon-rpg build
      - name: Commit clean fix
        run: |
          rm -f .github/workflows/apply-worldboss-controls-fix.yml .ci/worldboss-controls-fix-trigger.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add artifacts/dungeon-rpg/src/components/WorldBossBattleScreen.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx \
            artifacts/dungeon-rpg/src/game/runEngine.ts \
            artifacts/dungeon-rpg/scripts/validate-worldboss-performance.mjs \
            .github/workflows/apply-worldboss-controls-fix.yml \
            .ci/worldboss-controls-fix-trigger.txt
          git commit -m 'Fix world boss controls and arrow palette'
          git push
