name: Diagnose room navigation audit

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/diagnose-room-navigation.yml'
      - 'artifacts/dungeon-rpg/scripts/validate-room-navigation.mjs'
      - 'artifacts/dungeon-rpg/src/game/**'

jobs:
  diagnose:
    if: github.head_ref == 'fix/room13-and-room-navigation-audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture complete navigation output
        shell: bash
        run: |
          set +e
          node --experimental-strip-types --experimental-specifier-resolution=node artifacts/dungeon-rpg/scripts/validate-room-navigation.mjs > room-navigation.log 2>&1
          status=$?
          echo "exit_code=$status" >> room-navigation.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: room-navigation-diagnostic
          path: room-navigation.log
