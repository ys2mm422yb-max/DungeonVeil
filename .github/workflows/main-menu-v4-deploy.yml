name: Main Menu V4 Run Ranger Deploy

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/main-menu-v4-deploy.yml'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/main-menu-v4-deploy.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-main-menu-v4-run-ranger
  cancel-in-progress: true

jobs:
  validate-build-upload:
    if: github.event_name != 'pull_request' || github.head_ref == 'fix/main-menu-equipped-ranger'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
      - id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - run: pnpm run typecheck
      - name: Build Pages application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.commit.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build
      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages
      - name: Write V4 deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s","source":"main-menu-run-ranger-v4"}\n' "${{ steps.commit.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    needs: validate-build-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4

  verify-live-render:
    needs: [validate-build-upload, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright and Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Verify marker and capture actual mobile menu
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.validate-build-upload.outputs.sha }}
        run: |
          set -euo pipefail
          verified=0
          for attempt in $(seq 1 24); do
            if curl -fsSL --retry 2 --retry-delay 2 "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?verify=${GITHUB_RUN_ID}-${attempt}" -o live-marker.json; then
              if python3 - <<'PY'
          import json, os
          from pathlib import Path
          data = json.loads(Path('live-marker.json').read_text())
          assert data.get('source') == 'main-menu-run-ranger-v4', data
          assert data.get('commit') == os.environ['EXPECTED_COMMIT'], data
          PY
              then
                verified=1
                break
              fi
            fi
            sleep 5
          done
          test "$verified" = 1
          cat > capture-live-v4.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            viewport: { width: 393, height: 852 },
            deviceScaleFactor: 3,
            isMobile: true,
            hasTouch: true,
            userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.5 Mobile/15E148 Safari/604.1',
          });
          await context.addInitScript(() => localStorage.setItem('dungeon-veil-language', 'de'));
          const page = await context.newPage();
          const errors = [];
          const failed = [];
          page.on('pageerror', error => errors.push(String(error?.stack || error)));
          page.on('requestfailed', request => failed.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
          await page.goto('https://ys2mm422yb-max.github.io/DungeonVeil/', { waitUntil: 'domcontentloaded', timeout: 60000 });
          await page.waitForTimeout(25000);
          await page.screenshot({ path: 'main-menu-v4-live.png', fullPage: true });
          const state = await page.evaluate(() => ({
            canvases: document.querySelectorAll('canvas').length,
            bodyText: document.body.innerText.slice(0, 1500),
            resources: performance.getEntriesByType('resource').map(entry => entry.name).filter(name => /Ranger|quiver|bow|DungeonVeil/i.test(name)),
          }));
          await writeFile('main-menu-v4-live.json', JSON.stringify({ state, errors, failed }, null, 2));
          await browser.close();
          EOF
          node capture-live-v4.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: main-menu-v4-live-proof
          path: |
            main-menu-v4-live.png
            main-menu-v4-live.json
            live-marker.json
          if-no-files-found: error
      - name: Remove temporary deploy workflow
        shell: bash
        run: |
          rm -f .github/workflows/main-menu-v4-deploy.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove temporary Main Menu V4 deploy workflow'
          git push origin HEAD:fix/main-menu-equipped-ranger
