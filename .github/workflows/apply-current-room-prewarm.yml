name: Apply current room prewarm

on:
  push:
    branches: [main]
    paths:
      - '.github/dv-current-room-prewarm-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prewarm current room before renderer boot
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx')
          text = path.read_text()
          old = """    const boot = async () => {\n      await loadKayKitManifest();\n      THREE = await import(/* @vite-ignore */ THREE_URL);"""
          new = """    const boot = async () => {\n      await loadKayKitManifest();\n      const initialState = stateRef.current;\n      await Promise.all([\n        preloadKayKitDungeonRoom(initialState.floor),\n        preloadKayKitRoomTheme(initialState.floor),\n      ]);\n      if (disposed) return;\n      THREE = await import(/* @vite-ignore */ THREE_URL);"""
          if new in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit('GameCanvas boot block not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit current-room prewarm
        shell: bash
        run: |
          git config user.name 'Dungeon Veil CI'
          git config user.email 'actions@users.noreply.github.com'
          git add artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx
          git commit -m 'Prewarm the current KayKit room before renderer boot' || exit 0
          git push origin HEAD:main
