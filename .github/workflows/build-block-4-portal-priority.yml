name: Build Block 4 Portal Priority

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/block-4-portal-priority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/block-4-portal-priority
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build final Block 4 snapshot
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin fix/block-1-email-confirmation-redirect
          git checkout origin/fix/block-1-email-confirmation-redirect -- \
            artifacts/dungeon-rpg/src/game/runEngine.ts \
            artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs

          python3 - <<'PY'
          from pathlib import Path

          engine = Path('artifacts/dungeon-rpg/src/game/runEngine.ts')
          text = engine.read_text()
          text = text.replace(
            "  private enemyWindups = new Map<string, EnemyWindup>();",
            "  private enemyWindups = new Map<string, EnemyWindup>();\n  private exitCenterCache: { map: DungeonMap; x: number; y: number } | null = null;"
          )
          marker = """  canExitRoom(): boolean {
    return this.state.status === 'playing' && this.state.enemies.length === 0 && this.state.roomClearReady;
  }

  private updateRoomFlow(time: number): void {
"""
          replacement = """  canExitRoom(): boolean {
    return this.state.status === 'playing' && this.state.enemies.length === 0 && this.state.roomClearReady;
  }

  private getRoomExitCenter(): { x: number; y: number } | null {
    if (this.exitCenterCache?.map === this.state.map) return this.exitCenterCache;
    for (let tileY = 0; tileY < this.state.map.height; tileY++) {
      for (let tileX = 0; tileX < this.state.map.width; tileX++) {
        if (this.state.map.tiles[tileY]?.[tileX] !== TileType.STAIRS_DOWN) continue;
        this.exitCenterCache = {
          map: this.state.map,
          x: tileX * TILE_SIZE + TILE_SIZE / 2,
          y: tileY * TILE_SIZE + TILE_SIZE / 2,
        };
        return this.exitCenterCache;
      }
    }
    this.exitCenterCache = null;
    return null;
  }

  private playerWithinOpenExit(radius = TILE_SIZE * 1.05): boolean {
    if (!this.canExitRoom()) return false;
    const exit = this.getRoomExitCenter();
    if (!exit) return false;
    const playerX = this.state.player.x + this.state.player.width / 2;
    const playerY = this.state.player.y + this.state.player.height / 2;
    return Math.hypot(playerX - exit.x, playerY - exit.y) <= radius;
  }

  private updateRoomFlow(time: number): void {
"""
          if marker not in text:
            raise SystemExit('canExitRoom marker missing')
          text = text.replace(marker, replacement)

          old = """    const p = this.state.player;
    const tx = Math.floor((p.x + 16) / TILE_SIZE);
    const ty = Math.floor((p.y + 16) / TILE_SIZE);
    if (this.state.map.tiles[ty]?.[tx] !== TileType.STAIRS_DOWN) return;
    if (!this.canExitRoom()) {
      this.state.exitHintCount = living + (deathPending ? 1 : 0);
      this.state.exitHintUntil = time + 850;
      return;
    }
    this.nextRoom();
"""
          new = """    const p = this.state.player;
    const exit = this.getRoomExitCenter();
    if (!exit) return;
    const playerX = p.x + p.width / 2;
    const playerY = p.y + p.height / 2;
    const touchingExit = Math.hypot(playerX - exit.x, playerY - exit.y) <= TILE_SIZE * 0.92;
    if (!touchingExit) return;
    if (!this.canExitRoom()) {
      this.state.exitHintCount = living + (deathPending ? 1 : 0);
      this.state.exitHintUntil = time + 850;
      return;
    }
    this.nextRoom();
"""
          if old not in text:
            raise SystemExit('exact portal flow marker missing')
          text = text.replace(old, new)

          old = """  private blockedByRoomProp(entity: { x: number; y: number; width: number; height: number }) {
    return !this.ignoreRoomPropCollisions && collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, entity.x, entity.y, entity.width, entity.height);
  }
"""
          new = """  private blockedByRoomProp(entity: { x: number; y: number; width: number; height: number }) {
    if (entity === this.state.player && this.playerWithinOpenExit(TILE_SIZE * 1.35)) return false;
    return !this.ignoreRoomPropCollisions && collidesWithRoomProp(this.state.floor, this.state.map.width, this.state.map.height, entity.x, entity.y, entity.width, entity.height);
  }
"""
          if old not in text:
            raise SystemExit('room prop collision marker missing')
          text = text.replace(old, new)
          engine.write_text(text)

          audit = Path('artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs')
          text = audit.read_text()
          text = text.replace(
            "  const chapter = await server.ssrLoadModule('/src/game/chapterRun.ts');",
            "  const chapter = await server.ssrLoadModule('/src/game/chapterRun.ts');\n  const runEngineSource = await import('node:fs/promises').then(fs => fs.readFile(new URL('../src/game/runEngine.ts', import.meta.url), 'utf8'));"
          )
          text = text.replace(
            "  note('Rooms 1–20 retain their authored identities and known mobile fixes.');",
            "  if (!runEngineSource.includes('getRoomExitCenter') || !runEngineSource.includes('TILE_SIZE * 0.92') || !runEngineSource.includes('playerWithinOpenExit') || !runEngineSource.includes('entity === this.state.player')) {\n    fail(0, 'open portal is not protected from nearby props or exact-tile trigger regressions');\n  }\n  if (/canExitRoom\\(\\)[\\s\\S]{0,240}state\\.items/.test(runEngineSource)) fail(0, 'optional loot still blocks room exit');\n\n  note('Rooms 1–20 retain their authored identities and known mobile fixes.');"
          )
          audit.write_text(text)
          PY

          rm .github/workflows/build-block-4-portal-priority.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Give cleared-room portals interaction priority'
          git push origin HEAD:fix/block-4-portal-priority
