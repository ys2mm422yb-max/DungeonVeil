name: PR40 Typecheck Diagnostics

on:
  push:
    branches:
      - work/blocks-1-7-production-pass
    paths-ignore:
      - 'docs/ci/pr40-typecheck.log'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Capture typecheck output
        id: typecheck
        shell: bash
        run: |
          set +e
          mkdir -p docs/ci
          pnpm --filter @workspace/dungeon-rpg typecheck 2>&1 | tee docs/ci/pr40-typecheck.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ci/pr40-typecheck.log
          if git diff --cached --quiet; then
            echo "No diagnostic changes"
          else
            git commit -m "Capture PR40 typecheck errors"
            git push origin HEAD:work/blocks-1-7-production-pass
          fi
      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
