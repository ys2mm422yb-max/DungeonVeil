name: PR40 Typecheck Diagnostics

on:
  push:
    branches:
      - work/blocks-1-7-production-pass
  workflow_dispatch:

jobs:
  capture-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Capture typecheck output
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload typecheck log
        uses: actions/upload-artifact@v4
        with:
          name: pr40-typecheck-log
          path: typecheck.log
          if-no-files-found: error
      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
