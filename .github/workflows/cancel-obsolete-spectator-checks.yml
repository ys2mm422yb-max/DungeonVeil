name: Cancel obsolete spectator checks

on:
  push:
    branches: [ops/cancel-obsolete-spectator-checks]
    paths:
      - '.github/workflows/cancel-obsolete-spectator-checks.yml'

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  cancel-obsolete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Cancel only obsolete spectator runs
        uses: actions/github-script@v7
        with:
          script: |
            const keepSha = '97e24d51785ce96a002ee45a241d86054583ad78';
            const branches = [
              'fix/spectator-snapshot-interpolation-performance',
              'fix/spectator-buffer-interpolation-performance',
              'fix/spectator-interpolation-mobile-performance',
            ];
            const workflowNames = new Set([
              'Dungeon RPG CI',
              'Dungeon RPG Check',
              'Redesign Diagnostics',
              'Full Game Regression',
            ]);
            const activeStatuses = ['queued', 'in_progress', 'waiting', 'requested', 'pending'];
            const { owner, repo } = context.repo;
            const candidates = new Map();

            for (const branch of branches) {
              for (const status of activeStatuses) {
                const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                  owner,
                  repo,
                  branch,
                  status,
                  per_page: 100,
                });
                for (const run of runs) {
                  if (!workflowNames.has(run.name)) continue;
                  if (run.head_sha === keepSha) continue;
                  candidates.set(run.id, run);
                }
              }
            }

            const cancelled = [];
            const alreadyFinished = [];
            const failed = [];
            for (const run of candidates.values()) {
              try {
                await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id });
                cancelled.push(`${run.name} #${run.run_number} (${run.head_sha.slice(0, 8)})`);
              } catch (error) {
                if (error.status === 409) alreadyFinished.push(`${run.name} #${run.run_number}`);
                else failed.push(`${run.name} #${run.run_number}: ${error.message}`);
              }
            }

            const currentRuns = [];
            for (const status of activeStatuses) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner,
                repo,
                branch: 'fix/spectator-snapshot-interpolation-performance',
                status,
                per_page: 100,
              });
              for (const run of runs) {
                if (workflowNames.has(run.name) && run.head_sha === keepSha) {
                  currentRuns.push(`${run.name}: ${run.status}`);
                }
              }
            }

            const body = [
              '## Obsolete spectator checks cleaned up',
              '',
              `Protected exact product head: \`${keepSha}\`.`,
              `Cancelled obsolete runs: **${cancelled.length}**.`,
              `Already completed during cleanup: **${alreadyFinished.length}**.`,
              `Cancellation errors: **${failed.length}**.`,
              '',
              'Protected final-head runs:',
              ...(currentRuns.length ? currentRuns.map(value => `- ${value}`) : ['- no active runs found at comment time']),
              '',
              ...(failed.length ? ['Errors:', ...failed.map(value => `- ${value}`)] : ['No cancellation error occurred.']),
              '',
              'This operations PR is validation-only, was not merged, and its branch remains available.',
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: 273, body });
            if (failed.length) core.setFailed(`Failed to cancel ${failed.length} obsolete run(s).`);
            else await github.rest.pulls.update({ owner, repo, pull_number: 273, state: 'closed' });
