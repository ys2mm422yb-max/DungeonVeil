name: Main Menu V3 Visual Proof

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/main-menu-v3-visual-proof.yml'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/main-menu-v3-visual-proof.yml'
      - 'artifacts/dungeon-rpg/src/components/kaykitVillagePlayer3D.ts'
      - 'artifacts/dungeon-rpg/src/components/kaykitWeapons3D.ts'
      - 'artifacts/dungeon-rpg/src/components/ModernVillageSquareScene.tsx'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-iphone-proof:
    if: github.event_name != 'pull_request' || github.head_ref == 'fix/main-menu-equipped-ranger'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact fix head
        uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build with the real GitHub Pages base path
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Install Chromium
        run: npx --yes playwright@1.55.0 install --with-deps chromium

      - name: Start Pages-path preview
        shell: bash
        run: |
          pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-preview.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:4173/DungeonVeil/?qa=menu' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/dungeon-veil-preview.log
          exit 1

      - name: Capture real iPhone menu rendering
        run: npx --yes playwright@1.55.0 screenshot --browser=chromium --viewport-size='393,852' --wait-for-timeout=25000 --full-page 'http://127.0.0.1:4173/DungeonVeil/?qa=menu' main-menu-v3-iphone.png

      - name: Upload visual proof
        uses: actions/upload-artifact@v4
        with:
          name: main-menu-v3-iphone-proof
          path: main-menu-v3-iphone.png
          if-no-files-found: error
