name: Duo Matrix Diagnostics

on:
  pull_request:
    branches: ['fix/validation-duo-combat-matrix-base']
    paths:
      - '.github/workflows/duo-matrix-diagnostics.yml'
      - 'artifacts/dungeon-rpg/**'

permissions:
  contents: read

jobs:
  duo-matrix-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture complete room audit
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg audit:rooms > duo-matrix-audit.log 2>&1
          echo $? > duo-matrix-audit.exit
          tail -n 300 duo-matrix-audit.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: duo-matrix-diagnostics
          path: |
            duo-matrix-audit.log
            duo-matrix-audit.exit
          if-no-files-found: error
      - name: Enforce room audit
        run: test "$(cat duo-matrix-audit.exit)" = "0"
