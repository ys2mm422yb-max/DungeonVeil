name: Live Menu Diagnostic

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/live-menu-diagnostic.yml'
  pull_request:
    branches: [integration/block-8-final-device-review]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/live-menu-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-live:
    if: github.event_name != 'pull_request' || github.head_ref == 'fix/main-menu-equipped-ranger'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Chromium
        run: npx --yes playwright@1.55.0 install --with-deps chromium
      - name: Inspect exact fixed live link
        shell: bash
        run: |
          cat > /tmp/inspect-live.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';

          const url = 'https://ys2mm422yb-max.github.io/DungeonVeil/';
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            viewport: { width: 393, height: 852 },
            deviceScaleFactor: 3,
            isMobile: true,
            hasTouch: true,
            userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.5 Mobile/15E148 Safari/604.1',
            extraHTTPHeaders: { 'Cache-Control': 'no-cache', Pragma: 'no-cache' },
          });
          const page = await context.newPage();
          const consoleMessages = [];
          const pageErrors = [];
          const failedRequests = [];
          const responses = [];
          page.on('console', msg => consoleMessages.push({ type: msg.type(), text: msg.text() }));
          page.on('pageerror', error => pageErrors.push(String(error?.stack || error)));
          page.on('requestfailed', request => failedRequests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
          page.on('response', response => {
            const responseUrl = response.url();
            if (/DungeonVeil|assets|jsdelivr|deployment\.json/i.test(responseUrl)) {
              responses.push({ url: responseUrl, status: response.status(), contentType: response.headers()['content-type'] || '' });
            }
          });

          await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
          await page.waitForTimeout(20000);
          const diagnostic = await page.evaluate(async () => {
            let deployment = null;
            try {
              const response = await fetch('./deployment.json', { cache: 'no-store' });
              deployment = { status: response.status, body: await response.text() };
            } catch (error) {
              deployment = { error: String(error) };
            }
            return {
              href: location.href,
              title: document.title,
              readyState: document.readyState,
              scripts: [...document.scripts].map(script => script.src).filter(Boolean),
              canvases: document.querySelectorAll('canvas').length,
              bodyText: document.body.innerText.slice(0, 3000),
              deployment,
              resources: performance.getEntriesByType('resource').map(entry => entry.name).filter(name => /DungeonVeil|assets|jsdelivr/i.test(name)),
              localStorage: Object.fromEntries(Object.keys(localStorage).map(key => [key, localStorage.getItem(key)])),
            };
          });
          await page.screenshot({ path: 'live-menu.png', fullPage: true });
          await writeFile('live-menu-diagnostic.json', JSON.stringify({ diagnostic, consoleMessages, pageErrors, failedRequests, responses }, null, 2));
          await browser.close();
          EOF
          npx --yes -p playwright@1.55.0 node /tmp/inspect-live.mjs
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: live-menu-diagnostic
          path: |
            live-menu.png
            live-menu-diagnostic.json
          if-no-files-found: error
