name: Main Menu Audit Diagnostic

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/main-menu-audit-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture audit output
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg audit:rooms > main-menu-audit-diagnostic.txt 2>&1
          code=$?
          printf '\nEXIT_CODE=%s\n' "$code" >> main-menu-audit-diagnostic.txt
          rm -f .github/workflows/main-menu-audit-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record main-menu audit diagnostic'
          git push origin HEAD:fix/main-menu-equipped-ranger
