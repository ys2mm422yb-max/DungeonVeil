name: Dungeon Veil Social Tutorial Mobile QA

on:
  push:
    branches: [work/blocks-1-7-production-pass]
    paths-ignore:
      - '.ci/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dungeon-veil-social-tutorial-mobile-qa
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact product commit
        uses: actions/checkout@v4

      - name: Resolve validated commit
        id: product
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        id: install
        run: pnpm install --frozen-lockfile

      - name: Run social and tutorial audits
        id: audit
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @workspace/dungeon-rpg audit:social 2>&1 | tee /tmp/social-audit.log

      - name: Typecheck Dungeon Veil
        id: typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @workspace/dungeon-rpg typecheck 2>&1 | tee /tmp/social-typecheck.log

      - name: Build QA site
        id: build
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Install mobile browsers
        id: browsers
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium webkit

      - name: Serve QA site
        id: serve
        shell: bash
        run: |
          mkdir -p /tmp/dv-social/DungeonVeil artifacts/dungeon-rpg/visual-qa
          cp -a artifacts/dungeon-rpg/dist/public/. /tmp/dv-social/DungeonVeil/
          python3 -m http.server 4174 --directory /tmp/dv-social >/tmp/dv-social-server.log 2>&1 &
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4174/DungeonVeil/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/dv-social-server.log
          exit 1

      - name: Capture iPhone tutorial
        id: tutorial_iphone
        run: pnpm dlx playwright@1.55.0 screenshot --browser=webkit --device="iPhone 13" --color-scheme=dark --wait-for-timeout=2500 "http://127.0.0.1:4174/DungeonVeil/?qa=tutorial" artifacts/dungeon-rpg/visual-qa/tutorial-iphone.png

      - name: Capture Android tutorial
        id: tutorial_android
        run: pnpm dlx playwright@1.55.0 screenshot --browser=chromium --device="Pixel 7" --color-scheme=dark --wait-for-timeout=2500 "http://127.0.0.1:4174/DungeonVeil/?qa=tutorial" artifacts/dungeon-rpg/visual-qa/tutorial-android.png

      - name: Capture iPhone Veil village
        id: menu_iphone
        run: pnpm dlx playwright@1.55.0 screenshot --browser=webkit --device="iPhone 13" --color-scheme=dark --wait-for-timeout=7000 "http://127.0.0.1:4174/DungeonVeil/?qa=menu" artifacts/dungeon-rpg/visual-qa/menu-iphone.png

      - name: Capture Android Veil village
        id: menu_android
        run: pnpm dlx playwright@1.55.0 screenshot --browser=chromium --device="Pixel 7" --color-scheme=dark --wait-for-timeout=7000 "http://127.0.0.1:4174/DungeonVeil/?qa=menu" artifacts/dungeon-rpg/visual-qa/menu-android.png

      - name: Capture iPhone Ash King hall
        id: worldboss_iphone
        run: pnpm dlx playwright@1.55.0 screenshot --browser=webkit --device="iPhone 13" --color-scheme=dark --wait-for-timeout=10000 "http://127.0.0.1:4174/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png

      - name: Capture Android Ash King hall
        id: worldboss_android
        run: pnpm dlx playwright@1.55.0 screenshot --browser=chromium --device="Pixel 7" --color-scheme=dark --wait-for-timeout=10000 "http://127.0.0.1:4174/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-android.png

      - name: Validate mobile screenshots
        id: validate
        shell: bash
        run: |
          for file in tutorial-iphone tutorial-android menu-iphone menu-android worldboss-iphone worldboss-android; do
            test -s "artifacts/dungeon-rpg/visual-qa/${file}.png"
            test "$(stat -c%s "artifacts/dungeon-rpg/visual-qa/${file}.png")" -gt 25000
          done
          python3 -m pip install --quiet pillow
          python3 <<'PY'
          from pathlib import Path
          from PIL import Image, ImageStat
          root = Path('artifacts/dungeon-rpg/visual-qa')
          expected = {
              'tutorial-iphone.png': (390, 844),
              'tutorial-android.png': (412, 915),
              'menu-iphone.png': (390, 844),
              'menu-android.png': (412, 915),
              'worldboss-iphone.png': (390, 844),
              'worldboss-android.png': (412, 915),
          }
          for name, minimum in expected.items():
              image = Image.open(root / name).convert('RGB')
              width, height = image.size
              if width < minimum[0] or height < minimum[1]:
                  raise SystemExit(f'{name}: unexpected viewport {image.size}')
              stat = ImageStat.Stat(image)
              if max(stat.var) < 250:
                  raise SystemExit(f'{name}: screenshot is visually empty')
              image.thumbnail((260, 560), Image.Resampling.LANCZOS)
              image.save(root / name.replace('.png', '-thumb.jpg'), quality=55, optimize=True, progressive=True)
          PY

      - name: Upload QA evidence
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-social-tutorial-mobile-qa-${{ steps.product.outputs.sha }}
          path: |
            artifacts/dungeon-rpg/visual-qa/tutorial-*
            artifacts/dungeon-rpg/visual-qa/menu-*
            artifacts/dungeon-rpg/visual-qa/worldboss-*
          retention-days: 14

      - name: Publish QA evidence and marker
        if: always()
        uses: actions/github-script@v7
        env:
          PRODUCT_SHA: ${{ steps.product.outputs.sha }}
          INSTALL: ${{ steps.install.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          BUILD: ${{ steps.build.outcome }}
          BROWSERS: ${{ steps.browsers.outcome }}
          SERVE: ${{ steps.serve.outcome }}
          TUTORIAL_IPHONE: ${{ steps.tutorial_iphone.outcome }}
          TUTORIAL_ANDROID: ${{ steps.tutorial_android.outcome }}
          MENU_IPHONE: ${{ steps.menu_iphone.outcome }}
          MENU_ANDROID: ${{ steps.menu_android.outcome }}
          WORLDBOSS_IPHONE: ${{ steps.worldboss_iphone.outcome }}
          WORLDBOSS_ANDROID: ${{ steps.worldboss_android.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
          UPLOAD: ${{ steps.upload.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            async function write(path, data, message) {
              let sha;
              try {
                const result = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(result.data)) sha = result.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch, sha, message,
                content: Buffer.from(data).toString('base64'),
              });
            }
            const local = {
              tutorialIphone: 'artifacts/dungeon-rpg/visual-qa/tutorial-iphone.png',
              tutorialAndroid: 'artifacts/dungeon-rpg/visual-qa/tutorial-android.png',
              tutorialIphoneThumb: 'artifacts/dungeon-rpg/visual-qa/tutorial-iphone-thumb.jpg',
              tutorialAndroidThumb: 'artifacts/dungeon-rpg/visual-qa/tutorial-android-thumb.jpg',
              menuIphone: 'artifacts/dungeon-rpg/visual-qa/menu-iphone.png',
              menuAndroid: 'artifacts/dungeon-rpg/visual-qa/menu-android.png',
              menuIphoneThumb: 'artifacts/dungeon-rpg/visual-qa/menu-iphone-thumb.jpg',
              menuAndroidThumb: 'artifacts/dungeon-rpg/visual-qa/menu-android-thumb.jpg',
              worldbossIphone: 'artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png',
              worldbossAndroid: 'artifacts/dungeon-rpg/visual-qa/worldboss-android.png',
              worldbossIphoneThumb: 'artifacts/dungeon-rpg/visual-qa/worldboss-iphone-thumb.jpg',
              worldbossAndroidThumb: 'artifacts/dungeon-rpg/visual-qa/worldboss-android-thumb.jpg',
            };
            const remote = {
              tutorialIphone: '.ci/visual-qa/tutorial-iphone.png',
              tutorialAndroid: '.ci/visual-qa/tutorial-android.png',
              tutorialIphoneThumb: '.ci/visual-qa/tutorial-iphone-thumb.jpg',
              tutorialAndroidThumb: '.ci/visual-qa/tutorial-android-thumb.jpg',
              menuIphone: '.ci/visual-qa/menu-iphone.png',
              menuAndroid: '.ci/visual-qa/menu-android.png',
              menuIphoneThumb: '.ci/visual-qa/menu-iphone-thumb.jpg',
              menuAndroidThumb: '.ci/visual-qa/menu-android-thumb.jpg',
              worldbossIphone: '.ci/visual-qa/worldboss-iphone.png',
              worldbossAndroid: '.ci/visual-qa/worldboss-android.png',
              worldbossIphoneThumb: '.ci/visual-qa/worldboss-iphone-thumb.jpg',
              worldbossAndroidThumb: '.ci/visual-qa/worldboss-android-thumb.jpg',
            };
            for (const key of Object.keys(local)) {
              if (fs.existsSync(local[key])) await write(remote[key], fs.readFileSync(local[key]), `Record social ${key} QA for ${process.env.PRODUCT_SHA.slice(0, 7)}`);
            }
            const outcomes = {
              install: process.env.INSTALL,
              audit: process.env.AUDIT,
              typecheck: process.env.TYPECHECK,
              build: process.env.BUILD,
              browsers: process.env.BROWSERS,
              serve: process.env.SERVE,
              tutorialIphone: process.env.TUTORIAL_IPHONE,
              tutorialAndroid: process.env.TUTORIAL_ANDROID,
              menuIphone: process.env.MENU_IPHONE,
              menuAndroid: process.env.MENU_ANDROID,
              worldbossIphone: process.env.WORLDBOSS_IPHONE,
              worldbossAndroid: process.env.WORLDBOSS_ANDROID,
              validate: process.env.VALIDATE,
              upload: process.env.UPLOAD,
            };
            const success = Object.values(outcomes).every(value => value === 'success');
            const marker = {
              workflow: 'Dungeon Veil Social Tutorial Mobile QA',
              status: success ? 'success' : 'failure',
              validatedCommit: process.env.PRODUCT_SHA || null,
              outcomes,
              auditLog: fs.existsSync('/tmp/social-audit.log') ? fs.readFileSync('/tmp/social-audit.log', 'utf8').slice(-12000) : '',
              typecheckLog: fs.existsSync('/tmp/social-typecheck.log') ? fs.readFileSync('/tmp/social-typecheck.log', 'utf8').slice(-12000) : '',
              screenshots: Object.keys(local).filter(key => fs.existsSync(local[key])).map(key => remote[key]),
              sizes: Object.fromEntries(Object.keys(local).map(key => [key, fs.existsSync(local[key]) ? fs.statSync(local[key]).size : 0])),
              completedAt: new Date().toISOString(),
            };
            await write('.ci/dungeon-veil-tutorial-qa.json', JSON.stringify(marker, null, 2) + '\n', `Record social tutorial QA ${success ? 'success' : 'failure'} for ${(process.env.PRODUCT_SHA || 'unknown').slice(0, 7)}`);
