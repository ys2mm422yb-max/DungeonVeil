name: Sync Relic Base

on:
  push:
    branches: [audit/relic-runtime-ui-final-v4]
    paths: ['.github/workflows/sync-relic-base.yml']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/relic-runtime-ui-final-v4
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge current fixed target and remove helper
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin fix/mobile-telegraphs-room-21-50-balance
          git merge --no-edit origin/fix/mobile-telegraphs-room-21-50-balance
          git rm .github/workflows/sync-relic-base.yml
          git commit -m "Remove temporary relic base synchronization"
          git push origin HEAD:audit/relic-runtime-ui-final-v4
