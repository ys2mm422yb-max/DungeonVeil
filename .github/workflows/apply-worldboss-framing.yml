name: Apply World Boss Framing Patch

on:
  push:
    branches: [rework/worldboss-full-3d-arena]
  pull_request:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx'
      - '.github/workflows/apply-worldboss-framing.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: rework/worldboss-full-3d-arena
          fetch-depth: 0
      - name: Patch perspective framing
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx')
          text = path.read_text()
          if 'WorldBossCleanFloor_' in text and '(portrait ? 13.7 : 11.9)' in text:
              print('World boss framing patch already applied.')
              raise SystemExit(0)

          old_fov = "      camera.fov = camera.aspect < 0.7 ? 48 : 44;"
          if text.count(old_fov) != 1:
              raise SystemExit(f'portrait fov: expected exactly one match, found {text.count(old_fov)}')
          text = text.replace(old_fov, "      camera.fov = camera.aspect < 0.7 ? 50 : 44;", 1)

          dispose_anchor = "    const disposeObject = (root: any) => root?.traverse?.((node: any) => {"
          if text.count(dispose_anchor) != 1:
              raise SystemExit(f'dispose anchor: expected exactly one match, found {text.count(dispose_anchor)}')
          helper = """    const cleanBossFloorLane = async (shell: any, current: NonNullable<ReturnType<typeof state>>) => {
              await shell.userData?.ready;
              if (disposed) return;
              const floorStep = 4;
              const columns = Math.max(1, Math.floor(current.map.width / floorStep));
              const rows = Math.max(1, Math.floor(current.map.height / floorStep));
              const floorChildren = shell.children.slice(0, columns * rows);
              const cleanPrototype = floorChildren.find((_tile: any, index: number) => (index + VISUAL_ROOM * 3) % 3 !== 0);
              if (!cleanPrototype) return;
              floorChildren.forEach((tile: any, index: number) => {
                const broken = (index + VISUAL_ROOM * 3) % 3 === 0;
                const centralLane = Math.abs(tile.position.x) < 4.2 && tile.position.z > -8.5 && tile.position.z < 10.5;
                if (!broken || !centralLane) return;
                const replacement = cleanPrototype.clone(true);
                replacement.position.copy(tile.position);
                replacement.rotation.copy(tile.rotation);
                replacement.scale.copy(tile.scale);
                replacement.name = `WorldBossCleanFloor_${index}`;
                shell.remove(tile);
                shell.add(replacement);
              });
            };

          """
          text = text.replace(dispose_anchor, helper + dispose_anchor, 1)

          camera_pattern = re.compile(
              r"    const updateCamera = \(delta: number, playerX: number, playerZ: number, bossX: number, bossZ: number\) => \{.*?\n    \};",
              re.DOTALL,
          )
          camera_matches = list(camera_pattern.finditer(text))
          if len(camera_matches) != 1 or 'playerX * 0.38 + bossX * 0.62' not in camera_matches[0].group(0):
              raise SystemExit(f'mobile camera framing: expected one legacy block, found {len(camera_matches)}')
          new_camera = """    const updateCamera = (delta: number, playerX: number, playerZ: number, bossX: number, bossZ: number) => {
              const portrait = camera.aspect < 0.72;
              const focusX = clamp(
                playerX * (portrait ? 0.56 : 0.44) + bossX * (portrait ? 0.44 : 0.56),
                -3.6,
                3.6,
              );
              const focusZ = clamp(
                playerZ * (portrait ? 0.62 : 0.46) + bossZ * (portrait ? 0.38 : 0.54) + (portrait ? 0.65 : 0.2),
                -2.2,
                4.6,
              );
              const spread = Math.hypot(playerX - bossX, playerZ - bossZ);
              const extra = clamp((spread - 10) * 0.22, 0, 2.6);
              cameraGoal.set(
                focusX,
                (portrait ? 13.7 : 11.9) + extra * 0.34,
                focusZ + (portrait ? 19.6 : 16.7) + extra,
              );
              camera.position.x = damp(camera.position.x, cameraGoal.x, 5.8, delta);
              camera.position.y = damp(camera.position.y, cameraGoal.y, 5.2, delta);
              camera.position.z = damp(camera.position.z, cameraGoal.z, 5.8, delta);
              cameraLook.set(focusX, portrait ? 0.92 : 1.08, focusZ - (portrait ? 1.65 : 3.15));
              camera.lookAt(cameraLook);
              camera.userData.dungeonPlayerX = playerX;
              camera.userData.dungeonPlayerZ = playerZ;
            };"""
          text = camera_pattern.sub(new_camera, text, count=1)

          scene_anchor = "      scene.add(roomRoot);\n      const architecturePromise = loadArchitecture(GLTFLoader);"
          if text.count(scene_anchor) != 1:
              raise SystemExit(f'clean floor invocation: expected exactly one match, found {text.count(scene_anchor)}')
          text = text.replace(
              scene_anchor,
              "      scene.add(roomRoot);\n      void cleanBossFloorLane(shell, current);\n      const architecturePromise = loadArchitecture(GLTFLoader);",
              1,
          )

          path.write_text(text)
          PY
      - name: Commit framing pass
        run: |
          if git diff --quiet; then
            echo "No framing changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx
          git commit -m "Refine world boss mobile framing [worldboss-framing]"
          git push origin HEAD:rework/worldboss-full-3d-arena
