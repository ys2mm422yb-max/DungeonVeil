name: Apply encounter pressure pass

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/dv-encounter-pressure-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply targeted balance and tactical room patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def patch_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Expected block not found in {path}: {old[:160]!r}')
              p.write_text(text.replace(old, new, 1))

          engine = 'artifacts/dungeon-rpg/src/game/runEngine.ts'
          patch_once(engine,
          """  skeleton: { hp: 52, attack: 8, defense: 2, speed: 62, size: 26, xp: 30, color: '#d1ccb0' },
  orc: { hp: 92, attack: 12, defense: 4, speed: 48, size: 30, xp: 42, color: '#627c38' },
  spider: { hp: 38, attack: 7, defense: 1, speed: 88, size: 22, xp: 28, color: '#342d42' },
  vampire: { hp: 82, attack: 14, defense: 3, speed: 82, size: 28, xp: 48, color: '#9e304b' },
  demon: { hp: 128, attack: 18, defense: 4, speed: 76, size: 32, xp: 58, color: '#c53827' },
  golem: { hp: 190, attack: 20, defense: 9, speed: 35, size: 34, xp: 70, color: '#696985' },
  boss: { hp: 520, attack: 24, defense: 7, speed: 54, size: 44, xp: 180, color: '#ff493a' },""",
          """  skeleton: { hp: 52, attack: 8, defense: 2, speed: 67, size: 26, xp: 30, color: '#d1ccb0' },
  orc: { hp: 92, attack: 12, defense: 4, speed: 53, size: 30, xp: 42, color: '#627c38' },
  spider: { hp: 38, attack: 7, defense: 1, speed: 96, size: 22, xp: 28, color: '#342d42' },
  vampire: { hp: 82, attack: 14, defense: 3, speed: 90, size: 28, xp: 48, color: '#9e304b' },
  demon: { hp: 128, attack: 18, defense: 4, speed: 82, size: 32, xp: 58, color: '#c53827' },
  golem: { hp: 190, attack: 20, defense: 9, speed: 40, size: 34, xp: 70, color: '#696985' },
  boss: { hp: 520, attack: 24, defense: 7, speed: 66, size: 44, xp: 180, color: '#ff493a' },""")
          patch_once(engine,
            "const count = Math.min(points.length, Math.min(8, 2 + room));",
            "const count = Math.min(points.length, Math.min(9, 2 + room + (room >= 4 ? 1 : 0)));"
          )
          patch_once(engine,
            "speed: base.speed, color: base.color, state: 'chase', targetX: x, targetY: y, nextAttackTime: now + 500, flashUntil: 0,",
            "speed: Math.round(base.speed * (1 + Math.min(0.16, Math.max(0, this.state.floor - 1) * 0.018) + Math.max(0, this.state.chapter - 1) * 0.06)), color: base.color, state: 'chase', targetX: x, targetY: y, nextAttackTime: now + 420 + index * 35, flashUntil: 0,"
          )

          layout = 'artifacts/dungeon-rpg/src/game/kaykitRoomLayout.ts'
          patch_once(layout,
          """    { asset: 'barrelDecorated', x: -2.9, z: -2.8 },

    { asset: 'wallShelves', x: RIGHT_WALL, z: -9.0, rotation: -Math.PI / 2 },""",
          """    { asset: 'barrelDecorated', x: -2.9, z: -2.8 },
    { asset: 'boxLarge', x: 2.7, z: -1.2, rotation: Math.PI / 2 },
    { asset: 'candle', x: 2.7, z: -2.25 },
    { asset: 'boxLarge', x: -2.5, z: 2.2 },
    { asset: 'candle', x: -2.5, z: 1.15 },

    { asset: 'wallShelves', x: RIGHT_WALL, z: -9.0, rotation: -Math.PI / 2 },""")
          patch_once(layout,
          """    { asset: 'torchMounted', x: LEFT_WALL, z: -0.4, rotation: Math.PI / 2 },
    { asset: 'torchMounted', x: RIGHT_WALL, z: -0.4, rotation: -Math.PI / 2 },
  ],""",
          """    { asset: 'torchMounted', x: LEFT_WALL, z: -0.4, rotation: Math.PI / 2 },
    { asset: 'torchMounted', x: RIGHT_WALL, z: -0.4, rotation: -Math.PI / 2 },
    { asset: 'column', x: -2.6, z: -3.2, scale: 1.08 },
    { asset: 'candle', x: -1.55, z: -3.2 },
    { asset: 'column', x: 2.6, z: 1.4, scale: 1.08 },
    { asset: 'candle', x: 1.55, z: 1.4 },
  ],""")
          PY
      - name: Commit patch to main
        shell: bash
        run: |
          git config user.name 'Dungeon Veil CI'
          git config user.email 'actions@users.noreply.github.com'
          git add artifacts/dungeon-rpg/src/game
          git commit -m 'Increase encounter pressure and shape tactical combat lanes' || exit 0
          git push origin HEAD:main
