name: Dungeon Veil Main Release

# Post-merge main validation trigger.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dungeon-veil-main-release.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-main-release
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      validated_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Resolve validated commit
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room, combat, world-boss and social audits
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build GitHub Pages application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.commit.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write in-app deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "${{ steps.commit.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  record:
    if: always()
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    steps:
      - name: Record final main release
        uses: actions/github-script@v7
        env:
          VALIDATED_SHA: ${{ needs.validate.outputs.validated_sha }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            const path = '.ci/dungeon-veil-main-release.json';
            const validatedCommit = process.env.VALIDATED_SHA || null;
            const success = process.env.VALIDATE_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success';
            const marker = {
              workflow: 'Dungeon Veil Main Release',
              status: success ? 'success' : 'failure',
              validatedCommit,
              deployedCommit: success ? validatedCommit : null,
              validationResult: process.env.VALIDATE_RESULT,
              deploymentResult: process.env.DEPLOY_RESULT,
              pageUrl: process.env.PAGE_URL || 'https://ys2mm422yb-max.github.io/DungeonVeil/',
              completedAt: new Date().toISOString(),
            };
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha,
              message: `Record Dungeon Veil main release ${success ? 'success' : 'failure'} for ${(validatedCommit || 'unknown').slice(0, 7)}`,
              content: Buffer.from(JSON.stringify(marker, null, 2) + '\n').toString('base64'),
            });
