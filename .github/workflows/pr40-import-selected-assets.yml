name: PR40 Import Selected Assets

on:
  push:
    branches:
      - work/blocks-1-7-production-pass
    paths:
      - '.github/workflows/pr40-import-selected-assets.yml'

permissions:
  contents: write

concurrency:
  group: pr40-import-selected-assets
  cancel-in-progress: true

jobs:
  import-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass
          fetch-depth: 0

      - name: Initialize diagnostics
        shell: bash
        run: |
          mkdir -p docs/ci
          {
            echo 'PR40 selected asset import'
            echo "started=$(date -u +%FT%TZ)"
            echo "commit=${GITHUB_SHA}"
          } > docs/ci/pr40-asset-import.log

      - name: Download official CC0 packs
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '--- install downloader ---'
            npm install --no-save playwright@1.55.0
            npx playwright install chromium
            echo '--- download packs ---'
            mkdir -p /tmp/packs
            node scripts/pr40-download-packs.cjs
            ls -lh /tmp/packs
          } 2>&1 | tee -a docs/ci/pr40-asset-import.log

      - name: Extract and select production assets
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '--- extract and convert ---'
            rm -rf /tmp/unpacked
            mkdir -p /tmp/unpacked/{easy,monsters,weapons,props}
            unzip -q '/tmp/packs/Easy Animated Enemy Pack - Jan 2019.zip' -d /tmp/unpacked/easy
            unzip -q '/tmp/packs/Monster Pack Animated by Quaternius.zip' -d /tmp/unpacked/monsters
            unzip -q '/tmp/packs/Medieval Weapons Pack by Quaternius.zip' -d /tmp/unpacked/weapons
            unzip -q '/tmp/packs/Fantasy Props MegaKit[Standard].zip' -d /tmp/unpacked/props

            DEST='artifacts/dungeon-rpg/public/assets/imported'
            rm -rf "$DEST"
            mkdir -p "$DEST/enemies" "$DEST/fantasy-props" "$DEST/medieval-weapons"

            copy_named() {
              local root="$1" filename="$2" out="$3" source
              source="$(find "$root" -type f -iname "$filename" -print -quit)"
              test -n "$source"
              cp "$source" "$out"
            }

            copy_named /tmp/unpacked/easy Rat.fbx "$DEST/enemies/Rat.fbx"
            copy_named /tmp/unpacked/easy Spider.fbx "$DEST/enemies/Spider.fbx"
            copy_named /tmp/unpacked/easy Snake_angry.fbx "$DEST/enemies/Snake_angry.fbx"
            copy_named /tmp/unpacked/monsters Bat.fbx "$DEST/enemies/Bat.fbx"
            copy_named /tmp/unpacked/monsters Slime.fbx "$DEST/enemies/Slime.fbx"

            PROPS=(
              Book_5 Book_7 Key_Metal Shelf_Simple Crate_Wooden Barrel_Holder
              FarmCrate_Apple Shelf_Small_Bottles Crate_Metal Barrel_Apples
              FarmCrate_Carrot Table_Large Chair_1 Table_Plate Table_Fork
              Banner_1_Cloth Banner_2_Cloth Torch_Metal CandleStick_Triple
              Barrel Anvil_Log Anvil
            )
            for name in "${PROPS[@]}"; do
              source="$(find /tmp/unpacked/props -type f -iname "$name.gltf" -print -quit)"
              test -n "$source"
              npx --yes @gltf-transform/cli@4.2.1 copy "$source" "$DEST/fantasy-props/$name.glb"
            done

            for name in Bow_Wooden Bow_Wooden2 Bow_Evil Bow_Golden; do
              source="$(find /tmp/unpacked/weapons -type f -iname "$name.obj" -print -quit)"
              test -n "$source"
              npx --yes obj2gltf@3.1.6 -i "$source" -o "$DEST/medieval-weapons/$name.glb" --binary
            done

            cat > "$DEST/LICENSES.md" <<'EOF'
# Imported asset licenses

The selected assets in this directory are from Quaternius and are provided under the Creative Commons Zero 1.0 Universal license (CC0 1.0).

Source packs:
- Fantasy Props MegaKit — https://quaternius.itch.io/fantasy-props-megakit
- LowPoly Animated Easy Enemies — https://quaternius.itch.io/animated-easy-enemies
- LowPoly Animated Monsters — https://quaternius.itch.io/lowpoly-animated-monsters
- LowPoly Medieval Weapons — https://quaternius.itch.io/lowpoly-medieval-weapons

Only files used by Dungeon Veil are included in the repository.
EOF

            echo 'Selected asset sizes:'
            find "$DEST" -type f -printf '%P %k KB\n' | sort
          } 2>&1 | tee -a docs/ci/pr40-asset-import.log

      - name: Validate selected paths
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '--- validate paths ---'
            DEST='artifacts/dungeon-rpg/public/assets/imported'
            for path in \
              enemies/Rat.fbx enemies/Spider.fbx enemies/Snake_angry.fbx enemies/Bat.fbx enemies/Slime.fbx \
              medieval-weapons/Bow_Wooden.glb medieval-weapons/Bow_Wooden2.glb medieval-weapons/Bow_Evil.glb medieval-weapons/Bow_Golden.glb \
              fantasy-props/Book_5.glb fantasy-props/Book_7.glb fantasy-props/Key_Metal.glb; do
              test -s "$DEST/$path"
              echo "ok $path"
            done
          } 2>&1 | tee -a docs/ci/pr40-asset-import.log

      - name: Commit result and diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "finished=$(date -u +%FT%TZ)" >> docs/ci/pr40-asset-import.log
          echo "job_status=${{ job.status }}" >> docs/ci/pr40-asset-import.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ '${{ job.status }}' = 'success' ]; then
            git add artifacts/dungeon-rpg/public/assets/imported
            git rm .github/workflows/pr40-import-selected-assets.yml scripts/pr40-download-packs.cjs docs/ci/pr40-asset-import.log
            message='Add selected Quaternius production assets'
          else
            git add docs/ci/pr40-asset-import.log
            message='Capture selected asset import failure'
          fi
          if git diff --cached --quiet; then
            echo 'Nothing to commit'
          else
            git commit -m "$message"
            git push origin HEAD:work/blocks-1-7-production-pass
          fi
