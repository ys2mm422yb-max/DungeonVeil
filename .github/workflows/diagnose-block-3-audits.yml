name: Diagnose Block 3 Audits

on:
  push:
    branches: [feat/block-3-equipped-village-player]
    paths:
      - '.ci/block3-diagnose.txt'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/block-3-equipped-village-player
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run audits separately
        shell: bash
        run: |
          set +e
          log=.ci/block3-audit.log
          : > "$log"
          scripts=(
            validate-all-rooms.mjs
            validate-production-rooms.mjs
            validate-spawn-hitboxes.mjs
            validate-enemy-visibility.mjs
            validate-mobile-combat.mjs
            validate-worldboss-performance.mjs
            validate-social-navigation.mjs
            validate-social-progression.mjs
          )
          for script in "${scripts[@]}"; do
            echo "### $script" >> "$log"
            node "artifacts/dungeon-rpg/scripts/$script" >> "$log" 2>&1
            echo "exit=$?" >> "$log"
            echo >> "$log"
          done
      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .ci/block3-audit.log
          git commit -m 'Record Block 3 audit diagnostics'
          git push origin HEAD:feat/block-3-equipped-village-player
