name: Menu Village Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - '.github/workflows/menu-village-diagnostic.yml'
  workflow_dispatch:

jobs:
  all-rooms:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Capture all-room audit
        id: audit
        shell: bash
        run: |
          set +e
          node artifacts/dungeon-rpg/scripts/validate-all-rooms.mjs > all-rooms.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload audit output
        uses: actions/upload-artifact@v4
        with:
          name: menu-all-rooms-diagnostic
          path: all-rooms.log
          if-no-files-found: error
      - name: Fail when audit failed
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1
