name: Apply portal callback type annotations

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    types: [opened, synchronize]
    paths:
      - .github/workflows/fix-portal-callback-types.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/loading-continuity-violet-portals
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply callback annotations
        run: node .github/scripts/fix-portal-callback-types.mjs
      - name: Commit renderer callback type fix
        run: |
          if git diff --quiet -- artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx; then
            echo "Portal callback types already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx
          git diff --cached --check
          git commit -m "Type portal animation callbacks"
          git push origin HEAD:fix/loading-continuity-violet-portals
