name: Product Autopilot QA

on:
  push:
    branches:
      - fix/guild-mail-equipment-currency-ux-v1
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/product-autopilot-qa.yml'
      - 'artifacts/dungeon-rpg/**'
      - 'supabase/migrations/**'
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/product-autopilot-qa.yml'
      - 'artifacts/dungeon-rpg/**'
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  product-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Verify focused UX contracts
        run: node artifacts/dungeon-rpg/tests/guild-mail-equipment-ux-contract.mjs
      - name: Verify complete TypeScript workspace
        run: pnpm run typecheck
      - name: Build production GitHub Pages output
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Audit local assets and Three runtime
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Audit solo, duo, guild, mailbox and social contracts
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:social
          pnpm --filter @workspace/dungeon-rpg audit:coop-realtime
          pnpm --filter @workspace/dungeon-rpg audit:economy
      - name: Audit rooms, bosses, world boss and spectator contracts
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm --filter @workspace/dungeon-rpg audit:worldboss
          pnpm --filter @workspace/dungeon-rpg audit:spectator

  automatic-product-journeys:
    needs: product-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: iphone-webkit
            browser: webkit
          - project: android-chromium
            browser: chromium
          - project: ipad-landscape-webkit
            browser: webkit
          - project: desktop-chromium
            browser: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Install deterministic browser runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@1.55.0 --lockfile=false
      - name: Install browser engine
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install --with-deps ${{ matrix.browser }}
      - name: Build branch under test
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Run automatic journeys and screenshots
        id: journeys
        env:
          DUNGEON_VEIL_URL: http://127.0.0.1:4173/DungeonVeil/
          BASE_PATH: /DungeonVeil/
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-autopilot-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/DungeonVeil/ > /dev/null; then break; fi
            sleep 1
          done
          curl --fail http://127.0.0.1:4173/DungeonVeil/ > /dev/null
          timeout --signal=TERM --kill-after=30s 42m pnpm --dir artifacts/dungeon-rpg exec playwright test \
            --config=playwright.regression.config.mjs \
            --project=${{ matrix.project }} \
            tests/autopilot-product-journeys.spec.mjs tests/guild-mail-equipment-visual.spec.mjs
      - name: Upload automatic screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-visual-evidence-${{ matrix.project }}
          if-no-files-found: error
          retention-days: 21
          compression-level: 6
          path: |
            artifacts/dungeon-rpg/test-results/autopilot-*-${{ matrix.project }}.png
            artifacts/dungeon-rpg/test-results/visual-*-${{ matrix.project }}.png
      - name: Upload reports and failure diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-results-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/full-game-results.json
            artifacts/dungeon-rpg/playwright-report/**
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/test-failed-*.png
            /tmp/dungeon-veil-autopilot-preview.log

  automatic-regression-report:
    if: always()
    needs:
      - product-contracts
      - automatic-product-journeys
    runs-on: ubuntu-latest
    env:
      CONTRACT_RESULT: ${{ needs.product-contracts.result }}
      JOURNEY_RESULT: ${{ needs.automatic-product-journeys.result }}
    steps:
      - name: Create, update or resolve the automatic regression issue
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- dungeon-veil-product-autopilot-qa -->';
            const title = '[Autopilot QA] Dungeon Veil regression detected';
            const { owner, repo } = context.repo;
            const failed = process.env.CONTRACT_RESULT !== 'success' || process.env.JOURNEY_RESULT !== 'success';
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const previous = issues.find(issue => !issue.pull_request && issue.title === title && issue.body?.includes(marker));
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            if (failed) {
              const body = [
                marker,
                '## Automatische Produktregression erkannt',
                '',
                `Commit: \`${context.sha}\``,
                `Branch: \`${context.ref.replace('refs/heads/', '')}\``,
                `Produktverträge: **${process.env.CONTRACT_RESULT}**`,
                `Browser-/Journey-Matrix: **${process.env.JOURNEY_RESULT}**`,
                '',
                `Diagnose, Screenshots, Videos und Traces: ${runUrl}`,
                '',
                'Der Fehler muss anhand des konkreten Logs oder Screenshots behoben werden. Tests dürfen nicht abgeschwächt werden.',
              ].join('\n');
              if (previous) {
                await github.rest.issues.update({ owner, repo, issue_number: previous.number, body });
                await github.rest.issues.createComment({ owner, repo, issue_number: previous.number, body: `Erneut fehlgeschlagen auf \`${context.sha}\`: ${runUrl}` });
              } else {
                await github.rest.issues.create({ owner, repo, title, body });
              }
            } else if (previous) {
              await github.rest.issues.createComment({ owner, repo, issue_number: previous.number, body: `Automatische Vollprüfung wieder grün auf \`${context.sha}\`: ${runUrl}` });
              await github.rest.issues.update({ owner, repo, issue_number: previous.number, state: 'closed', state_reason: 'completed' });
            }
