name: World Boss Diagnostic

on:
  push:
    branches: [rework/worldboss-full-3d-arena]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: World boss audit
        run: node artifacts/dungeon-rpg/scripts/validate-worldboss-performance.mjs
