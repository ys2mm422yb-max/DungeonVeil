name: One-shot PR 322 touch finalizer

on:
  push:
    branches:
      - fix/spectator-upgrade-resource-actions-v1
    paths:
      - '.github/workflows/one-shot-pr322-touch-finalize.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/spectator-upgrade-resource-actions-v1
          fetch-depth: 0
      - name: Apply focused touch fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('artifacts/dungeon-rpg')

          def replace_once(path, old, new):
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old[:100]!r}')
              path.write_text(text.replace(old, new, 1))

          def replace_all(path, old, new, minimum=1):
              text = path.read_text()
              count = text.count(old)
              if count < minimum:
                  raise SystemExit(f'{path}: expected at least {minimum} occurrences, found {count}: {old[:100]!r}')
              path.write_text(text.replace(old, new))

          menu = root / 'src/components/screens/MainMenuScreen.tsx'
          replace_once(menu, "import { armMobilePointerSafety } from '../../game/mobilePointerSafety';\n", '')
          replace_once(
              menu,
              'disabled={disabled} onPointerDown={event => { event.preventDefault(); if (!disabled) onClick(); }}',
              'disabled={disabled} onClick={event => { event.preventDefault(); event.stopPropagation(); if (!disabled) onClick(); }}',
          )
          replace_all(menu, 'armMobilePointerSafety(); ', '', minimum=3)
          replace_all(
              menu,
              'onPointerDown={event => { event.preventDefault(); setOverlay(null); }}',
              'onClick={event => { event.preventDefault(); event.stopPropagation(); setOverlay(null); }}',
              minimum=2,
          )
          replace_all(menu, 'onPointerDown={() => setOverlay(null)}', 'onClick={() => setOverlay(null)}', minimum=2)
          replace_all(menu, 'onPointerDown={event => event.stopPropagation()}', 'onClick={event => event.stopPropagation()}', minimum=2)
          replace_once(
              menu,
              "onPointerDown={event => { event.preventDefault(); setOverlay('online'); }}",
              "onClick={event => { event.preventDefault(); event.stopPropagation(); setOverlay('online'); }}",
          )

          badge = root / 'src/components/ProfileBadge.tsx'
          replace_once(badge, "import { armMobilePointerSafety } from '../game/mobilePointerSafety';\n", '')
          replace_once(badge, 'armMobilePointerSafety(); ', '')

          chamber = root / 'src/components/screens/VeilChamberScreenV4.tsx'
          replace_once(chamber, "import { armMobilePointerSafety } from '../../game/mobilePointerSafety';\n", '')
          replace_once(chamber, 'armMobilePointerSafety(); ', '')

          main = root / 'src/main.tsx'
          replace_once(main, "import { installMobilePointerSafety } from './game/mobilePointerSafety';\n", '')
          replace_once(main, 'installMobilePointerSafety();\n', '')

          visual = root / 'tests/visual-audit.spec.mjs'
          replace_once(
              visual,
              "  await locator.dispatchEvent('pointerdown', { pointerType: 'touch', button: 0, isPrimary: true });",
              '  await locator.tap();',
          )

          config = root / 'playwright.regression.config.mjs'
          replace_once(
              config,
              '|guild-mail-equipment-visual|autopilot-product-journeys|autopilot-outside-guild|kaykit-chapter-evidence)',
              '|guild-mail-equipment-visual|mobile-resource-upgrade|autopilot-product-journeys|autopilot-outside-guild|kaykit-chapter-evidence)',
          )

          menu_validator = root / 'scripts/validate-main-menu-equipped-ranger.mjs'
          text = menu_validator.read_text()
          text = text.replace(', chamber, pointerSafety, main] = await Promise.all([', ', chamber] = await Promise.all([')
          text = text.replace("  read('../src/game/mobilePointerSafety.ts'),\n  read('../src/main.tsx'),\n", '')
          lines = []
          for line in text.splitlines():
              if 'top resource actions still use unsafe pointer-down navigation' in line:
                  lines.append("  [menu.includes('main-menu-dust-button') && menu.includes('props.onVeilChamber()') && menu.includes(\"setOverlay(current => current === 'more' ? null : 'more')\") && menu.includes('disabled={disabled} onClick={event =>') && !menu.includes('armMobilePointerSafety') && !menu.includes('main-menu-dust-button\" type=\"button\" onPointerDown'), 'top resource and menu actions still use unsafe pointer-down navigation'],")
              elif 'equipment upgrade is not protected against mobile click-through' in line:
                  lines.append("  [chamber.includes('onPointerUp={event => { event.preventDefault(); event.stopPropagation(); window.setTimeout(upgrade, 0); }}') && chamber.includes('onClick={event => { event.preventDefault(); event.stopPropagation(); }}') && chamber.includes('equipment-upgrade-button') && !chamber.includes('armMobilePointerSafety'), 'equipment upgrade is not locally isolated from mobile follow-up clicks'],")
              elif 'mobile pointer safety guard is not installed' in line:
                  continue
              else:
                  lines.append(line)
          menu_validator.write_text('\n'.join(lines) + '\n')

          upgrade_validator = root / 'scripts/validate-upgrade-economy.mjs'
          text = upgrade_validator.read_text()
          lines = []
          for line in text.splitlines():
              if 'upgrade action is not isolated from pointer navigation and follow-up ghost clicks' in line:
                  lines.append("  [inventory.includes('data-testid=\"equipment-upgrade-button\"') && inventory.includes('onPointerDown={event => { event.preventDefault(); event.stopPropagation(); }}') && inventory.includes('onPointerUp={event => { event.preventDefault(); event.stopPropagation(); window.setTimeout(upgrade, 0); }}') && inventory.includes('onClick={event => { event.preventDefault(); event.stopPropagation(); }}') && !inventory.includes('armMobilePointerSafety'), 'upgrade action is not locally isolated from pointer navigation and follow-up clicks'],")
              else:
                  lines.append(line)
          upgrade_validator.write_text('\n'.join(lines) + '\n')

          safety = root / 'src/game/mobilePointerSafety.ts'
          if not safety.exists():
              raise SystemExit('mobilePointerSafety.ts already missing')
          safety.unlink()
          PY
      - name: Verify focused contracts
        run: |
          node artifacts/dungeon-rpg/scripts/validate-main-menu-equipped-ranger.mjs
          node artifacts/dungeon-rpg/scripts/validate-upgrade-economy.mjs
          grep -q 'mobile-resource-upgrade' artifacts/dungeon-rpg/playwright.regression.config.mjs
          ! grep -R 'armMobilePointerSafety\|installMobilePointerSafety' artifacts/dungeon-rpg/src
      - name: Commit focused fix and remove helper
        shell: bash
        run: |
          git rm .github/workflows/one-shot-pr322-touch-finalize.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add artifacts/dungeon-rpg
          git commit -m 'Finalize mobile touch actions and upgrade isolation'
          git push origin HEAD:fix/spectator-upgrade-resource-actions-v1
