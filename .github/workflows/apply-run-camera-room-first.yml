name: Apply room-first run camera

on:
  push:
    branches: [fix/run-camera-room-first-composition]
    paths: ['.github/workflows/apply-run-camera-room-first.yml']

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply validated camera base and room-first framing
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin fix/run-camera-player-framing
          git checkout origin/fix/run-camera-player-framing -- \
            artifacts/dungeon-rpg/src/components/CombatStage.tsx \
            artifacts/dungeon-rpg/src/components/RunCameraRig.ts
          python3 - <<'PY'
          from pathlib import Path
          path = Path('artifacts/dungeon-rpg/src/components/RunCameraRig.ts')
          text = path.read_text()
          replacements = {
            "if (aspect < 0.55) return { height: 16.9, distance: 20.8, lookAhead: 3.75 };": "if (aspect < 0.55) return { height: 20.2, distance: 21.7, lookAhead: 2.35 };",
            "if (aspect < 0.68) return { height: 17.5, distance: 21.8, lookAhead: 3.5 };": "if (aspect < 0.68) return { height: 19.6, distance: 22.4, lookAhead: 2.55 };",
            "return { height: RUN_CAMERA.height, distance: RUN_CAMERA.distance, lookAhead: 3.2 };": "return { height: 19.0, distance: 22.8, lookAhead: 2.75 };",
            "let focusZ = clamp(centeredPlayerZ - 0.95, minZ, maxZ);": "let focusZ = clamp(centeredPlayerZ - 0.18, minZ, maxZ);",
            "camera.lookAt(focusX, RUN_CAMERA.lookHeight, focusZ - frame.lookAhead);": "camera.lookAt(focusX, 0.9, focusZ - frame.lookAhead);"
          }
          for old, new in replacements.items():
            if old not in text:
              raise SystemExit(f'marker not found: {old}')
            text = text.replace(old, new)
          path.write_text(text)
          PY
          rm .github/workflows/apply-run-camera-room-first.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reframe run camera around the playable room"
          git push origin HEAD:fix/run-camera-room-first-composition
