name: Apply telegraph and gift VFX pass

on:
  push:
    branches: [main]
    paths:
      - '.github/dv-telegraph-gift-vfx-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch telegraph and gift VFX
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx')
          text = path.read_text()

          def patch(old, new):
              global text
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Expected block missing: {old[:220]!r}')
              text = text.replace(old, new, 1)

          old_circle = """      for (const effect of effects) {
        let visual = circleVisuals.get(effect.id);
        if (!visual) {
          visual = new THREE.Group();
          const ring = new THREE.Mesh(
            new THREE.RingGeometry(0.72, 1, IS_ANDROID ? 20 : 32),
            new THREE.MeshBasicMaterial({ color: effect.color, transparent: true, opacity: 0.9, side: THREE.DoubleSide, depthWrite: false }),
          );
          ring.rotation.x = -Math.PI / 2;
          visual.add(ring);
          if (!IS_ANDROID && (effect.element === 'fire' || effect.element === 'arcane')) {
            const light = new THREE.PointLight(effect.color, effect.element === 'fire' ? 5 : 3.6, 5, 2);
            light.position.y = 0.5;
            visual.add(light);
            visual.userData.light = light;
          }
          visual.userData.ring = ring;
          scene.add(visual);
          circleVisuals.set(effect.id, visual);
        }
        const progress = Math.max(0, Math.min(1, effect.lifeTime / effect.maxLifeTime));
        const scale = Math.max(0.05, effect.maxRadius / TILE * progress);
        visual.position.set(mapX(state, effect.x), 0.045, mapZ(state, effect.y));
        visual.scale.setScalar(scale);
        visual.userData.ring.material.opacity = Math.max(0, 0.9 * (1 - progress));
        if (visual.userData.light) visual.userData.light.intensity = (effect.element === 'fire' ? 5 : 3.6) * (1 - progress);
      }"""
          new_circle = """      for (const effect of effects) {
        let visual = circleVisuals.get(effect.id);
        const isTelegraph = effect.id.startsWith('telegraph-');
        if (!visual) {
          visual = new THREE.Group();
          const ring = new THREE.Mesh(
            new THREE.RingGeometry(isTelegraph ? 0.82 : 0.72, 1, IS_ANDROID ? 20 : 32),
            new THREE.MeshBasicMaterial({ color: effect.color, transparent: true, opacity: 0.9, side: THREE.DoubleSide, depthWrite: false }),
          );
          ring.rotation.x = -Math.PI / 2;
          visual.add(ring);
          if (isTelegraph) {
            const timerRing = new THREE.Mesh(
              new THREE.RingGeometry(0.9, 1, IS_ANDROID ? 18 : 28),
              new THREE.MeshBasicMaterial({ color: effect.color, transparent: true, opacity: 0.96, side: THREE.DoubleSide, depthWrite: false }),
            );
            timerRing.rotation.x = -Math.PI / 2;
            timerRing.position.y = 0.008;
            visual.add(timerRing);
            visual.userData.timerRing = timerRing;
          }
          if (!IS_ANDROID && !isTelegraph && (effect.element === 'fire' || effect.element === 'arcane')) {
            const light = new THREE.PointLight(effect.color, effect.element === 'fire' ? 5 : 3.6, 5, 2);
            light.position.y = 0.5;
            visual.add(light);
            visual.userData.light = light;
          }
          visual.userData.ring = ring;
          visual.userData.telegraph = isTelegraph;
          scene.add(visual);
          circleVisuals.set(effect.id, visual);
        }
        const progress = Math.max(0, Math.min(1, effect.lifeTime / effect.maxLifeTime));
        const radiusScale = Math.max(0.05, effect.maxRadius / TILE);
        visual.position.set(mapX(state, effect.x), 0.045, mapZ(state, effect.y));
        if (visual.userData.telegraph) {
          visual.scale.setScalar(radiusScale);
          visual.userData.ring.material.opacity = 0.38 + progress * 0.42;
          visual.userData.ring.scale.setScalar(1 + Math.sin(progress * Math.PI * 5) * 0.035);
          if (visual.userData.timerRing) {
            visual.userData.timerRing.scale.setScalar(Math.max(0.14, 1 - progress * 0.86));
            visual.userData.timerRing.material.opacity = 0.96;
          }
        } else {
          visual.scale.setScalar(Math.max(0.05, radiusScale * progress));
          visual.userData.ring.material.opacity = Math.max(0, 0.9 * (1 - progress));
          if (visual.userData.light) visual.userData.light.intensity = (effect.element === 'fire' ? 5 : 3.6) * (1 - progress);
        }
      }"""
          patch(old_circle, new_circle)

          patch(
              "const color = key === 'maxHp' ? 0x71ef9f : key === 'defense' ? 0x72d6a5 : key === 'speed' ? 0xa7efff : 0xd8b6ff;",
              "const color = key === 'maxHp' ? 0x71ef9f\n          : key === 'defense' ? 0x72d6a5\n            : key === 'speed' ? 0xa7efff\n              : key === 'attack' ? 0xffc56f\n                : key === 'attackSpeed' ? 0xffef9b\n                  : key === 'fireArrow' ? 0xff642c\n                    : key === 'iceArrow' ? 0x62d9ff\n                      : key === 'multishot' ? 0x91e6c0\n                        : key === 'piercing' ? 0xf3fbff\n                          : key === 'ricochet' ? 0xb693ff\n                            : 0xd8b6ff;"
          )

          path.write_text(text)
          PY
      - name: Commit VFX pass
        shell: bash
        run: |
          git config user.name 'Dungeon Veil CI'
          git config user.email 'actions@users.noreply.github.com'
          git add artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx
          git commit -m 'Clarify enemy telegraphs and color every room gift' || exit 0
          git push origin HEAD:main
