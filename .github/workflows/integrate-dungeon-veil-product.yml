name: Integrate Dungeon Veil Product

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/integrate-dungeon-veil-product.yml'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  prepare-integration:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build conflict-free integration branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main work/blocks-1-7-production-pass
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B integration/dungeon-veil-main origin/main
          git merge -s ours --no-ff origin/work/blocks-1-7-production-pass -m "Merge Dungeon Veil production history"
          git read-tree --reset -u origin/work/blocks-1-7-production-pass
          git add -A
          git commit -m "Adopt validated Dungeon Veil product snapshot"
          git push --force-with-lease origin HEAD:integration/dungeon-veil-main

  validate-integration:
    if: github.event_name == 'pull_request' && github.head_ref == 'integration/dungeon-veil-main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout integration result
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact validated product snapshot
        shell: bash
        run: |
          git fetch origin work/blocks-1-7-production-pass
          git diff --exit-code origin/work/blocks-1-7-production-pass HEAD

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room, combat, world-boss and social audits
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build GitHub Pages artifact
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages
