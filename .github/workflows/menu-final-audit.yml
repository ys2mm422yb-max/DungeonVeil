name: Temporary Menu Final Audit

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  isolate:
    if: github.head_ref == 'fix/menu-village-visible-mobile'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture exact room audit chain
        working-directory: artifacts/dungeon-rpg
        shell: bash
        run: |
          mkdir -p audit-output
          set +e
          overall=0
          for script in \
            validate-all-rooms.mjs \
            validate-production-rooms.mjs \
            validate-spawn-hitboxes.mjs \
            validate-enemy-visibility.mjs \
            validate-mobile-combat.mjs \
            validate-worldboss-performance.mjs \
            validate-social-navigation.mjs \
            validate-social-progression.mjs; do
            echo "===== $script =====" | tee "audit-output/$script.log"
            node "scripts/$script" 2>&1 | tee -a "audit-output/$script.log"
            code=${PIPESTATUS[0]}
            echo "$code" > "audit-output/$script.exit"
            if [ "$code" -ne 0 ]; then overall=1; fi
          done
          echo "$overall" > audit-output/overall.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: menu-final-audit
          path: artifacts/dungeon-rpg/audit-output
