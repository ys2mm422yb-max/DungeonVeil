name: Main Menu V14 Polish

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/main-menu-v14-polish.yml'

permissions:
  contents: write

jobs:
  polish-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Apply the approved main-menu polish
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str):
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f'missing marker in {path}: {old[:120]!r}')
              path.write_text(text.replace(old, new, 1))

          village = Path('artifacts/dungeon-rpg/src/components/ModernVillageSquareScene.tsx')
          replace_once(village,
            "  { key: 'bench', pack: 'furniture', include: /bench/i },\n  { key: 'table', pack: 'furniture', include: /table/i },\n  { key: 'crate', pack: 'resources', include: /crate/i },",
            "  { key: 'bench', pack: 'furniture', include: /bench/i },\n  { key: 'crate', pack: 'resources', include: /crate/i },")
          replace_once(village,
            "  villageRoot.userData.skinnedKeepersUseOriginalScenes = true;\n  scene.add(villageRoot);",
            "  villageRoot.userData.skinnedKeepersUseOriginalScenes = true;\n  villageRoot.userData.clearPlayerSilhouette = true;\n  scene.add(villageRoot);")
          replace_once(village,
            """    gate: [[0, -0.35, -9.2, 1.85, Math.PI, 'VillageGate']],
    pillar: [[-3.55, -0.08, -7.0, 1.35, 0, 'VillagePillarLeft'], [3.55, -0.08, -7.0, 1.35, 0, 'VillagePillarRight']],
    banner: [[-3.75, 2.25, -8.0, 1.05, Math.PI, 'VillageBannerLeft'], [3.75, 2.25, -8.0, 1.05, Math.PI, 'VillageBannerRight']],
    torch: [[-2.5, 0.84, -5.8, 1.2, Math.PI, 'VillageTorchLeft'], [2.5, 0.84, -5.8, 1.2, Math.PI, 'VillageTorchRight']],
    bench: [[-3.25, 0, -2.8, 1.0, 1.2, 'VillageBenchLeft'], [3.25, 0, -2.8, 1.0, -1.2, 'VillageBenchRight']],
    crate: [[-4.0, 0, -1.2, 0.9, -0.16, 'VillageCrateLeft'], [4.0, 0, -1.2, 0.9, 0.16, 'VillageCrateRight']],
    barrel: [[-4.25, 0, -1.85, 0.88, 0.12, 'VillageBarrelLeft'], [4.25, 0, -1.85, 0.88, -0.12, 'VillageBarrelRight']],
    rock: [[-4.15, 0, -4.4, 0.95, -0.32, 'VillageRockLeft'], [4.15, 0, -4.4, 0.95, 0.32, 'VillageRockRight']],
    table: [[-3.0, 0, -0.7, 0.95, 0.14, 'QuestTable'], [3.0, 0, -0.7, 0.95, -0.14, 'PostTable']],
    mira: [[-3.1, 0, -1.5, 0.56, 0.18, 'MiraQuestKeeper']],
    orin: [[3.1, 0, -1.5, 0.56, -0.18, 'OrinPostKeeper']],
    tala: [[-3.2, 0, -4.0, 0.54, 0.1, 'TalaScoutKeeper']],
    brom: [[3.2, 0, -4.0, 0.54, -0.1, 'BromGuildKeeper']],""",
            """    gate: [[0, -0.35, -10.15, 1.62, Math.PI, 'VillageGate']],
    pillar: [[-4.05, -0.08, -7.45, 1.24, 0, 'VillagePillarLeft'], [4.05, -0.08, -7.45, 1.24, 0, 'VillagePillarRight']],
    banner: [[-4.18, 2.15, -8.15, 0.96, Math.PI, 'VillageBannerLeft'], [4.18, 2.15, -8.15, 0.96, Math.PI, 'VillageBannerRight']],
    torch: [[-3.05, 0.82, -6.2, 1.08, Math.PI, 'VillageTorchLeft'], [3.05, 0.82, -6.2, 1.08, Math.PI, 'VillageTorchRight']],
    bench: [[-4.0, 0, -3.1, 0.88, 1.2, 'VillageBenchLeft'], [4.0, 0, -3.1, 0.88, -1.2, 'VillageBenchRight']],
    crate: [[-4.45, 0, -1.55, 0.76, -0.16, 'VillageCrateLeft'], [4.45, 0, -1.55, 0.76, 0.16, 'VillageCrateRight']],
    barrel: [[-4.62, 0, -2.05, 0.76, 0.12, 'VillageBarrelLeft'], [4.62, 0, -2.05, 0.76, -0.12, 'VillageBarrelRight']],
    rock: [[-4.45, 0, -4.7, 0.82, -0.32, 'VillageRockLeft'], [4.45, 0, -4.7, 0.82, 0.32, 'VillageRockRight']],
    mira: [[-4.05, 0, -2.05, 0.48, 0.28, 'MiraQuestKeeper']],
    orin: [[4.05, 0, -2.05, 0.48, -0.28, 'OrinPostKeeper']],
    tala: [[-4.28, 0, -4.65, 0.46, 0.18, 'TalaScoutKeeper']],
    brom: [[4.28, 0, -4.65, 0.46, -0.18, 'BromGuildKeeper']],""")
          replace_once(village,
            """      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x242127);
      scene.fog = new THREE.Fog(0x242127, 14, 31);""",
            """      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x29252b);
      scene.fog = new THREE.Fog(0x29252b, 16, 34);""")
          replace_once(village,
            "renderer.toneMappingExposure = IS_MOBILE ? 1.36 : 1.22;",
            "renderer.toneMappingExposure = IS_MOBILE ? 1.46 : 1.32;")
          replace_once(village,
            """      const camera = new THREE.PerspectiveCamera(37, 1, 0.1, 80);
      camera.position.set(0, 6.25, 14.6);
      camera.lookAt(0, 0.85, -3.65);""",
            """      const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 80);
      camera.position.set(0, 5.35, 13.2);
      camera.lookAt(0, 1.02, -2.85);""")
          replace_once(village, "color: 0x40362e, roughness: 0.96", "color: 0x4a3c32, roughness: 0.96")
          replace_once(village, "color: 0x76604a, roughness: 0.9", "color: 0x806a50, roughness: 0.9")
          replace_once(village,
            """      plaza.position.set(0, 0.035, -3.7);
      plaza.scale.z = 0.78;""",
            """      plaza.position.set(0, 0.035, -3.2);
      plaza.scale.z = 0.78;""")
          replace_once(village, "color: 0x5a493c, roughness: 0.92", "color: 0x685447, roughness: 0.92")
          replace_once(village,
            "new THREE.MeshBasicMaterial({ color: 0xdab56f, transparent: true, opacity: 0.42, side: THREE.DoubleSide, depthWrite: false })",
            "new THREE.MeshBasicMaterial({ color: 0xe6bf76, transparent: true, opacity: 0.46, side: THREE.DoubleSide, depthWrite: false })")
          replace_once(village, "centralMark.position.set(0, 0.14, -3.7);", "centralMark.position.set(0, 0.14, -3.2);")
          replace_once(village,
            """        { x: -3.7, z: -1.5, rot: 0.18, color: 0x8a5632 },
        { x: 3.7, z: -1.5, rot: -0.18, color: 0x3e7180 },
        { x: -3.7, z: -4.2, rot: 0.1, color: 0x4f7755 },
        { x: 3.7, z: -4.2, rot: -0.1, color: 0x754b68 },""",
            """        { x: -4.15, z: -1.7, rot: 0.2, color: 0x8a5632 },
        { x: 4.15, z: -1.7, rot: -0.2, color: 0x3e7180 },
        { x: -4.2, z: -4.45, rot: 0.14, color: 0x4f7755 },
        { x: 4.2, z: -4.45, rot: -0.14, color: 0x754b68 },""")
          replace_once(village,
            """      scene.add(new THREE.HemisphereLight(0xffe2bd, 0x252936, 1.35));
      scene.add(new THREE.AmbientLight(0xffead0, 0.52));
      const key = new THREE.DirectionalLight(0xffc77e, 2.15);
      key.position.set(-4.5, 10, 7);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0x92a6e5, 0.72);
      fill.position.set(5.5, 8, 0);
      scene.add(fill);
      const plazaLight = new THREE.PointLight(0xffb45f, IS_MOBILE ? 1.85 : 2.45, 11, 2);
      plazaLight.position.set(0, 2.0, -4.8);
      scene.add(plazaLight);""",
            """      scene.add(new THREE.HemisphereLight(0xffe5c6, 0x2a3040, 1.48));
      scene.add(new THREE.AmbientLight(0xffead4, 0.58));
      const key = new THREE.DirectionalLight(0xffc77e, 2.45);
      key.position.set(-4.5, 10, 7);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0x9ab2ef, 0.92);
      fill.position.set(5.5, 8, 0);
      scene.add(fill);
      const plazaLight = new THREE.PointLight(0xffb45f, IS_MOBILE ? 1.35 : 1.8, 10, 2);
      plazaLight.position.set(0, 1.8, -4.25);
      scene.add(plazaLight);
      const playerKey = new THREE.PointLight(0xffd39a, IS_MOBILE ? 3.0 : 3.6, 7.5, 2);
      playerKey.position.set(-0.85, 2.75, -0.45);
      scene.add(playerKey);
      const playerRim = new THREE.PointLight(0x8fa9ff, IS_MOBILE ? 1.05 : 1.35, 6.5, 2);
      playerRim.position.set(2.5, 2.1, -2.6);
      scene.add(playerRim);""")
          replace_once(village, "camera.fov = camera.aspect < 0.72 ? 44 : 38;", "camera.fov = camera.aspect < 0.72 ? 41 : 36;")
          replace_once(village,
            """        plazaLight.intensity = (IS_MOBILE ? 1.7 : 2.25) + Math.sin(now * 0.0022) * 0.18;
        centralMark.material.opacity = 0.34 + Math.sin(now * 0.0018) * 0.08;
        keepers.forEach(keeper => { keeper.position.y = Math.sin(now * 0.0014 + keeper.userData.villagePhase) * 0.022; });""",
            """        plazaLight.intensity = (IS_MOBILE ? 1.25 : 1.65) + Math.sin(now * 0.0022) * 0.12;
        playerKey.intensity = (IS_MOBILE ? 2.85 : 3.45) + Math.sin(now * 0.0017) * 0.12;
        centralMark.material.opacity = 0.4 + Math.sin(now * 0.0018) * 0.06;
        keepers.forEach(keeper => { keeper.position.y = Math.sin(now * 0.0014 + keeper.userData.villagePhase) * 0.016; });""")
          replace_once(village,
            """        villagePlayerRig = rig;
        rig.root.position.set(0, -0.02, -2.85);
        rig.root.rotation.y = 0.08;
        rig.root.scale.setScalar(0.52);
        scene.add(rig.root);""",
            """        villagePlayerRig = rig;
        scene.add(rig.root);""")

          showcase = Path('artifacts/dungeon-rpg/src/components/kaykitVillagePlayer3D.ts')
          replace_once(showcase, "root.userData.presentation = 'village-showcase-v12-clean-ranger';", "root.userData.presentation = 'village-showcase-v14-player-focus';")
          replace_once(showcase, "root.userData.showcasePose = 'v12-idle-b-clean-side-loadout';", "root.userData.showcasePose = 'v14-idle-b-readable-loadout';")
          replace_once(showcase, "equipmentRoot.name = 'VillageCleanLoadout';", "equipmentRoot.name = 'VillageReadableLoadout';")
          replace_once(showcase,
            """    1.3,
    [-0.82, 0.84, 0.06],
    [Math.PI / 2, 0.04, 0.06],""",
            """    1.58,
    [-0.92, 0.94, 0.3],
    [Math.PI / 2, 0.03, 0.12],""")
          replace_once(showcase,
            """    0.9,
    [0.68, 0.98, -0.18],
    [0.08, -0.2, -0.16],""",
            """    1.08,
    [0.8, 1.08, 0.18],
    [0.08, -0.38, -0.22],""")
          replace_once(showcase,
            """    meta.equipped.talisman === 'frost-grimoire' ? 0.24 : 0.17,
    [0.02, 1.02, 0.23],""",
            """    meta.equipped.talisman === 'frost-grimoire' ? 0.28 : 0.2,
    [0.02, 1.08, 0.38],""")
          replace_once(showcase,
            """  root.userData.visibleEquipment = {
    bow: Boolean(bowHolder),
    quiver: Boolean(quiverHolder),
    talisman: Boolean(talismanHolder),
  };""",
            """  let arrowCount = 0;
  if (quiverHolder && weapons.arrow) {
    for (let index = 0; index < 3; index++) {
      const arrow = weapons.arrow.clone(true);
      const arrowHolder = addPresentationModel(
        THREE,
        quiverHolder,
        arrow,
        `VillageVisibleQuiverArrow${index + 1}`,
        0.72,
        [(index - 1) * 0.08, 0.32 + (index % 2) * 0.04, -0.02],
        [0.02, 0, (index - 1) * 0.05],
      );
      if (arrowHolder) arrowCount++;
    }
  }

  root.userData.visibleEquipment = {
    bow: Boolean(bowHolder),
    quiver: Boolean(quiverHolder),
    talisman: Boolean(talismanHolder),
    arrows: arrowCount,
  };""")
          replace_once(showcase,
            """      cleanSingleBody: true,
      depthTestedEquipment: true,""",
            """      cleanSingleBody: true,
      depthTestedEquipment: true,
      playerFocusedScale: 0.72,""")
          replace_once(showcase, "  let shrineHidden = false;\n", "")
          replace_once(showcase,
            """      root.position.y = -0.06 + Math.sin(elapsed * 1.25) * 0.01;
      root.position.z = -2.42;
      root.rotation.y = 0.04;
      root.scale.setScalar(0.58);

      if (!shrineHidden) {
        const shrine = root.parent?.getObjectByName?.('VillageSquareShrine');
        if (shrine) {
          shrine.visible = false;
          shrineHidden = true;
        }
      }""",
            """      root.position.y = -0.08 + Math.sin(elapsed * 1.18) * 0.008;
      root.position.z = -1.82;
      root.rotation.y = -0.025;
      root.scale.setScalar(0.72);""")

          audit = Path('artifacts/dungeon-rpg/scripts/validate-main-menu-equipped-ranger.mjs')
          audit.write_text('''import { readFile } from 'node:fs/promises';

const read = relative => readFile(new URL(relative, import.meta.url), 'utf8');
const [village, showcase, player, weapons, manifest, meta] = await Promise.all([
  read('../src/components/ModernVillageSquareScene.tsx'),
  read('../src/components/kaykitVillagePlayer3D.ts'),
  read('../src/components/kaykitPlayer3D.ts'),
  read('../src/components/kaykitWeapons3D.ts'),
  read('../src/components/kaykitManifest3D.ts'),
  read('../src/game/metaProgression.ts'),
]);

const checks = [
  [village.includes("import { loadKayKitVillageArcher } from './kaykitVillagePlayer3D';") && village.includes('loadKayKitVillageArcher(THREE, GLTFLoader)'), 'main menu is not routed through the village player adapter'],
  [showcase.includes("root.userData.presentation = 'village-showcase-v14-player-focus'") && showcase.includes("root.userData.showcasePose = 'v14-idle-b-readable-loadout'"), 'focused V14 Ranger presentation mode is missing'],
  [showcase.includes('KAYKIT_PLAYER_ASSETS.ranger') && showcase.includes("visual.name = 'VillageRunRangerBody'"), 'menu does not use the same Ranger body as a run'],
  [showcase.includes("clipKey(clip).includes('idle_b')") && showcase.includes('new THREE.AnimationMixer(visual)'), 'calm Ranger Idle_B is not driving the menu body'],
  [showcase.includes("equipmentRoot.name = 'VillageReadableLoadout'") && !showcase.includes('loadKayKitRanger(THREE'), 'menu still reuses duplicate combat attachments'],
  [showcase.includes('material.depthTest = true') && showcase.includes('material.depthWrite = true') && !showcase.includes('material.depthTest = false'), 'menu equipment can still draw through the Ranger body'],
  [showcase.includes("'VillageVisibleEquippedBow'") && showcase.includes("'VillageVisibleEquippedQuiver'") && showcase.includes("'VillageVisibleEquippedTalisman'"), 'clean visible equipment anchors are incomplete'],
  [showcase.includes('bow: meta.equipped.bow') && showcase.includes('quiver: meta.equipped.quiver') && showcase.includes('talisman: meta.equipped.talisman'), 'village showcase does not preserve the current equipped loadout'],
  [showcase.includes('for (let index = 0; index < 3; index++)') && showcase.includes('VillageVisibleQuiverArrow'), 'quiver arrows are not visibly represented'],
  [showcase.includes('root.position.z = -1.82') && showcase.includes('root.scale.setScalar(0.72)'), 'player is not large and forward enough to dominate the menu composition'],
  [village.includes('villageRoot.userData.clearPlayerSilhouette = true') && village.includes('skinnedKeepersUseOriginalScenes = true'), 'village NPCs can still overlap the central player silhouette'],
  [!village.includes("{ key: 'table'") && !village.includes('QuestTable') && !village.includes('PostTable'), 'lamp-table assets can still appear as white cones in front of the NPCs'],
  [village.includes("mira: [[-4.05") && village.includes("orin: [[4.05") && village.includes("tala: [[-4.28") && village.includes("brom: [[4.28"), 'village keepers are not pushed to the side lanes'],
  [village.includes('camera.position.set(0, 5.35, 13.2)') && village.includes('camera.fov = camera.aspect < 0.72 ? 41 : 36'), 'mobile camera does not prioritize the player'],
  [village.includes('const playerKey = new THREE.PointLight') && village.includes('const playerRim = new THREE.PointLight'), 'player-focused key and rim lighting are missing'],
  [showcase.includes('function resolveVillageAssetUrl') && showcase.includes('new URL(NORMALIZED_APP_BASE_URL, window.location.origin)') && showcase.includes('return new URL(relative, appBase).href'), 'menu asset URLs are not resolved against the Pages base exactly once'],
  [player.includes('KAYKIT_PLAYER_ASSETS.ranger') && player.includes('Ranger.glb'), 'shared player rig no longer uses the in-game Ranger body'],
  [weapons.includes('const cacheKey = equipped?.bowId') && weapons.includes("definition?.slot === 'bow'"), 'equipped bow selection is not wired to the model loader'],
  [weapons.includes('loader.loadAsync(modelUrl(manifest, bowPath))') && weapons.includes('loader.loadAsync(modelUrl(manifest, arrowPath))'), 'equipped weapon loader is not using manifest URLs'],
  [manifest.includes('import.meta.env.BASE_URL') && manifest.includes('appAssetUrl'), 'Pages-safe application asset resolver is missing'],
  [meta.includes("equipped: Record<EquipmentSlot, EquipmentId>") && meta.includes("equipped: { bow: 'ash-bow', quiver: 'ranger-quiver', talisman: 'veil-key' }"), 'equipment slots are not represented in saved meta progression'],
];

const failures = checks.filter(([ok]) => !ok).map(([, message]) => message);
if (failures.length) {
  console.error(`Main-menu equipped ranger audit failed with ${failures.length} error(s):`);
  failures.forEach(message => console.error(`  - ${message}`));
  process.exit(1);
}

console.log('Main-menu equipped ranger audit passed: lamps are gone, NPCs stay in side lanes and one enlarged Ranger clearly shows the current bow, quiver, arrows and talisman.');
''')

          workflow = Path('.github/workflows/main-menu-v14-polish.yml')
          workflow.unlink(missing_ok=True)
          PY
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Main-menu and full room audits
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck
        run: pnpm run typecheck
      - name: Production build
        run: pnpm --dir artifacts/dungeon-rpg run build
      - name: Commit the validated V14 polish
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Polish the main-menu player focus and village composition'
          git push origin HEAD:fix/main-menu-equipped-ranger
