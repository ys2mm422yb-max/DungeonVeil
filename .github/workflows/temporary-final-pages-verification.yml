name: Temporary final Pages content verification

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance

permissions:
  contents: read

jobs:
  verify-live-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Resolve live product commit and prove source equivalence
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --max-time 30 \
            -H 'Cache-Control: no-cache' \
            "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?verify=${GITHUB_SHA}" \
            -o live-deployment.json
          live_commit=$(node -e "const fs=require('fs');const value=JSON.parse(fs.readFileSync('live-deployment.json','utf8')).commit;if(!/^[0-9a-f]{40}$/i.test(value||''))process.exit(1);process.stdout.write(value)")
          git fetch origin fix/mobile-telegraphs-room-21-50-balance
          git cat-file -e "${live_commit}^{commit}"
          git diff --name-only "$live_commit" origin/fix/mobile-telegraphs-room-21-50-balance | tee product-diff.txt
          if grep -Ev '^(\.ci/|\.github/)' product-diff.txt | grep -q .; then
            echo 'Live product commit differs from target product source.' >&2
            exit 1
          fi
          echo "LIVE_BUILD_SHA=$live_commit" >> "$GITHUB_ENV"
          echo "Live product commit: $live_commit"
          echo 'Any newer target-branch changes are metadata/workflow-only.'

      - name: Verify rooms and collision
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build exact live product output
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ env.LIVE_BUILD_SHA }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify live Pages content matches reproduced product build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pages-diagnostics
          cp artifacts/dungeon-rpg/dist/public/index.html pages-diagnostics/expected-index.html
          cp live-deployment.json pages-diagnostics/live-deployment.json
          cp product-diff.txt pages-diagnostics/product-diff.txt
          curl --fail --silent --show-error --location --max-time 30 \
            -H 'Cache-Control: no-cache' \
            "https://ys2mm422yb-max.github.io/DungeonVeil/?verify=${GITHUB_SHA}" \
            -o pages-diagnostics/live-index.html

          expected_src=$(grep -oE 'src="/DungeonVeil/assets/[^"]+\.js"' pages-diagnostics/expected-index.html | head -1 | cut -d'"' -f2)
          live_src=$(grep -oE 'src="/DungeonVeil/assets/[^"]+\.js"' pages-diagnostics/live-index.html | head -1 | cut -d'"' -f2)
          printf 'expected_src=%s\nlive_src=%s\n' "$expected_src" "$live_src" | tee pages-diagnostics/assets.txt

          cp "artifacts/dungeon-rpg/dist/public${expected_src#/DungeonVeil}" pages-diagnostics/expected-app.js
          curl --fail --silent --show-error --location --max-time 60 \
            -H 'Cache-Control: no-cache' \
            "https://ys2mm422yb-max.github.io${live_src}?verify=${GITHUB_SHA}" \
            -o pages-diagnostics/live-app.js

          sha256sum pages-diagnostics/expected-index.html pages-diagnostics/live-index.html \
            pages-diagnostics/expected-app.js pages-diagnostics/live-app.js \
            | tee pages-diagnostics/sha256.txt
          cmp -s pages-diagnostics/expected-index.html pages-diagnostics/live-index.html
          cmp -s pages-diagnostics/expected-app.js pages-diagnostics/live-app.js
          echo 'Live GitHub Pages HTML and application bundle exactly match the reproduced current product build.'

      - name: Upload Pages diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-pages-content-diagnostics
          path: pages-diagnostics
          retention-days: 1

      - name: Install Chromium
        run: pnpm dlx @playwright/test@1.54.1 install --with-deps chromium

      - name: Smoke test fixed live link on four profiles
        run: |
          cat > final-live-playwright.config.ts <<'TS'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            testDir: '.',
            testMatch: /final-live-smoke\.spec\.ts/,
            timeout: 45000,
            reporter: 'line',
            use: { baseURL: 'https://ys2mm422yb-max.github.io', browserName: 'chromium' },
            projects: [
              { name: 'desktop', use: { viewport: { width: 1280, height: 800 } } },
              { name: 'iphone', use: { viewport: { width: 390, height: 844 }, userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 Version/18.5 Mobile/15E148 Safari/604.1', isMobile: true, hasTouch: true } },
              { name: 'android', use: { viewport: { width: 412, height: 915 }, userAgent: 'Mozilla/5.0 (Linux; Android 15; Pixel 9) AppleWebKit/537.36 Chrome/136.0.0.0 Mobile Safari/537.36', isMobile: true, hasTouch: true } },
              { name: 'ipad', use: { viewport: { width: 1024, height: 1366 }, userAgent: 'Mozilla/5.0 (iPad; CPU OS 18_5 like Mac OS X) AppleWebKit/605.1.15 Version/18.5 Mobile/15E148 Safari/604.1', isMobile: true, hasTouch: true } },
            ],
          });
          TS
          cat > final-live-smoke.spec.ts <<'TS'
          import { test, expect } from '@playwright/test';
          test('fixed live link loads without fatal page errors', async ({ page }) => {
            const pageErrors: string[] = [];
            page.on('pageerror', error => pageErrors.push(error.message));
            const response = await page.goto(`/DungeonVeil/?live=${Date.now()}`, { waitUntil: 'domcontentloaded' });
            expect(response?.ok(), `Unexpected status ${response?.status()}`).toBeTruthy();
            await expect(page.locator('#root')).toBeVisible();
            await page.waitForTimeout(2500);
            expect((await page.title()).trim().length).toBeGreaterThan(0);
            expect((await page.locator('body').innerText()).trim().length).toBeGreaterThan(0);
            const overflow = await page.evaluate(() => document.documentElement.scrollWidth - document.documentElement.clientWidth);
            expect(overflow).toBeLessThanOrEqual(2);
            expect(pageErrors, pageErrors.join('\n')).toEqual([]);
          });
          TS
          pnpm dlx @playwright/test@1.54.1 test --config=final-live-playwright.config.ts
