name: Room Audit Diagnostics

on:
  push:
    branches: ['fix/diagnose-room-audit-after-final-boss-scope']

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture complete room audit
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg audit:rooms > room-audit.log 2>&1
          status=$?
          cat room-audit.log
          echo "$status" > room-audit.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: room-audit-diagnostics
          path: |
            room-audit.log
            room-audit.exit
          if-no-files-found: error
      - name: Enforce room audit
        shell: bash
        run: test "$(cat room-audit.exit)" = "0"
