name: Duo Exact Head Diagnostics

on:
  push:
    branches:
      - fix/duo-final-integration-regression
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'supabase/migrations/**'
      - '.github/workflows/duo-exact-head-diagnostics.yml'
  pull_request:
    branches:
      - main
      - 'fix/**'
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'supabase/migrations/**'
      - '.github/workflows/duo-exact-head-diagnostics.yml'

permissions:
  contents: read

jobs:
  focused-duo-audit:
    name: Duo audit / ${{ matrix.audit }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        audit:
          - validate-coop-solo-balance-isolation.mjs
          - validate-coop-lobby-foundation.mjs
          - validate-coop-realtime-presence.mjs
          - validate-coop-host-enemy-state.mjs
          - validate-coop-downed-revive.mjs
          - validate-coop-duo-balance-rewards.mjs
          - validate-coop-shared-boss-loot.mjs
          - validate-coop-run-persistence.mjs
          - validate-coop-final-integration.mjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Run focused Duo audit
        working-directory: artifacts/dungeon-rpg
        run: node scripts/${{ matrix.audit }}
