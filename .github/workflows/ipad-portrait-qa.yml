name: iPad Portrait QA

on:
  push:
    branches:
      - fix/guild-mail-equipment-currency-ux-v1
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/ipad-portrait-qa.yml'
      - 'artifacts/dungeon-rpg/**'
      - 'supabase/migrations/**'
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/ipad-portrait-qa.yml'
      - 'artifacts/dungeon-rpg/**'
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ipad-portrait-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 85
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Verify TypeScript
        run: pnpm run typecheck
      - name: Build GitHub Pages output
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Install deterministic browser runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@1.55.0 --lockfile=false
      - name: Install WebKit
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install --with-deps webkit
      - name: Run complete iPad portrait regression
        id: portrait-tests
        continue-on-error: true
        env:
          DUNGEON_VEIL_URL: http://127.0.0.1:4173/DungeonVeil/
          BASE_PATH: /DungeonVeil/
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-ipad-portrait-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/DungeonVeil/ > /dev/null; then break; fi
            sleep 1
          done
          curl --fail http://127.0.0.1:4173/DungeonVeil/ > /dev/null
          timeout --signal=TERM --kill-after=30s 75m pnpm --dir artifacts/dungeon-rpg exec playwright test \
            --config=playwright.regression.config.mjs \
            --project=ipad-portrait-webkit \
            --grep-invert 'rooms 1-50 produce stable visual evidence across the full run|full room visual evidence'
      - name: Upload iPad portrait visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipad-portrait-visual-evidence
          if-no-files-found: warn
          retention-days: 21
          compression-level: 6
          path: artifacts/dungeon-rpg/test-results/**/*ipad-portrait-webkit*.png
      - name: Upload iPad portrait results and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipad-portrait-results
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/full-game-results.json
            artifacts/dungeon-rpg/playwright-report/**
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/test-failed-*.png
            /tmp/dungeon-veil-ipad-portrait-preview.log
      - name: Publish iPad portrait failure to pull request
        if: steps.portrait-tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- dungeon-veil-ipad-portrait-qa -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## iPad-Hochformatprüfung fehlgeschlagen',
              '',
              `Head: \`${context.payload.pull_request.head.sha}\``,
              '',
              `Screenshots, Videos und Traces: ${runUrl}`,
              '',
              'Der konkrete Layout-, Runtime- oder Funktionsfehler muss behoben werden; die Hochformatprüfung darf nicht abgeschwächt werden.',
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const previous = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (previous) await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
      - name: Fail after iPad portrait diagnostics
        if: steps.portrait-tests.outcome == 'failure'
        run: exit 1
