name: Apply world boss three attack kit

on:
  push:
    branches: [feat/worldboss-three-attack-kit]
    paths: ['.github/workflows/apply-worldboss-three-attack-kit.yml']

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/worldboss-three-attack-kit
          fetch-depth: 0
      - name: Adopt validated dragon base and build three attacks
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin verify/fireball-village-camera-round2
          git checkout origin/verify/fireball-village-camera-round2 -- \
            artifacts/dungeon-rpg/src/components/WorldBossAggressiveStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossCohesiveStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossLiteStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossCombatBandStage.tsx \
            artifacts/dungeon-rpg/src/components/worldBossMobileVisual3D.ts \
            artifacts/dungeon-rpg/scripts/validate-mobile-combat.mjs

          cat > artifacts/dungeon-rpg/src/components/WorldBossAggressiveStage.tsx <<'EOF'
          import React, { useCallback, useEffect, useRef } from 'react';
          import type { GameEngine } from '../game/runEngine';
          import { WorldBossPerspectiveStage } from './WorldBossPerspectiveStage';

          type Props = {
            engineRef: React.RefObject<GameEngine | null>;
            onReady: () => void;
          };

          type AttackKind = 'breath' | 'claw' | 'wing';
          type PendingAttack = { kind: AttackKind; releaseAt: number; serial: number };
          type ActiveBreath = { ids: string[]; originX: number; originY: number; angles: number[]; maxRadius: number };

          const RELEASE_DELAY_MS = 320;
          const PURSUIT_SPEED = 82;
          const ATTACK_READY_WINDOW_MS = 720;
          const BREATH_WINDUP_MS = 760;
          const BREATH_TRAVEL_MS = 760;
          const BREATH_COOLDOWN_MS = 4300;
          const BREATH_MIN_DISTANCE = 180;
          const BREATH_MAX_DISTANCE = 840;
          const BREATH_HIT_RADIUS = 52;
          const CLAW_WINDUP_MS = 390;
          const CLAW_RANGE = 150;
          const CLAW_COOLDOWN_MS = 1900;
          const WING_WINDUP_MS = 650;
          const WING_RANGE = 245;
          const WING_COOLDOWN_MS = 3200;

          export function WorldBossAggressiveStage({ engineRef, onReady }: Props) {
            const releasedAtRef = useRef(0);
            const frameRef = useRef(0);
            const nextAttackAtRef = useRef(0);
            const serialRef = useRef(0);
            const pendingRef = useRef<PendingAttack | null>(null);
            const activeBreathRef = useRef<ActiveBreath | null>(null);
            const lastAttackKindRef = useRef<AttackKind>('wing');

            const handleReady = useCallback(() => {
              const now = performance.now();
              releasedAtRef.current = now + RELEASE_DELAY_MS;
              nextAttackAtRef.current = now + 1350;
              onReady();
            }, [onReady]);

            useEffect(() => {
              let disposed = false;

              const damagePlayer = (engine: GameEngine, boss: any, now: number, multiplier: number, source: string, scale = 1.25) => {
                const player = engine.state.player;
                if (now < player.invincibleUntil) return false;
                const damage = Math.max(8, Math.round(boss.attack * multiplier - player.defense * 0.4));
                player.hp = Math.max(0, player.hp - damage);
                player.invincibleUntil = now + 760;
                player.lastHitTime = now;
                engine.state.damageNumbers.push({
                  id: `hit-${source}-${Math.round(now)}`,
                  x: player.x,
                  y: player.y - 10,
                  value: `-${damage}`,
                  color: source === 'breath' ? '#ff742b' : source === 'wing' ? '#f6c56d' : '#ff9b54',
                  lifeTime: 0,
                  maxLifeTime: 820,
                  scale,
                });
                return true;
              };

              const chooseAttack = (distance: number): AttackKind => {
                if (distance <= CLAW_RANGE && lastAttackKindRef.current !== 'claw') return 'claw';
                if (distance <= WING_RANGE && lastAttackKindRef.current !== 'wing') return 'wing';
                return 'breath';
              };

              const frame = (now: number) => {
                if (disposed) return;
                const engine = engineRef.current;
                const boss = engine?.state.enemies.find(enemy => enemy.enemyType === 'boss' && enemy.hp > 0);
                if (engine && boss && releasedAtRef.current > 0 && now >= releasedAtRef.current) {
                  const player = engine.state.player;
                  const bx = boss.x + boss.width / 2;
                  const by = boss.y + boss.height / 2;
                  const px = player.x + player.width / 2;
                  const py = player.y + player.height / 2;
                  const dx = px - bx;
                  const dy = py - by;
                  const distance = Math.hypot(dx, dy);
                  boss.speed = Math.max(boss.speed, PURSUIT_SPEED);
                  if (distance > 118 && boss.state !== 'attack') boss.state = 'chase';
                  if (boss.nextAttackTime > now + ATTACK_READY_WINDOW_MS) boss.nextAttackTime = now + ATTACK_READY_WINDOW_MS;

                  if (!pendingRef.current && !activeBreathRef.current && now >= nextAttackAtRef.current) {
                    const kind = chooseAttack(distance);
                    if (kind !== 'breath' || (distance >= BREATH_MIN_DISTANCE && distance <= BREATH_MAX_DISTANCE)) {
                      const serial = ++serialRef.current;
                      const windup = kind === 'breath' ? BREATH_WINDUP_MS : kind === 'claw' ? CLAW_WINDUP_MS : WING_WINDUP_MS;
                      pendingRef.current = { kind, releaseAt: now + windup, serial };
                      boss.state = 'attack';
                      boss.vx = 0;
                      boss.vy = 0;
                      engine.state.effects.push({
                        id: `boss-${kind}-telegraph-${serial}`,
                        x: kind === 'breath' ? px : bx,
                        y: kind === 'breath' ? py : by,
                        radius: 8,
                        maxRadius: kind === 'claw' ? CLAW_RANGE : kind === 'wing' ? WING_RANGE : 92,
                        color: kind === 'breath' ? '#ff6d24' : kind === 'wing' ? '#f4bd68' : '#ff9a4d',
                        lifeTime: 0,
                        maxLifeTime: windup,
                        type: 'circle',
                        element: 'fire',
                        fromEnemyId: boss.id,
                      });
                    }
                  }

                  const pending = pendingRef.current;
                  if (pending && now >= pending.releaseAt) {
                    const releaseDx = px - bx;
                    const releaseDy = py - by;
                    const releaseDistance = Math.max(1, Math.hypot(releaseDx, releaseDy));
                    const baseAngle = Math.atan2(releaseDy, releaseDx);
                    boss.lastAttackTime = now;
                    lastAttackKindRef.current = pending.kind;

                    if (pending.kind === 'breath') {
                      const angles = [-0.12, 0, 0.12].map(offset => baseAngle + offset);
                      const maxRadius = Math.max(320, Math.min(900, releaseDistance + 180));
                      const ids = angles.map((angle, index) => {
                        const id = `boss-breath-${pending.serial}-${index}`;
                        engine.state.effects.push({
                          id,
                          x: bx,
                          y: by,
                          radius: 42,
                          maxRadius,
                          color: index === 1 ? '#ffb347' : '#ff5b24',
                          lifeTime: 0,
                          maxLifeTime: BREATH_TRAVEL_MS,
                          type: 'beam',
                          angle,
                          width: index === 1 ? 92 : 72,
                          element: 'fire',
                          fromEnemyId: boss.id,
                        });
                        return id;
                      });
                      activeBreathRef.current = { ids, originX: bx, originY: by, angles, maxRadius };
                      nextAttackAtRef.current = now + BREATH_COOLDOWN_MS;
                    } else if (pending.kind === 'claw') {
                      const facing = Math.atan2(releaseDy, releaseDx);
                      const targetAngle = Math.atan2(py - by, px - bx);
                      const angleDelta = Math.abs(Math.atan2(Math.sin(targetAngle - facing), Math.cos(targetAngle - facing)));
                      if (distance <= CLAW_RANGE && angleDelta < 1.05) damagePlayer(engine, boss, now, 1.05, 'claw', 1.36);
                      engine.state.effects.push({ id: `boss-claw-impact-${pending.serial}`, x: px, y: py, radius: 24, maxRadius: 92, color: '#ff9a4d', lifeTime: 0, maxLifeTime: 360, type: 'circle', element: 'fire', fromEnemyId: boss.id });
                      nextAttackAtRef.current = now + CLAW_COOLDOWN_MS;
                    } else {
                      if (distance <= WING_RANGE) damagePlayer(engine, boss, now, 0.82, 'wing', 1.5);
                      engine.state.effects.push({ id: `boss-wing-impact-${pending.serial}`, x: bx, y: by, radius: 32, maxRadius: WING_RANGE, color: '#f4bd68', lifeTime: 0, maxLifeTime: 560, type: 'circle', element: 'fire', fromEnemyId: boss.id });
                      nextAttackAtRef.current = now + WING_COOLDOWN_MS;
                    }
                    pendingRef.current = null;
                    boss.state = 'chase';
                  }

                  const active = activeBreathRef.current;
                  if (active) {
                    let stillActive = false;
                    for (let index = 0; index < active.ids.length; index++) {
                      const effect = engine.state.effects.find(item => item.id === active.ids[index]);
                      if (!effect) continue;
                      stillActive = true;
                      const progress = Math.max(0, Math.min(1, effect.lifeTime / Math.max(1, effect.maxLifeTime)));
                      const fx = active.originX + Math.cos(active.angles[index]) * active.maxRadius * progress;
                      const fy = active.originY + Math.sin(active.angles[index]) * active.maxRadius * progress;
                      if (Math.hypot(fx - px, fy - py) <= BREATH_HIT_RADIUS && damagePlayer(engine, boss, now, 0.88, 'breath', 1.4)) {
                        active.ids.forEach(id => {
                          const sibling = engine.state.effects.find(item => item.id === id);
                          if (sibling) sibling.lifeTime = sibling.maxLifeTime;
                        });
                        stillActive = false;
                        break;
                      }
                    }
                    if (!stillActive) activeBreathRef.current = null;
                  }
                }
                frameRef.current = requestAnimationFrame(frame);
              };

              frameRef.current = requestAnimationFrame(frame);
              return () => {
                disposed = true;
                cancelAnimationFrame(frameRef.current);
                pendingRef.current = null;
                activeBreathRef.current = null;
              };
            }, [engineRef]);

            return <WorldBossPerspectiveStage engineRef={engineRef} onReady={handleReady} />;
          }
          EOF

          python - <<'PY'
          from pathlib import Path
          path = Path('artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx')
          text = path.read_text()
          text = text.replace("const fireCoreGeometry = keepGeometry(new THREE.IcosahedronGeometry(0.42, 1));\n      const fireGlowGeometry = keepGeometry(new THREE.SphereGeometry(0.72, 14, 10));", "const fireCoreGeometry = keepGeometry(new THREE.ConeGeometry(0.58, 2.8, IS_ANDROID ? 8 : 12, 1, true));\n      const fireGlowGeometry = keepGeometry(new THREE.ConeGeometry(0.86, 3.4, IS_ANDROID ? 8 : 12, 1, true));")
          text = text.replace("const bossShot = effect.id.startsWith('boss-shot-');", "const bossShot = effect.id.startsWith('boss-shot-') || effect.id.startsWith('boss-breath-');\n        const breathShot = effect.id.startsWith('boss-breath-');")
          old = """          slot.fireCore.rotation.set(now * 0.003, -angle, now * 0.004);
          slot.fireCore.scale.setScalar(1.55 * pulse);
          slot.fireGlow.scale.setScalar(1.72 + pulse * 0.28);
          slot.fireMaterial.color.set('#ff9a32');
          slot.fireMaterial.opacity = Math.max(0.68, 1 - progress * 0.24);
          slot.glowMaterial.opacity = Math.max(0.16, 0.42 - progress * 0.16);"""
          new = """          if (breathShot) {
            slot.fireCore.rotation.set(0, -angle, -Math.PI / 2);
            slot.fireGlow.rotation.copy(slot.fireCore.rotation);
            slot.fireCore.scale.set(1.05 + pulse * 0.08, 1.0 + progress * 0.7, 0.72 + pulse * 0.08);
            slot.fireGlow.scale.set(1.2 + pulse * 0.12, 1.12 + progress * 0.85, 0.9 + pulse * 0.12);
            slot.fireMaterial.color.set('#ffb347');
            slot.fireMaterial.opacity = Math.max(0.58, 0.98 - progress * 0.32);
            slot.glowMaterial.opacity = Math.max(0.12, 0.38 - progress * 0.18);
          } else {
            slot.fireCore.rotation.set(now * 0.003, -angle, now * 0.004);
            slot.fireCore.scale.setScalar(1.55 * pulse);
            slot.fireGlow.scale.setScalar(1.72 + pulse * 0.28);
            slot.fireMaterial.color.set('#ff9a32');
            slot.fireMaterial.opacity = Math.max(0.68, 1 - progress * 0.24);
            slot.glowMaterial.opacity = Math.max(0.16, 0.42 - progress * 0.16);
          }"""
          if old not in text:
              raise SystemExit('projectile visual block not found')
          text = text.replace(old, new)
          text = text.replace("if (effect.type !== 'beam' || !/^(shot-|pierce-|rico-|boss-shot-)/.test(effect.id)) continue;", "if (effect.type !== 'beam' || !/^(shot-|pierce-|rico-|boss-shot-|boss-breath-)/.test(effect.id)) continue;")
          path.write_text(text)

          audit = Path('artifacts/dungeon-rpg/scripts/validate-mobile-combat.mjs')
          audit_text = audit.read_text()
          audit_text = audit_text.replace("files.bossController.includes('const PURSUIT_SPEED = 82;') && files.bossController.includes('const ATTACK_READY_WINDOW_MS = 720;')", "files.bossController.includes(\"type AttackKind = 'breath' | 'claw' | 'wing'\") && files.bossController.includes('const CLAW_RANGE = 150;') && files.bossController.includes('const WING_RANGE = 245;')")
          audit_text = audit_text.replace("aggressive dragon controller", "three-attack dragon controller")
          audit.write_text(audit_text)
          PY

          rm .github/workflows/apply-worldboss-three-attack-kit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Give the dragon three distinct attacks"
          git push origin HEAD:feat/worldboss-three-attack-kit
