name: Diagnose Block 5 room audit

on:
  push:
    branches:
      - audit/relic-runtime-ui-final-v4
    paths:
      - .github/workflows/diagnose-relic-room-audit.yml
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
      - fix/loading-continuity-violet-portals-final
    types: [opened, synchronize]
    paths:
      - .github/workflows/diagnose-relic-room-audit.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/relic-runtime-ui-final-v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Run exact room audit
        id: audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms > /tmp/relic-room-audit.log 2>&1
      - name: Upload room audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relic-room-audit-log
          path: /tmp/relic-room-audit.log
          if-no-files-found: error
          retention-days: 1
