name: Temporary Typecheck Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  report-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: typecheck
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg typecheck > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-rpg-typecheck-log
          path: typecheck.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve failure state
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
