name: Temporary Typecheck Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  report-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: typecheck
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg typecheck > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Comment diagnostics
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.existsSync('typecheck.log') ? fs.readFileSync('typecheck.log', 'utf8') : 'No typecheck log produced.';
            const lines = raw.split(/\r?\n/).filter(Boolean).slice(-100);
            const body = `### Temporary Typecheck diagnostics\n\nExit code: ${process.env.EXIT_CODE}\n\n\`\`\`text\n${lines.join('\n').slice(0, 50000)}\n\`\`\``;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
        env:
          EXIT_CODE: ${{ steps.typecheck.outputs.exit_code }}
      - name: Preserve failure state
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
