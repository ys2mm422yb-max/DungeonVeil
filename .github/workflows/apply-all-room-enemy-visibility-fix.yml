name: Apply All-Room Enemy Visibility Fix

on:
  push:
    branches: [fix/all-room-enemy-visibility]
    paths:
      - '.github/workflows/apply-all-room-enemy-visibility-fix.yml'

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/all-room-enemy-visibility
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply visibility fix
        run: python3 scripts/apply_all_room_enemy_visibility_fix.py
      - run: pnpm install --frozen-lockfile
      - name: Validate all rooms and build
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm run typecheck
          pnpm --dir artifacts/dungeon-rpg run build
      - name: Commit clean fix
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Keep every living enemy visible across all rooms'
          git push origin HEAD:fix/all-room-enemy-visibility
