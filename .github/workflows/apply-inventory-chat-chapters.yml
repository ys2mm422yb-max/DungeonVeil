name: Apply Inventory Chat Chapter Gates

on:
  push:
    branches: [feature/inventory-guild-chat-chapter-gates]
    paths:
      - '.github/workflows/apply-inventory-chat-chapters.yml'

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/inventory-guild-chat-chapter-gates
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply requested feature batch
        run: python3 .github/scripts/apply_inventory_chat_chapters.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Run full Dungeon Veil audits
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build production application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Commit feature implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add inventory naming, guild chat and chapter item gates'
          git push origin HEAD:feature/inventory-guild-chat-chapter-gates
