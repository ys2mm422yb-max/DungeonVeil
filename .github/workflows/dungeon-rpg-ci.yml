name: Dungeon RPG CI

# Validation for main, production passes and chained block branches.
on:
  push:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
  pull_request:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture room audit
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg audit:rooms > room-audit.txt 2>&1
          echo "$?" > room-audit-exit.txt
          exit 0

      - name: Upload room audit
        uses: actions/upload-artifact@v4
        with:
          name: room-audit-diagnostics
          path: |
            room-audit.txt
            room-audit-exit.txt
          if-no-files-found: error

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build dungeon RPG
        run: pnpm --dir artifacts/dungeon-rpg run build
