name: Dungeon RPG CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-room20-mobile-pass:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply targeted room 20 and Android pass
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def patch(path, old, new):
              p = Path(path)
              text = p.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Expected block not found in {path}: {old[:180]!r}')
              p.write_text(text.replace(old, new, 1))

          engine = 'artifacts/dungeon-rpg/src/game/runEngine.ts'
          patch(engine, "import { CHAPTER_ROOMS, generateRunRoom } from './chapterRun';", "import { CHAPTER_ROOMS, generateRunRoom, isBossRoom } from './chapterRun';")
          patch(engine, "import { availableRunSkills, nextSkillRank, skillRank } from './runSkills';", "import { availableRunSkills, nextSkillRank, skillRank } from './runSkills';\nimport { getEncounterPlan } from './encounterPlan';")
          patch(engine, "value: this.state.floor === CHAPTER_ROOMS ? 'BOSS BESIEGT · AUSGANG OFFEN' : 'RAUM FREI · AUSGANG OFFEN'", "value: isBossRoom(this.state.floor) ? 'BOSS BESIEGT · AUSGANG OFFEN' : 'RAUM FREI · AUSGANG OFFEN'")
          patch(engine, """    if (room === CHAPTER_ROOMS) {
      const bossPoint = getRoomSpawnPoints(room)[0];
      const bossSize = ENEMY_STATS.boss.size;
      const spawn = sceneSpawnToGame(bossPoint, map.width, map.height, bossSize);
      this.state.enemies.push(this.makeEnemy('boss', spawn.x, spawn.y, chapterScale * roomScale, now, spawnId, 0));
      return;
    }

    const pool: EnemyType[] = room <= 2 ? ['skeleton', 'spider'] : room <= 5 ? ['skeleton', 'spider', 'vampire'] : ['skeleton', 'spider', 'vampire', 'demon'];
    const points = getRoomSpawnPoints(room);
    const count = Math.min(points.length, Math.min(8, 2 + room));

    for (let i = 0; i < count; i++) {
      const type = pool[(i + room + this.state.chapter) % pool.length];
      const size = ENEMY_STATS[type].size;
      const point = points[i % points.length];
      const spawn = sceneSpawnToGame(point, map.width, map.height, size);
      if (!isWalkable(map, spawn.x + size / 2, spawn.y + size / 2)) continue;
      if (collidesWithRoomProp(room, map.width, map.height, spawn.x, spawn.y, size, size, 0.22)) continue;
      this.state.enemies.push(this.makeEnemy(type, spawn.x, spawn.y, chapterScale * roomScale, now, spawnId, i));
    }""", """    if (isBossRoom(room)) {
      const bossPoint = getRoomSpawnPoints(room)[0];
      const bossSize = ENEMY_STATS.boss.size;
      const spawn = sceneSpawnToGame(bossPoint, map.width, map.height, bossSize);
      const bossScale = chapterScale * roomScale * (room === 20 ? 1.18 : 1);
      this.state.enemies.push(this.makeEnemy('boss', spawn.x, spawn.y, bossScale, now, spawnId, 0));
      return;
    }

    const encounter = getEncounterPlan(room);
    const points = getRoomSpawnPoints(room);
    const count = Math.min(points.length, encounter.length);

    for (let i = 0; i < count; i++) {
      const type = encounter[i];
      const size = ENEMY_STATS[type].size;
      const point = points[i % points.length];
      const spawn = sceneSpawnToGame(point, map.width, map.height, size);
      if (!isWalkable(map, spawn.x + size / 2, spawn.y + size / 2)) continue;
      if (collidesWithRoomProp(room, map.width, map.height, spawn.x, spawn.y, size, size, 0.22)) continue;
      this.state.enemies.push(this.makeEnemy(type, spawn.x, spawn.y, chapterScale * roomScale, now, spawnId, i));
    }""")

          ai = 'artifacts/dungeon-rpg/src/game/enemyRunAI.ts'
          patch(ai, "return Number.isFinite(parsed) ? Math.max(1, Math.min(10, parsed)) : 1;", "return Number.isFinite(parsed) ? Math.max(1, Math.min(20, parsed)) : 1;")

          canvas = 'artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx'
          patch(canvas, "import { skillRank } from '../game/runSkills';", "import { skillRank } from '../game/runSkills';\nimport { CHAPTER_ROOMS } from '../game/chapterRun';")
          patch(canvas, "const IS_MOBILE = typeof navigator !== 'undefined' && (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1);\nconst MAX_PARTICLES = IS_MOBILE ? 64 : 110;", "const IS_ANDROID = typeof navigator !== 'undefined' && /Android/i.test(navigator.userAgent);\nconst IS_MOBILE = typeof navigator !== 'undefined' && (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1);\nconst MAX_PARTICLES = IS_ANDROID ? 38 : IS_MOBILE ? 64 : 110;")
          patch(canvas, "const nextFloor = state.floor >= 10 ? 1 : state.floor + 1;\n      const key = `${state.chapter}:${nextFloor}`;", "const nextFloor = state.floor >= CHAPTER_ROOMS ? 1 : state.floor + 1;\n      const nextChapter = state.floor >= CHAPTER_ROOMS ? state.chapter + 1 : state.chapter;\n      const key = `${nextChapter}:${nextFloor}`;")
          patch(canvas, "for (let index = 0; index < (IS_MOBILE ? 8 : 12); index++) {", "for (let index = 0; index < (IS_ANDROID ? 5 : IS_MOBILE ? 8 : 12); index++) {")
          patch(canvas, "mote.userData.phase = index / (IS_MOBILE ? 8 : 12) * Math.PI * 2;", "mote.userData.phase = index / (IS_ANDROID ? 5 : IS_MOBILE ? 8 : 12) * Math.PI * 2;")
          patch(canvas, "renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 1.25));\n      renderer.shadowMap.enabled = true;", "renderer.setPixelRatio(Math.min(devicePixelRatio || 1, IS_ANDROID ? 1 : 1.25));\n      renderer.shadowMap.enabled = !IS_ANDROID;")
          patch(canvas, "keyLight.castShadow = true;\n      keyLight.shadow.mapSize.set(1024, 1024);", "keyLight.castShadow = !IS_ANDROID;\n      keyLight.shadow.mapSize.set(IS_ANDROID ? 512 : 1024, IS_ANDROID ? 512 : 1024);")
          patch(canvas, "playerRig.root.scale.setScalar(1.08);", "playerRig.root.scale.setScalar(0.96);")

          enemy3d = 'artifacts/dungeon-rpg/src/components/kaykitEnemy3D.ts'
          patch(enemy3d, "function hashId(id: string) { let hash = 2166136261; for (let i = 0; i < id.length; i++) { hash ^= id.charCodeAt(i); hash = Math.imul(hash, 16777619); } return hash >>> 0; }", "function hashId(id: string) { let hash = 2166136261; for (let i = 0; i < id.length; i++) { hash ^= id.charCodeAt(i); hash = Math.imul(hash, 16777619); } return hash >>> 0; }\nfunction roomFromEnemyId(enemy: Enemy) { const parts = enemy.id.split('-'); const parsed = Number(parts.at(-2)); return Number.isFinite(parsed) ? parsed : 1; }")
          patch(enemy3d, "const prototype = enemy.enemyType === 'boss'\n    ? library.prototypes.find(entry => entry.role === 'warrior') ?? library.prototypes[0]\n    : library.prototypes[hashId(enemy.id) % library.prototypes.length];", "const finalBoss = enemy.enemyType === 'boss' && roomFromEnemyId(enemy) === 20;\n  const prototype = enemy.enemyType === 'boss'\n    ? library.prototypes.find(entry => entry.role === (finalBoss ? 'mage' : 'warrior')) ?? library.prototypes[0]\n    : library.prototypes[hashId(enemy.id) % library.prototypes.length];")
          patch(enemy3d, "const baseScale = (enemy.enemyType === 'boss' ? 1.56 : 0.96) * roleScale;", "const baseScale = (enemy.enemyType === 'boss' ? (finalBoss ? 1.78 : 1.62) : prototype.role === 'warrior' ? 1.08 : 0.92) * roleScale;")
          patch(enemy3d, "new THREE.MeshBasicMaterial({ color: 0x8f4864, transparent: true, opacity: 0.42, depthWrite: false }),", "new THREE.MeshBasicMaterial({ color: finalBoss ? 0x6f5cff : 0x8f4864, transparent: true, opacity: 0.42, depthWrite: false }),")
          patch(enemy3d, "new THREE.MeshBasicMaterial({ color: 0x765bd3, transparent: true, opacity: 0.36, depthWrite: false }),", "new THREE.MeshBasicMaterial({ color: finalBoss ? 0x62d9ff : 0x765bd3, transparent: true, opacity: 0.36, depthWrite: false }),")
          PY

      - name: Commit targeted source pass
        shell: bash
        run: |
          git config user.name 'Dungeon Veil CI'
          git config user.email 'actions@users.noreply.github.com'
          git add artifacts/dungeon-rpg/src
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Complete room twenty flow and add Android balanced rendering'
          git push origin HEAD:main

  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build dungeon RPG
        run: pnpm --dir artifacts/dungeon-rpg run build
