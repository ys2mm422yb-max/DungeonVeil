name: Dungeon RPG CI

# Validation for main, production passes and chained block branches.
on:
  push:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']
  pull_request:
    branches: [main, work/blocks-1-7-production-pass, 'fix/**', 'work/block-*']

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        shell: bash
        run: |
          set +e
          pnpm run typecheck 2>&1 | tee shared-loot-typecheck.txt
          code=${PIPESTATUS[0]}
          echo "$code" > shared-loot-typecheck-exit.txt
          exit "$code"

      - name: Upload temporary typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-loot-typecheck-diagnostics
          path: |
            shared-loot-typecheck.txt
            shared-loot-typecheck-exit.txt
          if-no-files-found: ignore

      - name: Build dungeon RPG
        run: pnpm --dir artifacts/dungeon-rpg run build
