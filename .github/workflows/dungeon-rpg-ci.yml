name: Dungeon RPG CI

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dungeon-rpg-check.yml'
      - '.github/workflows/dungeon-rpg-ci.yml'
      - '.github/workflows/dungeon-veil-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout current Dungeon Veil test branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass

      - name: Resolve validated commit
        id: validated
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build Dungeon Veil
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify runtime asset base
        shell: bash
        run: |
          mapfile -t built_files < <(find artifacts/dungeon-rpg/dist/public -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.html' \))
          test ${#built_files[@]} -gt 0
          if grep -nHE '["'"']/assets/' "${built_files[@]}"; then
            echo 'Found root-relative runtime asset paths that would break under /DungeonVeil/.'
            exit 1
          fi

      - name: Record successful CI
        uses: actions/github-script@v7
        env:
          VALIDATED_SHA: ${{ steps.validated.outputs.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.ci/dungeon-rpg-ci.json';
            const ref = 'main';
            let sha;
            try {
              const response = await github.rest.repos.getContent({ owner, repo, path, ref });
              if (!Array.isArray(response.data)) sha = response.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const content = Buffer.from(JSON.stringify({
              workflow: 'Dungeon RPG CI',
              status: 'success',
              validatedCommit: process.env.VALIDATED_SHA,
              completedAt: new Date().toISOString(),
            }, null, 2) + '\n').toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: ref, sha, content,
              message: `Record Dungeon RPG CI success for ${process.env.VALIDATED_SHA.slice(0, 7)}`,
            });
