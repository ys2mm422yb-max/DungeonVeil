name: Trigger Wide Ritual Hall Visual QA

on:
  push:
    branches: [main]
    paths: ['.github/workflows/trigger-wide-ritual-visual-qa.yml']

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Touch visual QA workflow
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/dungeon-veil-visual-qa.yml')
          text = path.read_text()
          lines = text.splitlines()
          for index, line in enumerate(lines):
              if line.startswith('# '):
                  lines[index] = '# Final iPhone and Android QA trigger for wide ritual hall 21840bb.'
                  break
          path.write_text('\n'.join(lines) + '\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/dungeon-veil-visual-qa.yml
          git commit -m "Trigger visual QA for wide ritual hall 21840bb"
          git push origin HEAD:main
