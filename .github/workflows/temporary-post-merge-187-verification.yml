name: Temporary post-merge 187 verification

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-room-audits:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR 190 branch
        uses: actions/checkout@v4
        with:
          ref: fix/enemy-visibility-audit-split-module
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run every room audit with full output
        id: rooms
        continue-on-error: true
        shell: bash
        working-directory: artifacts/dungeon-rpg
        run: |
          set -o pipefail
          node --input-type=module <<'NODE' 2>&1 | tee room-audits.log
          import fs from 'node:fs';
          import { spawnSync } from 'node:child_process';
          const suite = fs.readFileSync('scripts/run-room-audit-suite.mjs', 'utf8');
          const scripts = [...suite.matchAll(/'([^']+\.mjs)'/g)].map(match => match[1]);
          const failures = [];
          for (const script of scripts) {
            console.log(`===== ${script} =====`);
            const result = spawnSync(process.execPath, [`scripts/${script}`], { stdio: 'inherit', env: process.env });
            if (result.error || result.status !== 0) failures.push(script);
          }
          console.log(`===== SUMMARY: ${scripts.length} audits, ${failures.length} failures =====`);
          failures.forEach(script => console.error(`FAILED: ${script}`));
          if (failures.length) process.exitCode = 1;
          NODE
      - name: Requested-pass audits
        if: always()
        working-directory: artifacts/dungeon-rpg
        run: pnpm audit:requested-pass
      - name: Full TypeScript check
        if: always()
        run: pnpm typecheck
      - name: Production build
        if: always()
        run: pnpm --dir artifacts/dungeon-rpg build
      - name: Upload room audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-audits-pr190
          path: artifacts/dungeon-rpg/room-audits.log
          retention-days: 1
      - name: Preserve room audit result
        if: steps.rooms.outcome != 'success'
        run: exit 1
