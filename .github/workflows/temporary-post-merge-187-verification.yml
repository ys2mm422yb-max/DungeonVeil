name: Temporary post-merge 187 verification

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-room-audits:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run room audit suite with diagnostics
        id: rooms
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @workspace/dungeon-rpg audit:rooms 2>&1 | tee room-audit.log

      - name: Upload room audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-audit-log
          path: room-audit.log
          retention-days: 1

      - name: Preserve audit result
        if: steps.rooms.outcome != 'success'
        run: exit 1
