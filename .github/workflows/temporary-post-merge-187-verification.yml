name: Temporary post-merge 187 verification

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce-room-package-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR 190 branch
        uses: actions/checkout@v4
        with:
          ref: fix/enemy-visibility-audit-split-module
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Run exact audit rooms command five times
        id: rooms
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          : > artifacts/dungeon-rpg/audit-rooms-exact.log
          failed=0
          for run in 1 2 3 4 5; do
            echo "===== EXACT AUDIT RUN $run =====" | tee -a artifacts/dungeon-rpg/audit-rooms-exact.log
            pnpm --filter @workspace/dungeon-rpg audit:rooms 2>&1 | tee -a artifacts/dungeon-rpg/audit-rooms-exact.log || failed=1
          done
          exit $failed
      - name: Typecheck full workspace
        if: always()
        run: pnpm run typecheck
      - name: Build GitHub Pages production output
        if: always()
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
          grep -q '/DungeonVeil/' artifacts/dungeon-rpg/dist/public/index.html
      - name: Upload exact audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-audit-rooms-pr190
          path: artifacts/dungeon-rpg/audit-rooms-exact.log
          retention-days: 1
