name: Apply loading and portal continuity patch

on:
  push:
    branches:
      - fix/loading-continuity-violet-portals
    paths:
      - .github/workflows/apply-loading-portal-continuity.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/loading-continuity-violet-portals
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply focused continuity patch
        run: node .github/scripts/apply-loading-portal-continuity.mjs
      - name: Validate focused continuity contract
        run: node artifacts/dungeon-rpg/scripts/validate-loading-portal-continuity.mjs
      - name: Commit game changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/pages/game.tsx artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx artifacts/dungeon-rpg/package.json
          git diff --cached --check
          git commit -m "Protect active runs and upgrade veil portals"
          git push origin HEAD:fix/loading-continuity-violet-portals
