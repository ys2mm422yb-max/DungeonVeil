name: Apply final loading and portal continuity patch

on:
  push:
    branches:
      - fix/run-visibility-mage-loot-duo-pause
    paths:
      - .github/workflows/apply-loading-portal-continuity.yml
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    types: [opened, synchronize]
    paths:
      - .github/workflows/apply-loading-portal-continuity.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/run-visibility-mage-loot-duo-pause
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply focused continuity patch
        run: node .github/scripts/apply-loading-portal-continuity.mjs
      - name: Validate focused continuity contract
        id: audit
        run: node artifacts/dungeon-rpg/scripts/validate-loading-portal-continuity.mjs > /tmp/loading-continuity-audit.log 2>&1
      - name: Upload audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: loading-continuity-audit-error
          path: /tmp/loading-continuity-audit.log
          if-no-files-found: error
          retention-days: 1
      - name: Commit game changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/pages/game.tsx artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx artifacts/dungeon-rpg/package.json
          git diff --cached --check
          git commit -m "Protect active runs and upgrade veil portals"
          git push origin HEAD:fix/run-visibility-mage-loot-duo-pause
