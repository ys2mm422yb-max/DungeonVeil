name: Deploy Dungeon Veil Test Site From Main

# Always publishes the current production-pass head to the single fixed test URL.
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-dungeon-veil-test-from-ci.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      product_sha: ${{ steps.product.outputs.sha }}
    steps:
      - name: Checkout current Dungeon Veil product branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass

      - name: Resolve product commit
        id: product
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build Dungeon Veil for GitHub Pages
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.product.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify GitHub Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write deployment marker
        shell: bash
        env:
          DEPLOYED_COMMIT: ${{ steps.product.outputs.sha }}
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "$DEPLOYED_COMMIT" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy current Dungeon Veil test build
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout main for deployment receipt
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record verified live deployment
        env:
          DEPLOYED_COMMIT: ${{ needs.build.outputs.product_sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          mkdir -p .ci
          printf '{"status":"success","deployedCommit":"%s","pageUrl":"%s","completedAt":"%s"}\n' "$DEPLOYED_COMMIT" "$PAGE_URL" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .ci/dungeon-veil-live.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci/dungeon-veil-live.json
          git commit -m "Record live Dungeon Veil deployment ${DEPLOYED_COMMIT:0:7}"
          git push origin HEAD:main
