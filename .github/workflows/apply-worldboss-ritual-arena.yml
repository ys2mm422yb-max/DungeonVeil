name: Apply World Boss Ritual Arena

on:
  push:
    branches: [main]
    paths: ['.github/workflows/apply-worldboss-ritual-arena.yml']

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass
          fetch-depth: 0
      - name: Apply semantic arena and authenticated REST bridge
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          supabase_path = Path('artifacts/dungeon-rpg/src/game/supabaseOnline.ts')
          supabase = supabase_path.read_text()
          bridge = """

          export async function authenticatedSupabaseRest<T>(path: string, init: RequestInit = {}): Promise<T> {
            return restRequest<T>(path, init);
          }
          """
          if 'export async function authenticatedSupabaseRest' not in supabase:
              supabase = supabase.rstrip() + bridge + '\n'
              supabase_path.write_text(supabase)

          stage_path = Path('artifacts/dungeon-rpg/src/components/WorldBossDedicatedStage.tsx')
          stage = stage_path.read_text()
          stage = stage.replace('const ARENA_DEPTH = 14.4;', 'const ARENA_DEPTH = 20.4;')
          stage = stage.replace('const ARENA_INNER_Z = 5.7;', 'const ARENA_INNER_Z = 8.25;')

          old_camera = """    const frameCamera = (width: number, height: number) => {
                if (!camera) return;
                const aspect = width / height;
                const portrait = aspect < 0.72;
                const viewWidth = portrait ? 11.7 : 15.2;
                const viewHeight = viewWidth / Math.max(0.25, aspect);
                camera.left = -viewWidth / 2;
                camera.right = viewWidth / 2;
                camera.top = viewHeight / 2;
                camera.bottom = -viewHeight / 2;
                camera.position.set(0, portrait ? 12.8 : 12.4, portrait ? 14.9 : 14.1);
                camera.lookAt(0, 0.68, portrait ? 0.65 : 0.35);
                camera.updateProjectionMatrix();
              };
          """
          new_camera = """    const frameCamera = (width: number, height: number) => {
                if (!camera) return;
                const aspect = width / height;
                const portrait = aspect < 0.92;
                const viewHeight = portrait ? ARENA_DEPTH + 0.55 : 16.8;
                const viewWidth = viewHeight * Math.max(0.42, aspect);
                camera.left = -viewWidth / 2;
                camera.right = viewWidth / 2;
                camera.top = viewHeight / 2;
                camera.bottom = -viewHeight / 2;
                camera.position.set(0, portrait ? 20.2 : 15.8, portrait ? 12.1 : 14.2);
                camera.lookAt(0, 0.38, portrait ? 0.15 : 0.35);
                camera.updateProjectionMatrix();
              };
          """
          if old_camera not in stage:
              raise SystemExit('world-boss camera block not found')
          stage = stage.replace(old_camera, new_camera, 1)

          stage = stage.replace('rune.position.set(0, 0.025, -0.35);', 'rune.position.set(0, 0.025, 0.55);', 1)
          stage = stage.replace('innerRune.position.set(0, 0.027, -0.35);', 'innerRune.position.set(0, 0.027, 0.55);', 1)
          stage = stage.replace('sigilA.position.set(0, 0.026, -0.35);', 'sigilA.position.set(0, 0.026, 0.55);', 1)
          stage = stage.replace('sigilB.position.set(0, 0.028, -0.35);', 'sigilB.position.set(0, 0.028, 0.55);', 1)

          anchor = """      sigilB.rotation.y = Math.PI / 2;
                root.add(sigilB);
          """
          semantic = """      sigilB.rotation.y = Math.PI / 2;
                root.add(sigilB);

                const daisMaterial = rememberMaterial(new THREE.MeshStandardMaterial({ color: 0x3b2322, roughness: 0.82, metalness: 0.08 }));
                const dais = new THREE.Mesh(rememberGeometry(new THREE.CylinderGeometry(2.12, 2.42, 0.24, 28)), daisMaterial);
                dais.name = 'AshKingDais';
                dais.position.set(0, 0.08, -7.25);
                root.add(dais);
                const daisRing = new THREE.Mesh(
                  rememberGeometry(new THREE.RingGeometry(2.08, 2.34, 40)),
                  rememberMaterial(new THREE.MeshBasicMaterial({ color: 0xc34a2a, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false })),
                );
                daisRing.rotation.x = -Math.PI / 2;
                daisRing.position.set(0, 0.215, -7.25);
                root.add(daisRing);

                const pathMaterial = rememberMaterial(new THREE.MeshStandardMaterial({ color: 0x4a3532, roughness: 0.9, metalness: 0.02 }));
                const oathPath = new THREE.Mesh(rememberGeometry(new THREE.PlaneGeometry(3.2, 7.6)), pathMaterial);
                oathPath.name = 'OathPathFromVeilGate';
                oathPath.rotation.x = -Math.PI / 2;
                oathPath.position.set(0, 0.012, 5.45);
                root.add(oathPath);

                const channelMaterial = rememberMaterial(new THREE.MeshStandardMaterial({ color: 0xff6433, emissive: 0x761b0a, emissiveIntensity: 0.72, roughness: 0.48 }));
                const channelGeometry = rememberGeometry(new THREE.BoxGeometry(0.1, 0.025, 7.45));
                for (const x of [-1.12, 1.12]) {
                  const channel = new THREE.Mesh(channelGeometry, channelMaterial);
                  channel.name = 'EmberChannel';
                  channel.position.set(x, 0.035, -3.28);
                  root.add(channel);
                }

                const threshold = new THREE.Mesh(rememberGeometry(new THREE.BoxGeometry(4.5, 0.16, 0.72)), daisMaterial);
                threshold.name = 'VeilGateThreshold';
                threshold.position.set(0, 0.08, 9.62);
                root.add(threshold);

                const archGeometry = rememberGeometry(new THREE.BoxGeometry(1, 1, 1));
                const archMaterial = rememberMaterial(new THREE.MeshStandardMaterial({ color: 0x24191c, roughness: 0.9, metalness: 0.04 }));
                const archParts: Array<[number, number, number, number, number]> = [
                  [-3.35, 1.45, -9.52, 0.7, 2.9],
                  [3.35, 1.45, -9.52, 0.7, 2.9],
                  [0, 2.62, -9.52, 7.4, 0.5],
                ];
                for (const [x, y, z, sx, sy] of archParts) {
                  const part = new THREE.Mesh(archGeometry, archMaterial);
                  part.name = 'BrokenThroneArch';
                  part.position.set(x, y, z);
                  part.scale.set(sx, sy, 0.52);
                  root.add(part);
                }

                const brazierBaseGeometry = rememberGeometry(new THREE.CylinderGeometry(0.22, 0.34, 0.72, 10));
                const brazierMaterial = rememberMaterial(new THREE.MeshStandardMaterial({ color: 0x32272a, roughness: 0.78, metalness: 0.18 }));
                const flameGeometry = rememberGeometry(new THREE.ConeGeometry(0.2, 0.58, 9));
                const flameMaterial = rememberMaterial(new THREE.MeshStandardMaterial({ color: 0xffa14a, emissive: 0xa92f0c, emissiveIntensity: 1.12, roughness: 0.38 }));
                for (const [x, z] of [[-4.2, -5.25], [4.2, -5.25], [-4.2, 5.9], [4.2, 5.9]] as Array<[number, number]>) {
                  const base = new THREE.Mesh(brazierBaseGeometry, brazierMaterial);
                  base.name = 'RitualBrazier';
                  base.position.set(x, 0.36, z);
                  root.add(base);
                  const flame = new THREE.Mesh(flameGeometry, flameMaterial);
                  flame.position.set(x, 0.96, z);
                  root.add(flame);
                }
          """
          if anchor not in stage:
              raise SystemExit('world-boss arena insertion anchor not found')
          stage = stage.replace(anchor, semantic, 1)
          stage = stage.replace("[-4.35, -4.95],\n                [4.35, -4.95],\n                [-4.35, 4.92],\n                [4.35, 4.92],", "[-4.35, -8.35],\n                [4.35, -8.35],\n                [-4.35, 8.15],\n                [4.35, 8.15],")
          stage = stage.replace('playerRig.root.scale.setScalar(IS_MOBILE ? 1.14 : 1.1);', 'playerRig.root.scale.setScalar(IS_MOBILE ? 1.04 : 1.1);')
          stage = stage.replace('mobileBossRig.root.scale.setScalar(1.72 + attackPulse * 0.04);', 'mobileBossRig.root.scale.setScalar(1.54 + attackPulse * 0.035);')
          stage = stage.replace('mobileBossRig.root.scale.setScalar(1.72);', 'mobileBossRig.root.scale.setScalar(1.54);')
          stage_path.write_text(stage)

          wrapper_path = Path('artifacts/dungeon-rpg/src/components/WorldBossCombatBandStage.tsx')
          wrapper_path.write_text("""import React from 'react';
          import type { GameEngine } from '../game/runEngine';
          import { WorldBossDedicatedStage } from './WorldBossDedicatedStage';

          type Props = {
            engineRef: React.RefObject<GameEngine | null>;
            onReady: () => void;
          };

          export function WorldBossCombatBandStage(props: Props) {
            return <div data-testid=\"worldboss-combat-band\" className=\"pointer-events-none fixed inset-0 overflow-hidden bg-[#07090d]\">
              <WorldBossDedicatedStage {...props} />
              <div className=\"absolute inset-x-0 bottom-0 h-[18vh] bg-gradient-to-t from-[#07090d] via-[#07090d]/35 to-transparent\" />
              <div data-testid=\"ritual-arena-meaning\" className=\"absolute inset-x-0 top-[22%] flex justify-center\">
                <div className=\"rounded-full border border-orange-300/12 bg-black/20 px-3 py-1 text-[6px] font-black uppercase tracking-[.28em] text-orange-100/18\">THRONBOGEN · ASCHENSIEGEL · SCHLEIERTOR</div>
              </div>
            </div>;
          }
          """)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/game/supabaseOnline.ts artifacts/dungeon-rpg/src/components/WorldBossDedicatedStage.tsx artifacts/dungeon-rpg/src/components/WorldBossCombatBandStage.tsx
          git commit -m "Build semantic Ash King ritual arena"
          git push origin HEAD:work/blocks-1-7-production-pass
