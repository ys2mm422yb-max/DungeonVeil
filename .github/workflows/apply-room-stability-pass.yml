name: Apply room stability pass

on:
  push:
    branches: [main]
    paths:
      - '.github/dv-room-stability-trigger'
  pull_request:
    branches: [main]
    paths:
      - '.github/dv-room-stability-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply atomic renderer and room scene patches
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def patch_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Expected block not found in {path}: {old[:120]!r}')
              p.write_text(text.replace(old, new, 1))

          renderer = 'artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx'
          patch_once(renderer,
            "import { buildKayKitDungeonRoom } from './kaykitRoom3D';\nimport { buildKayKitRoomTheme } from './kaykitRoomThemes3D';",
            "import { buildKayKitDungeonRoom, preloadKayKitDungeonRoom } from './kaykitRoom3D';\nimport { buildKayKitRoomTheme, preloadKayKitRoomTheme } from './kaykitRoomThemes3D';")

          patch_once(renderer,
            "    let lastRoomKey = '';\n    let lastAttack = 0;",
            "    let lastRoomKey = '';\n    let pendingRoomKey = '';\n    let preloadRoomKey = '';\n    let roomGeneration = 0;\n    let lastAttack = 0;")

          old_build = '''    const buildRoom = (state: GameState) => {\n      const key = `${state.chapter}:${state.floor}:${state.map.width}x${state.map.height}`;\n      if (key === lastRoomKey) return;\n      lastRoomKey = key;\n      if (roomRoot) {\n        scene.remove(roomRoot);\n        roomRoot.userData?.room?.userData?.dispose?.();\n        roomRoot.userData?.theme?.userData?.dispose?.();\n        disposeObject(roomRoot);\n      }\n      const root = new THREE.Group();\n      root.name = `KayKitRunRoom_${state.floor}`;\n      const room = buildKayKitDungeonRoom(THREE, state.floor, state.map.width, state.map.height);\n      const theme = buildKayKitRoomTheme(THREE, state.floor);\n      root.add(room);\n      root.add(theme);\n      root.userData.room = room;\n      root.userData.theme = theme;\n      roomRoot = root;\n      scene.add(root);\n    };'''
          new_build = '''    const buildRoom = (state: GameState) => {\n      const key = `${state.chapter}:${state.floor}:${state.map.width}x${state.map.height}`;\n      if (key === lastRoomKey || key === pendingRoomKey) return;\n      pendingRoomKey = key;\n      const generation = ++roomGeneration;\n      window.dispatchEvent(new CustomEvent('dungeon-veil-room-preparing', { detail: { key, floor: state.floor } }));\n\n      const root = new THREE.Group();\n      root.name = `KayKitRunRoom_${state.floor}`;\n      const room = buildKayKitDungeonRoom(THREE, state.floor, state.map.width, state.map.height);\n      const theme = buildKayKitRoomTheme(THREE, state.floor);\n      root.add(room);\n      root.add(theme);\n      root.userData.room = room;\n      root.userData.theme = theme;\n\n      Promise.all([room.userData?.ready ?? Promise.resolve(), theme.userData?.ready ?? Promise.resolve()]).then(() => {\n        const live = stateRef.current;\n        const liveKey = `${live.chapter}:${live.floor}:${live.map.width}x${live.map.height}`;\n        if (disposed || generation !== roomGeneration || liveKey !== key) {\n          room.userData?.dispose?.();\n          theme.userData?.dispose?.();\n          disposeObject(root);\n          return;\n        }\n\n        const previous = roomRoot;\n        roomRoot = root;\n        scene.add(root);\n        lastRoomKey = key;\n        pendingRoomKey = '';\n\n        if (previous) {\n          scene.remove(previous);\n          previous.userData?.room?.userData?.dispose?.();\n          previous.userData?.theme?.userData?.dispose?.();\n          disposeObject(previous);\n        }\n\n        window.dispatchEvent(new CustomEvent('dungeon-veil-room-ready', { detail: { key, floor: live.floor } }));\n      }).catch(error => {\n        if (generation === roomGeneration) pendingRoomKey = '';\n        console.error('KayKit atomic room build failed', error);\n        window.dispatchEvent(new CustomEvent('dungeon-veil-room-ready', { detail: { key, floor: state.floor, failed: true } }));\n      });\n    };\n\n    const preloadNextRoom = (state: GameState) => {\n      if (!state.roomClearReady) return;\n      const nextFloor = state.floor >= 10 ? 1 : state.floor + 1;\n      const key = `${state.chapter}:${nextFloor}`;\n      if (key === preloadRoomKey) return;\n      preloadRoomKey = key;\n      void Promise.all([preloadKayKitDungeonRoom(nextFloor), preloadKayKitRoomTheme(nextFloor)]).catch(error => {\n        preloadRoomKey = '';\n        console.error('KayKit next room preload failed', error);\n      });\n    };'''
          patch_once(renderer, old_build, new_build)
          patch_once(renderer, "      buildRoom(state);\n      if (playerRig) {", "      buildRoom(state);\n      preloadNextRoom(state);\n      if (playerRig) {")
          patch_once(renderer, "      disposed = true;\n      cancelAnimationFrame(raf);", "      disposed = true;\n      roomGeneration += 1;\n      cancelAnimationFrame(raf);")

          layout = 'artifacts/dungeon-rpg/src/game/kaykitRoomLayout.ts'
          patch_once(layout,
            "    { asset: 'boxLarge', x: 5.4, z: -2.9 },\n  ],",
            "    { asset: 'boxLarge', x: 5.4, z: -2.9 },\n    { asset: 'tableMedium', x: -4.9, z: 5.3, rotation: Math.PI / 2 },\n    { asset: 'chair', x: -3.5, z: 5.3, rotation: -Math.PI / 2 },\n    { asset: 'candle', x: -4.8, z: 5.1 },\n    { asset: 'crates', x: 5.1, z: 6.0 },\n    { asset: 'barrel', x: 6.7, z: 6.2 },\n  ],")
          patch_once(layout,
            "    { asset: 'torchMounted', x: RIGHT_WALL, z: 7.9, rotation: -Math.PI / 2 },\n  ],",
            "    { asset: 'torchMounted', x: RIGHT_WALL, z: 7.9, rotation: -Math.PI / 2 },\n    { asset: 'crates', x: -7.0, z: -0.3 },\n    { asset: 'barrel', x: -5.5, z: 0.2 },\n    { asset: 'boxLarge', x: 6.8, z: -0.5 },\n    { asset: 'barrelStack', x: 5.5, z: -0.1, rotation: Math.PI / 2 },\n  ],")
          patch_once(layout,
            "    { asset: 'chestGold', x: 7.0, z: 9.4, rotation: Math.PI },\n  ],",
            "    { asset: 'chestGold', x: 7.0, z: 9.4, rotation: Math.PI },\n    { asset: 'tableMedium', x: 0, z: 7.5 },\n    { asset: 'chair', x: 1.4, z: 7.5, rotation: Math.PI / 2 },\n    { asset: 'candle', x: -0.2, z: 7.3 },\n  ],")
          patch_once(layout,
            "    { asset: 'torchMounted', x: 4.8, z: TOP_WALL, rotation: Math.PI },\n  ],\n\n  // 7",
            "    { asset: 'torchMounted', x: 4.8, z: TOP_WALL, rotation: Math.PI },\n    { asset: 'tableMedium', x: -7.3, z: -1.4, rotation: Math.PI / 2 },\n    { asset: 'chair', x: -5.9, z: -1.4, rotation: -Math.PI / 2 },\n    { asset: 'candle', x: -7.2, z: -1.6 },\n    { asset: 'tableMedium', x: 7.3, z: -1.4, rotation: -Math.PI / 2 },\n    { asset: 'chair', x: 5.9, z: -1.4, rotation: Math.PI / 2 },\n    { asset: 'candle', x: 7.2, z: -1.6 },\n  ],\n\n  // 7")
          patch_once(layout,
            "    { asset: 'torchMounted', x: 5.0, z: TOP_WALL, rotation: Math.PI },\n  ],\n\n  // 8",
            "    { asset: 'torchMounted', x: 5.0, z: TOP_WALL, rotation: Math.PI },\n    { asset: 'chest', x: -8.1, z: 8.2, rotation: Math.PI / 2 },\n    { asset: 'candle', x: -6.9, z: 8.0 },\n    { asset: 'chestGold', x: 8.1, z: 8.2, rotation: -Math.PI / 2 },\n    { asset: 'candle', x: 6.9, z: 8.0 },\n  ],\n\n  // 8")
          patch_once(layout,
            "    { asset: 'torchMounted', x: RIGHT_WALL, z: -4.8, rotation: -Math.PI / 2 },\n  ],\n\n  // 10",
            "    { asset: 'torchMounted', x: RIGHT_WALL, z: -4.8, rotation: -Math.PI / 2 },\n    { asset: 'tableMedium', x: -8.0, z: 2.7, rotation: Math.PI / 2 },\n    { asset: 'chair', x: -6.6, z: 2.7, rotation: -Math.PI / 2 },\n    { asset: 'candle', x: -7.9, z: 2.5 },\n    { asset: 'tableMedium', x: 8.0, z: 2.7, rotation: -Math.PI / 2 },\n    { asset: 'chair', x: 6.6, z: 2.7, rotation: Math.PI / 2 },\n    { asset: 'candle', x: 7.9, z: 2.5 },\n  ],\n\n  // 10")
          PY
      - name: Commit patched source
        shell: bash
        run: |
          git config user.name 'Dungeon Veil CI'
          git config user.email 'actions@users.noreply.github.com'
          git add artifacts/dungeon-rpg/src
          git commit -m 'Make room loading atomic and stage room scenes' || exit 0
          git push origin HEAD:main
