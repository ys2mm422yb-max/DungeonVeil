name: Final Balance Diagnostics

on:
  push:
    branches:
      - test/final-balance-integration
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture social, room, typecheck and build diagnostics
        id: audit
        shell: bash
        run: |
          set +e
          {
            echo '## SOCIAL AUDIT'
            pnpm --filter @workspace/dungeon-rpg audit:social
            social_status=$?
            echo
            echo '## ROOM AUDIT'
            pnpm --filter @workspace/dungeon-rpg audit:rooms
            room_status=$?
            echo
            echo '## TYPECHECK'
            pnpm --filter @workspace/dungeon-rpg typecheck
            type_status=$?
            echo
            echo '## BUILD'
            pnpm --filter @workspace/dungeon-rpg build
            build_status=$?
            echo
            echo "SOCIAL_STATUS=$social_status ROOM_STATUS=$room_status TYPE_STATUS=$type_status BUILD_STATUS=$build_status"
          } > final-balance-diagnostics.txt 2>&1
          status=0
          if [ "$social_status" -ne 0 ] || [ "$room_status" -ne 0 ] || [ "$type_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then status=1; fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: final-balance-diagnostics
          path: final-balance-diagnostics.txt
          retention-days: 3
      - name: Post compact diagnostics to PR 181
        uses: actions/github-script@v7
        env:
          STATUS: ${{ steps.audit.outputs.status }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const text = fs.readFileSync('final-balance-diagnostics.txt', 'utf8');
            const compact = text.length > 60000 ? text.slice(-60000) : text;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 181,
              body: `<!-- final-balance-diagnostics -->\n## Final Balance Diagnostics — ${process.env.STATUS === '0' ? 'PASS' : 'FAIL'}\n\n\`\`\`text\n${compact}\n\`\`\``
            });
      - name: Fail after report
        if: steps.audit.outputs.status != '0'
        run: exit 1
