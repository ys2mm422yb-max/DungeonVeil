name: Final Balance Diagnostics

on:
  push:
    branches:
      - test/final-balance-integration

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture room audit
        id: audit
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg audit:rooms > final-balance-diagnostics.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: final-balance-diagnostics
          path: final-balance-diagnostics.txt
          retention-days: 3
      - name: Fail after upload
        if: steps.audit.outputs.status != '0'
        run: exit 1
