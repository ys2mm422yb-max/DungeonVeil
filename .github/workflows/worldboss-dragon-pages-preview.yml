name: Dragon World Boss Pages Preview

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/worldboss-dragon-pages-preview.yml'
      - '.ci/worldboss-dragon-pages-trigger.txt'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.event.pull_request.head.ref == 'rework/worldboss-full-3d-arena'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rework/worldboss-full-3d-arena
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate Dungeon Veil
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm --filter @workspace/dungeon-rpg typecheck
      - name: Build Pages artifact
        env:
          BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg build
      - name: Audit Pages artifact
        env:
          BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dungeon-rpg/dist/public
      - uses: actions/deploy-pages@v4
