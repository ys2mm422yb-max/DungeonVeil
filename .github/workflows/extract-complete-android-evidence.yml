name: Extract Complete Android Evidence

on:
  push:
    branches:
      - evidence/extract-complete-29872616605
    paths:
      - '.github/workflows/extract-complete-android-evidence.yml'

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: evidence/extract-complete-29872616605
      - name: Download exact Android complete-runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: complete-runtime-evidence-android-chromium
          path: source
          repository: ys2mm422yb-max/DungeonVeil
          run-id: 29872616605
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Select manifest and critical visual evidence
        shell: bash
        run: |
          set -euo pipefail
          selected=diagnostics/android-29872616605
          rm -rf "$selected"
          mkdir -p "$selected"
          manifest=$(find source -type f -name complete-runtime-results.json -print -quit)
          test -n "$manifest"
          cp "$manifest" "$selected/complete-runtime-results.json"
          python - "$manifest" "$selected/summary.json" <<'PY'
          import json, sys
          source, output = sys.argv[1:]
          data = json.load(open(source))
          issues = []
          def walk(suite, prefix=()):
              title = suite.get('title', '')
              here = prefix + ((title,) if title else ())
              for spec in suite.get('specs', []):
                  spec_title = spec.get('title', '')
                  for test in spec.get('tests', []):
                      results = test.get('results', [])
                      status = test.get('status')
                      if status not in (None, 'expected') or any(r.get('status') not in ('passed', 'skipped') for r in results):
                          issues.append({
                              'title': ' > '.join(here + ((spec_title,) if spec_title else ())),
                              'status': status,
                              'results': [{'status': r.get('status'), 'retry': r.get('retry')} for r in results],
                          })
              for child in suite.get('suites', []):
                  walk(child, here)
          for suite in data.get('suites', []):
              walk(suite)
          json.dump({'stats': data.get('stats', {}), 'issues': issues}, open(output, 'w'), indent=2)
          PY
          printf '%s\n' "$GITHUB_RUN_ID" > "$selected/workflow-run-id.txt"
          for name in \
            post-clear-rune-room-13-android-chromium.png \
            post-clear-rune-room-16-android-chromium.png \
            post-clear-rune-room-19-android-chromium.png \
            solo-room-21-android-chromium.png \
            solo-room-41-android-chromium.png \
            solo-room-50-android-chromium.png \
            duo-room-21-android-chromium.png \
            duo-room-41-android-chromium.png \
            duo-room-50-android-chromium.png \
            webgl-recovered-hidden-hud-android-chromium.png \
            webgl-recovered-room-13-android-chromium.png; do
            file=$(find source -type f -name "$name" -print -quit)
            test -n "$file"
            cp "$file" "$selected/$name"
          done
          find "$selected" -maxdepth 1 -type f -printf '%f\n' | sort
      - name: Record compact evidence on diagnostic branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/android-29872616605
          git diff --cached --quiet && exit 0
          git commit -m 'Record compact Android runtime evidence'
          git push origin HEAD:evidence/extract-complete-29872616605
      - name: Upload compact Android evidence
        uses: actions/upload-artifact@v4
        with:
          name: compact-complete-runtime-android-29872616605
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
          path: diagnostics/android-29872616605
