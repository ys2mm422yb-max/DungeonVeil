              """    if (this.shotPathBlocked(attackFromX, attackFromY, attackTargetX, attackTargetY, 0.08)) return;

    if (windup.mageProjectile) {
      this.launchMageProjectile(enemy, time, attackFromX, attackFromY, attackTargetX, attackTargetY);
      return;
    }

    if (windup.archetype === 'dragon') {""",
