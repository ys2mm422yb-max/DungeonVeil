          projectile_methods = r'''

  private launchMageProjectile(enemy: Enemy, time: number, fromX: number, fromY: number, targetX: number, targetY: number) {
    const angle = Math.atan2(targetY - fromY, targetX - fromX);
    const aimedDistance = Math.max(96, Math.hypot(targetX - fromX, targetY - fromY));
    const travel = Math.min(280, aimedDistance + 58);
    const duration = Math.max(420, Math.round(travel / MAGE_PROJECTILE_SPEED * 1000));
    const effectId = `enemy-mage-shot-${time}-${enemy.id}`;
    const color = '#b995ff';
    this.state.effects.push({
      id: effectId,
      x: fromX,
      y: fromY,
      radius: MAGE_PROJECTILE_RADIUS,
      maxRadius: travel,
      color,
      lifeTime: 0,
      maxLifeTime: duration,
      type: 'beam',
      angle,
      width: 7,
      element: 'arcane',
      fromEnemyId: enemy.id,
    });
    this.enemyProjectiles.push({
      id: `mage-projectile-${time}-${enemy.id}`,
      effectId,
      sourceEnemyId: enemy.id,
      x: fromX,
      y: fromY,
      vx: Math.cos(angle) * MAGE_PROJECTILE_SPEED,
      vy: Math.sin(angle) * MAGE_PROJECTILE_SPEED,
      radius: MAGE_PROJECTILE_RADIUS,
      attack: enemy.attack,
      expiresAt: time + duration,
      color,
    });
  }

  private removeEnemyProjectile(index: number, impactX?: number, impactY?: number) {
    const [projectile] = this.enemyProjectiles.splice(index, 1);
    if (!projectile) return;
    this.state.effects = this.state.effects.filter(effect => effect.id !== projectile.effectId);
    if (impactX === undefined || impactY === undefined) return;
    this.state.effects.push({
      id: `mage-impact-${projectile.id}`,
      x: impactX,
      y: impactY,
      radius: 4,
      maxRadius: 30,
      color: projectile.color,
      lifeTime: 0,
      maxLifeTime: 260,
      type: 'circle',
      element: 'arcane',
    });
    this.state.particles.push(...makeHitSpark(impactX, impactY, projectile.color, 8));
  }

  private clearEnemyProjectiles(sourceEnemyId?: string) {
    const removed = new Set(
      this.enemyProjectiles
        .filter(projectile => !sourceEnemyId || projectile.sourceEnemyId === sourceEnemyId)
        .map(projectile => projectile.effectId),
    );
    if (!removed.size) return;
    this.enemyProjectiles = sourceEnemyId
      ? this.enemyProjectiles.filter(projectile => projectile.sourceEnemyId !== sourceEnemyId)
      : [];
    this.state.effects = this.state.effects.filter(effect => !removed.has(effect.id));
  }

  private updateEnemyProjectiles(dt: number, time: number) {
    const player = this.state.player;
    const playerX = player.x + player.width / 2;
    const playerY = player.y + player.height / 2;
    for (let index = this.enemyProjectiles.length - 1; index >= 0; index--) {
      const projectile = this.enemyProjectiles[index];
      const previousX = projectile.x;
      const previousY = projectile.y;
      projectile.x += projectile.vx * dt / 1000;
      projectile.y += projectile.vy * dt / 1000;

      if (this.shotPathBlocked(previousX, previousY, projectile.x, projectile.y, 0.025)) {
        this.removeEnemyProjectile(index, previousX, previousY);
        continue;
      }

      const hitRadius = projectile.radius + Math.min(player.width, player.height) * 0.38;
      if (Math.hypot(playerX - projectile.x, playerY - projectile.y) <= hitRadius) {
        if (time > player.invincibleUntil) {
          const raw = projectile.attack - player.defense + Math.floor(Math.random() * 3);
          const damage = Math.max(1, raw);
          player.hp -= damage;
          player.lastHitTime = time;
          if (skillRank(this.state.runSkills, 'defense') > 0) player.lastGuardTime = time;
          this.state.damageNumbers.push({
            id: `mage-hit-${time}-${projectile.id}`,
            x: playerX + (Math.random() - 0.5) * 14,
            y: player.y - 8,
            value: `-${damage}`,
            color: '#c8a8ff',
            lifeTime: 0,
            maxLifeTime: 800,
            scale: 1.12,
          });
        }
        this.removeEnemyProjectile(index, projectile.x, projectile.y);
        continue;
      }

      if (time >= projectile.expiresAt) this.removeEnemyProjectile(index);
    }
  }
'''
          replace_once(
