  engine.enemyProjectiles[0].x = px;
  engine.enemyProjectiles[0].y = py;
  engine.enemyProjectiles[0].vx = 0;
  engine.enemyProjectiles[0].vy = 0;
  engine.updateEnemyProjectiles(16, 1116);
  assert(gamePlayer.hp === hpAfterHit, 'Dash invulnerability did not avoid the mage projectile.');
