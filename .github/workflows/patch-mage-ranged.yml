          canvas = root / 'src/components/GameCanvasKayKit3D.tsx'
          canvas_text = canvas.read_text()
          pattern = re.compile(r"    const syncArrows = \(state: GameState, wallNow: number\) => \{.*?\n    \};\n\n    const syncCircleEffects", re.S)
          if len(pattern.findall(canvas_text)) != 1:
