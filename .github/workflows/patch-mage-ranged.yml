          replacement = r'''    const createMageProjectileVisual = (color: string) => {
      const orb = new THREE.Group();
      orb.userData.mageProjectile = true;
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(0.14, IS_ANDROID ? 8 : 12, IS_ANDROID ? 6 : 10),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.96, depthWrite: false }),
      );
      orb.add(core);
      const halo = new THREE.Mesh(
        new THREE.TorusGeometry(0.21, 0.035, 7, IS_ANDROID ? 14 : 22),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.74, depthWrite: false, blending: THREE.AdditiveBlending }),
      );
      halo.rotation.x = Math.PI / 2;
      orb.add(halo);
      const crossHalo = halo.clone();
      crossHalo.material = halo.material.clone();
      crossHalo.rotation.set(0, Math.PI / 2, 0);
      orb.add(crossHalo);
      orb.userData.core = core;
      orb.userData.halo = halo;
      orb.userData.crossHalo = crossHalo;
      if (!IS_MOBILE) {
        const light = new THREE.PointLight(color, 3.8, 3.2, 2);
        orb.add(light);
        orb.userData.elementLight = light;
      }
      return orb;
    };

    const syncArrows = (state: GameState, wallNow: number) => {
      const shots = state.effects.filter(effect => effect.type === 'beam' && (
        effect.id.startsWith('shot-')
        || effect.id.startsWith('pierce-')
        || effect.id.startsWith('rico-')
        || effect.id.startsWith('enemy-mage-shot-')
      )).slice(-MAX_ARROW_VISUALS);
      const active = new Set(shots.map(effect => effect.id));
      for (const [id, mesh] of arrowVisuals) {
        if (active.has(id)) continue;
        scene.remove(mesh);
        disposeObject(mesh);
        arrowVisuals.delete(id);
      }

      for (const shot of shots) {
        const mageProjectile = shot.id.startsWith('enemy-mage-shot-');
        let arrow = arrowVisuals.get(shot.id);
        if (!arrow) {
          if (mageProjectile) {
            arrow = createMageProjectileVisual(shot.color);
          } else if (arrowPrototype) {
            arrow = arrowPrototype.clone(true);
            arrow.scale.setScalar(shot.element === 'piercing' ? 1.32 : 1.2);
            const lineMaterials: any[] = [];
            arrow.traverse((node: any) => {
              if (node.isLine && node.material) {
                node.material = node.material.clone();
                lineMaterials.push(node.material);
              }
              if (!node.isMesh && !node.isLine) return;
              node.castShadow = false;
              node.frustumCulled = true;
            });
            arrow.userData.lineMaterials = lineMaterials;
            addElementVisual(arrow, shot.element, shot.color);
          }
          if (arrow) {
            scene.add(arrow);
            arrowVisuals.set(shot.id, arrow);
          }
        }
        if (!arrow) continue;

        const progress = Math.max(0, Math.min(1, shot.lifeTime / shot.maxLifeTime));
        const angle = shot.angle ?? 0;
        const travel = shot.maxRadius / TILE;
        arrow.position.set(
          mapX(state, shot.x) + Math.cos(angle) * travel * progress,
          mageProjectile ? 0.82 : 0.88,
          mapZ(state, shot.y) + Math.sin(angle) * travel * progress,
        );

        const pulse = 0.82 + Math.sin(wallNow * 0.025 + progress * 8) * 0.18;
        if (mageProjectile) {
          arrow.rotation.y = -angle;
          arrow.userData.halo.rotation.z = wallNow * 0.004;
          arrow.userData.crossHalo.rotation.x = wallNow * -0.0035;
          arrow.userData.core.scale.setScalar(0.9 + pulse * 0.18);
          arrow.userData.core.material.opacity = 0.78 + pulse * 0.18;
          arrow.userData.halo.material.opacity = 0.48 + pulse * 0.3;
          arrow.userData.crossHalo.material.opacity = 0.34 + pulse * 0.24;
          if (arrow.userData.elementLight) arrow.userData.elementLight.intensity = 2.4 + pulse * 2.2;
          continue;
        }

        arrow.rotation.set(Math.PI / 2, -angle - Math.PI / 2, 0);
        (arrow.userData.lineMaterials as any[] | undefined)?.forEach(material => {
          material.color?.set?.(shot.color);
          material.opacity = Math.max(0.3, 0.96 * (1 - progress * 0.32));
        });
        const glows = arrow.userData.elementGlows as any[] | undefined;
