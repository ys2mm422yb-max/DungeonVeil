name: Apply mage ranged combat patch

on:
  push:
    branches:
      - fix/mage-ranged-projectiles
    paths:
      - artifacts/dungeon-rpg/.mage-ranged-trigger

permissions:
  contents: write

concurrency:
  group: mage-ranged-combat-patch
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mage-ranged-projectiles
          fetch-depth: 0

      - name: Apply focused mage ranged combat changes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import re

          root = Path('artifacts/dungeon-rpg')

          def replace_once(path, old, new):
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:100]!r}')
              path.write_text(text.replace(old, new, 1))

          regional = root / 'src/game/enemyRegionalIdentity.ts'
          replace_once(
              regional,
              "\nexport function bossCombatProfile(room: number) {",
              """
export function enemyUsesMageProjectile(room: number, type: EnemyType, index = 0) {
  const profile = enemyVisualProfile(room, type, index);
  return type !== 'boss' && profile.family === 'adventurer' && profile.role === 'mage';
}

export function bossCombatProfile(room: number) {""",
          )

