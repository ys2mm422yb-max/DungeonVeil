          audit.write_text(r'''import fs from 'node:fs';
import path from 'node:path';
import { fileURLToPath } from 'node:url';
import { createServer } from 'vite';

const root = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '..');
const read = relative => fs.readFileSync(path.join(root, relative), 'utf8');
const assert = (condition, message) => { if (!condition) throw new Error(message); };

const regionalSource = read('src/game/enemyRegionalIdentity.ts');
const aiSource = read('src/game/enemyRunAI.ts');
const engineSource = read('src/game/runEngine.ts');
const canvasSource = read('src/components/GameCanvasKayKit3D.tsx');

assert(regionalSource.includes("profile.family === 'adventurer' && profile.role === 'mage'"), 'Only visible hat-mage models may receive ranged magic.');
assert(aiSource.includes('dist > 215') && aiSource.includes('dist < 122') && aiSource.includes('214, 1280'), 'Hat mages need explicit ranged spacing and a measured cadence.');
assert(engineSource.includes('type EnemyProjectile =') && engineSource.includes('updateEnemyProjectiles(dt, timestamp)'), 'Mage projectiles need a real runtime lifecycle.');
assert(engineSource.includes('if (windup.mageProjectile)') && engineSource.includes('launchMageProjectile'), 'Mage attacks still resolve as immediate melee hits.');
assert(engineSource.includes('Math.hypot(playerX - projectile.x, playerY - projectile.y) <= hitRadius'), 'Mage damage is not tied to projectile collision.');
assert(engineSource.includes('time > player.invincibleUntil'), 'Dash invulnerability no longer protects against mage projectiles.');
assert(canvasSource.includes("effect.id.startsWith('enemy-mage-shot-')") && canvasSource.includes('createMageProjectileVisual'), 'The travelling spell orb is not rendered.');
assert(canvasSource.includes('SphereGeometry(0.14') && canvasSource.includes('TorusGeometry(0.21'), 'The mage projectile lacks a distinct orb visual.');

const server = await createServer({
  root,
  logLevel: 'silent',
  server: { middlewareMode: true },
  appType: 'custom',
});

try {
  const regional = await server.ssrLoadModule('/src/game/enemyRegionalIdentity.ts');
  const ai = await server.ssrLoadModule('/src/game/enemyRunAI.ts');
  const runtime = await server.ssrLoadModule('/src/game/runEngine.ts');

  assert(regional.enemyUsesMageProjectile(11, 'skeleton', 0) === true, 'Room 11 hat mage is not ranged.');
  assert(regional.enemyUsesMageProjectile(11, 'skeleton', 1) === false, 'Room 11 rogue was incorrectly converted to a mage.');
  assert(regional.enemyUsesMageProjectile(1, 'vampire', 0) === false, 'A creature/bat role was incorrectly treated as a hat mage.');
  assert(regional.enemyUsesMageProjectile(20, 'boss', 0) === false, 'The existing room-20 boss contract was overridden.');
  assert(regional.enemyUsesMageProjectile(35, 'skeleton', 0) === true, 'Later hat mages are not ranged.');

  const enemy = {
    id: '123-11-0', type: 'enemy', enemyType: 'skeleton', x: 100, y: 100, width: 26, height: 26,
    vx: 0, vy: 0, hp: 50, maxHp: 50, attack: 8, defense: 2, speed: 72, color: '#fff',
