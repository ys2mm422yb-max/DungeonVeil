name: Temporary Room Audit Isolation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  isolate-room-audits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run each room audit independently
        shell: bash
        run: |
          mkdir -p audit-isolation
          cd artifacts/dungeon-rpg
          scripts=(
            validate-all-rooms.mjs
            validate-production-rooms.mjs
            validate-spawn-hitboxes.mjs
            validate-enemy-visibility.mjs
            validate-mobile-combat.mjs
            validate-worldboss-performance.mjs
            validate-social-navigation.mjs
            validate-social-progression.mjs
          )
          for script in "${scripts[@]}"; do
            echo "=== $script ===" | tee -a ../../audit-isolation/summary.log
            if node "scripts/$script" > "../../audit-isolation/$script.log" 2>&1; then
              echo "PASS $script" | tee -a ../../audit-isolation/summary.log
            else
              echo "FAIL $script" | tee -a ../../audit-isolation/summary.log
            fi
          done
          cat ../../audit-isolation/summary.log
      - uses: actions/upload-artifact@v4
        with:
          name: menu-room-audit-isolation
          path: audit-isolation
