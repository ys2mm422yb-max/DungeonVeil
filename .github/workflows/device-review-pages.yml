name: Dungeon Veil Device Review Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/device-review-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-device-review-pages
  cancel-in-progress: true

jobs:
  validate-and-build:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'verify/device-review-worldboss-village-run-room1'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      reviewed_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout device-review branch
        uses: actions/checkout@v4

      - name: Resolve reviewed commit
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room, combat, world-boss and social audits
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build GitHub Pages application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.commit.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s","purpose":"device-review"}\n' "${{ steps.commit.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: validate-and-build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy fixed device-review link
        id: deployment
        uses: actions/deploy-pages@v4
