name: Apply iPad Dash Contract Fix

on:
  push:
    branches:
      - fix/rooms-13-50-black-ghost-damage-v1
    paths:
      - '.github/workflows/apply-ipad-dash-contract-fix.yml'

permissions:
  contents: write

concurrency:
  group: apply-ipad-dash-contract-fix
  cancel-in-progress: false

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/rooms-13-50-black-ghost-damage-v1
          fetch-depth: 0
      - name: Apply exact orientation-aware test contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('artifacts/dungeon-rpg/tests/full-game-smoke.spec.mjs')
          text = path.read_text()
          old = """    const joystickMinimum = testInfo.project.name.includes('landscape') ? 140 : 132;\n    expect(joystickBox?.width ?? 0).toBeGreaterThanOrEqual(joystickMinimum);\n    expect(dashBox?.width ?? 0).toBeGreaterThanOrEqual(88);\n"""
          new = """    const landscape = testInfo.project.name.includes('landscape');\n    const joystickMinimum = landscape ? 140 : 132;\n    const dashMinimum = landscape ? 88 : 78;\n    expect(joystickBox?.width ?? 0).toBeGreaterThanOrEqual(joystickMinimum);\n    expect(dashBox?.width ?? 0).toBeGreaterThanOrEqual(dashMinimum);\n"""
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one iPad control-size contract')
          path.write_text(text.replace(old, new, 1))
          PY

          git diff --check
          git diff -- artifacts/dungeon-rpg/tests/full-game-smoke.spec.mjs
          test "$(git diff --name-only | wc -l)" -eq 1
          test "$(git diff --name-only)" = 'artifacts/dungeon-rpg/tests/full-game-smoke.spec.mjs'
      - name: Commit exact test fix and remove helper
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/apply-ipad-dash-contract-fix.yml
          git add artifacts/dungeon-rpg/tests/full-game-smoke.spec.mjs
          mapfile -t changed < <(git diff --cached --name-only)
          printf '%s\n' "${changed[@]}"
          test "${#changed[@]}" -eq 2
          printf '%s\n' "${changed[@]}" | grep -Fx '.github/workflows/apply-ipad-dash-contract-fix.yml'
          printf '%s\n' "${changed[@]}" | grep -Fx 'artifacts/dungeon-rpg/tests/full-game-smoke.spec.mjs'
          git commit -m 'Match iPad dash evidence to orientation layout'
          git push origin HEAD:fix/rooms-13-50-black-ghost-damage-v1
