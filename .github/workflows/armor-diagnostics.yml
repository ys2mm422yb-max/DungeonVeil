name: Armor Diagnostics

on:
  pull_request:
    branches: [main, 'fix/**', 'work/block-*']

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture validation output
        id: validate
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          pnpm run typecheck > diagnostics/typecheck.log 2>&1
          echo $? > diagnostics/typecheck.exit
          pnpm --dir artifacts/dungeon-rpg run audit:social > diagnostics/social.log 2>&1
          echo $? > diagnostics/social.exit
          pnpm --dir artifacts/dungeon-rpg run audit:rooms > diagnostics/rooms.log 2>&1
          echo $? > diagnostics/rooms.exit
          set -e
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: armor-diagnostics
          path: diagnostics
          if-no-files-found: error
      - name: Enforce captured results
        shell: bash
        run: |
          test "$(cat diagnostics/typecheck.exit)" = "0"
          test "$(cat diagnostics/social.exit)" = "0"
          test "$(cat diagnostics/rooms.exit)" = "0"
