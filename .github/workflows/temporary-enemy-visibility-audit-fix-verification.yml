name: Temporary enemy visibility audit fix verification

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance

permissions:
  contents: read

jobs:
  diagnose-browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Production build
        run: pnpm --filter @workspace/dungeon-rpg build
      - name: Install Chromium
        run: pnpm dlx @playwright/test@1.54.1 install --with-deps chromium
      - name: Browser smoke diagnostics
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cat > post-merge-playwright.config.ts <<'TS'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            testDir: '.', testMatch: /post-merge-smoke\.spec\.ts/, timeout: 45000, retries: 0, reporter: 'line',
            use: { baseURL: 'http://127.0.0.1:4173', browserName: 'chromium' },
            projects: [
              { name: 'desktop', use: { viewport: { width: 1280, height: 800 } } },
              { name: 'iphone', use: { viewport: { width: 390, height: 844 }, userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 Version/18.5 Mobile/15E148 Safari/604.1', isMobile: true, hasTouch: true } },
              { name: 'android', use: { viewport: { width: 412, height: 915 }, userAgent: 'Mozilla/5.0 (Linux; Android 15; Pixel 9) AppleWebKit/537.36 Chrome/136.0.0.0 Mobile Safari/537.36', isMobile: true, hasTouch: true } },
              { name: 'ipad', use: { viewport: { width: 1024, height: 1366 }, userAgent: 'Mozilla/5.0 (iPad; CPU OS 18_5 like Mac OS X) AppleWebKit/605.1.15 Version/18.5 Mobile/15E148 Safari/604.1', isMobile: true, hasTouch: true } },
            ],
          });
          TS
          cat > post-merge-smoke.spec.ts <<'TS'
          import { test, expect } from '@playwright/test';
          test('production build loads without fatal renderer errors', async ({ page }) => {
            const pageErrors: string[] = [];
            const consoleErrors: string[] = [];
            page.on('pageerror', error => pageErrors.push(error.message));
            page.on('console', message => { if (message.type() === 'error') consoleErrors.push(message.text()); });
            const response = await page.goto('/DungeonVeil/', { waitUntil: 'domcontentloaded' });
            expect(response?.ok(), `status=${response?.status()}`).toBeTruthy();
            await expect(page.locator('body')).toBeVisible();
            await expect(page.locator('#root')).toBeVisible();
            await page.waitForTimeout(2500);
            console.log('PROFILE', test.info().project.name, 'TITLE', await page.title());
            console.log('PAGE_ERRORS', JSON.stringify(pageErrors));
            console.log('CONSOLE_ERRORS', JSON.stringify(consoleErrors));
            expect((await page.title()).trim().length).toBeGreaterThan(0);
            expect((await page.locator('body').innerText()).trim().length).toBeGreaterThan(0);
            const overflow = await page.evaluate(() => document.documentElement.scrollWidth - document.documentElement.clientWidth);
            expect(overflow).toBeLessThanOrEqual(2);
            expect(pageErrors, pageErrors.join('\n')).toEqual([]);
          });
          TS
          pnpm --filter @workspace/dungeon-rpg serve -- --port 4173 > preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4173/DungeonVeil/ >/dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4173/DungeonVeil/ >/dev/null
          pnpm dlx @playwright/test@1.54.1 test --config=post-merge-playwright.config.ts 2>&1 | tee browser-smoke.log
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-diagnostics
          path: |
            browser-smoke.log
            preview.log
          retention-days: 1
      - name: Preserve browser result
        if: steps.browser.outcome != 'success'
        run: exit 1
