name: Temporary enemy visibility audit fix verification

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance

permissions:
  contents: read

jobs:
  collect-audit-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Archive audit scripts
        run: tar -czf audit-scripts.tgz artifacts/dungeon-rpg/scripts
      - name: Upload audit scripts
        uses: actions/upload-artifact@v4
        with:
          name: audit-scripts
          path: audit-scripts.tgz
          retention-days: 1
