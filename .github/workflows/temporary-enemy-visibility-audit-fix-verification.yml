name: Temporary enemy visibility audit fix verification

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance

permissions:
  contents: read

jobs:
  diagnose-flight-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run room 20 flight diagnostics
        id: flight
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cat > /tmp/verify-room20-flight.ts <<'TS'
          import { room20BossFlightPose } from '${{ github.workspace }}/artifacts/dungeon-rpg/src/components/kaykitEnemy3D.ts';
          const boss = { id: 'enemy-boss-20-0', enemyType: 'boss', lastAttackTime: 1000, isDead: false } as any;
          const samples = {
            start: room20BossFlightPose(boss, 1000),
            launch: room20BossFlightPose(boss, 1180),
            hover: room20BossFlightPose(boss, 1360),
            dive: room20BossFlightPose(boss, 1600),
            landed: room20BossFlightPose(boss, 1720),
            after: room20BossFlightPose(boss, 1721),
            other: room20BossFlightPose({ ...boss, id: 'enemy-boss-30-0' }, 1360),
          };
          console.log(JSON.stringify(samples, null, 2));
          const assert = (condition: unknown, message: string) => { if (!condition) throw new Error(message); };
          assert(samples.start.active && samples.start.height === 0, 'start grounded');
          assert(samples.launch.height > 1, 'visible launch');
          assert(samples.hover.height > 1.75, 'visible hover');
          assert(samples.dive.height < samples.hover.height && samples.dive.height > 0, 'visible dive');
          assert(samples.landed.active && Math.abs(samples.landed.height) < 1e-9, 'landing at 720 ms');
          assert(!samples.after.active && samples.after.height === 0, 'grounded after impact');
          assert(samples.launch.shadowScale < 0.75 && samples.hover.shadowScale < 0.75, 'airborne shadow smaller');
          assert(samples.launch.shadowOpacity < 0.2 && samples.hover.shadowOpacity < 0.2, 'airborne shadow lighter');
          assert(!samples.other.active, 'other boss rooms unaffected');
          TS
          pnpm dlx tsx@4.20.3 /tmp/verify-room20-flight.ts 2>&1 | tee flight-contract.log
      - name: Upload flight diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flight-contract-log
          path: flight-contract.log
          retention-days: 1
      - name: Preserve flight result
        if: steps.flight.outcome != 'success'
        run: exit 1
