name: Menu Mobile Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - '.github/workflows/menu-mobile-review.yml'

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build review
        run: pnpm --filter @workspace/dungeon-rpg build
      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --user playwright==1.54.0
          python3 -m playwright install --with-deps chromium
      - name: Start preview
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 --directory artifacts/dungeon-rpg/dist/public > /tmp/menu-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/menu-preview.log
          exit 1
      - name: Capture iPhone and Android
        run: |
          mkdir -p screenshots
          python3 - <<'PY'
          from playwright.sync_api import sync_playwright

          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(headless=True)
              for filename, device_name in [('iphone13', 'iPhone 13'), ('pixel5', 'Pixel 5')]:
                  profile = playwright.devices[device_name]
                  context = browser.new_context(**profile, locale='de-DE')
                  page = context.new_page()
                  page.goto('http://127.0.0.1:4173/?qa=menu', wait_until='networkidle', timeout=45000)
                  page.wait_for_timeout(10000)
                  page.screenshot(path=f'screenshots/menu-{filename}.png', full_page=False)
                  context.close()
              browser.close()
          PY
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: menu-mobile-review
          path: screenshots/*.png
          if-no-files-found: error
          retention-days: 3
