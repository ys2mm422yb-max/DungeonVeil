name: World Boss Mobile UA Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - '.github/workflows/worldboss-mobile-ua-review.yml'

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build review
        run: pnpm --filter @workspace/dungeon-rpg build
      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --disable-pip-version-check playwright==1.54.0
          python3 -m playwright install --with-deps chromium
      - name: Start preview
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 --directory artifacts/dungeon-rpg/dist/public > /tmp/worldboss-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/worldboss-preview.log
          exit 1
      - name: Capture emulated iPhone and Android
        run: |
          mkdir -p screenshots
          python3 - <<'PY'
          from playwright.sync_api import sync_playwright

          targets = [
              ('iPhone 13', 'screenshots/worldboss-iphone13.png'),
              ('Pixel 5', 'screenshots/worldboss-pixel5.png'),
          ]
          with sync_playwright() as playwright:
              browser = playwright.chromium.launch()
              for device_name, output in targets:
                  context = browser.new_context(**playwright.devices[device_name])
                  page = context.new_page()
                  page.goto('http://127.0.0.1:4173/?qa=worldboss', wait_until='networkidle', timeout=45_000)
                  page.wait_for_timeout(9_000)
                  page.screenshot(path=output, full_page=False)
                  context.close()
              browser.close()
          PY
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: worldboss-mobile-ua-review
          path: screenshots/*.png
          if-no-files-found: error
          retention-days: 3
