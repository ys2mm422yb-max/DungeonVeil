name: Inspect Block 8 Live Deployment

on:
  push:
    branches: [integration/block-8-final-device-review]
    paths:
      - '.github/workflows/block8-live-verification.yml'

permissions:
  contents: write

jobs:
  inspect-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/block-8-final-device-review
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture fixed-link deployment marker
        shell: bash
        run: |
          set -u
          rm -f live-response.json
          for attempt in $(seq 1 12); do
            if curl -fsSL --retry 1 --retry-delay 1 "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?inspect=${GITHUB_RUN_ID}-${attempt}" -o live-response.json; then
              break
            fi
            sleep 5
          done
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          expected_commit = '09b2c9f3a10ff6152a8952dbad55263fac287957'
          expected_source = 'block-8-final-integration'
          response_path = Path('live-response.json')
          try:
              live = json.loads(response_path.read_text()) if response_path.exists() else None
          except Exception as exc:
              live = {'parseError': str(exc), 'raw': response_path.read_text(errors='replace') if response_path.exists() else None}
          result = {
              'checkedAt': datetime.now(timezone.utc).isoformat(),
              'expectedCommit': expected_commit,
              'expectedSource': expected_source,
              'live': live,
              'verified': isinstance(live, dict) and live.get('commit') == expected_commit and live.get('source') == expected_source,
          }
          Path('block8-live-verification.json').write_text(json.dumps(result, ensure_ascii=False, indent=2) + '\n')
          PY
          rm -f live-response.json .github/workflows/block8-live-verification.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record Block 8 live deployment inspection'
          git push origin HEAD:integration/block-8-final-device-review
