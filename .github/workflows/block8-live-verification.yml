name: Verify Block 8 Live Deployment

on:
  push:
    branches: [integration/block-8-final-device-review]
    paths:
      - '.github/workflows/block8-live-verification.yml'

permissions:
  contents: write

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/block-8-final-device-review
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify fixed Dungeon Veil test link
        shell: bash
        run: |
          set -euo pipefail
          ok=0
          for attempt in $(seq 1 24); do
            if curl -fsSL --retry 2 --retry-delay 2 "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?verify=${GITHUB_RUN_ID}-${attempt}" -o block8-live-verification.json; then
              if python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('block8-live-verification.json').read_text())
          assert data.get('source') == 'block-8-final-integration', data
          assert data.get('commit') == '09b2c9f3a10ff6152a8952dbad55263fac287957', data
          print(json.dumps(data, ensure_ascii=False))
          PY
              then
                ok=1
                break
              fi
            fi
            sleep 5
          done
          test "$ok" = 1
          rm -f .github/workflows/block8-live-verification.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record verified Block 8 live deployment'
          git push origin HEAD:integration/block-8-final-device-review
