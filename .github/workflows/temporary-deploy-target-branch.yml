name: Temporary deploy target branch

on:
  pull_request:
    branches:
      - test/pages-deploy-base-187
    paths:
      - '.github/workflows/temporary-deploy-target-branch.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Run room audits individually
        id: room_audits
        continue-on-error: true
        shell: bash
        working-directory: artifacts/dungeon-rpg
        run: |
          set -o pipefail
          : > room-audit-deploy.log
          scripts=(
            validate-all-rooms.mjs
            validate-production-rooms.mjs
            validate-spawn-hitboxes.mjs
            validate-normal-enemy-telegraphs-and-prop-hitboxes.mjs
            validate-enemy-visibility.mjs
            validate-mobile-combat.mjs
            validate-combat-telegraphs-late-balance.mjs
            validate-mobile-zoom-guard.mjs
            validate-ipad-run-layout.mjs
            validate-worldboss-performance.mjs
            validate-social-navigation.mjs
            validate-social-progression.mjs
            validate-run-identity-social-spectator.mjs
            validate-gift-fusions.mjs
            validate-dust-avatar-overhaul.mjs
            validate-rooms-4-5-composition.mjs
            validate-room-quality-6-50.mjs
            validate-guild-mobile-layout.mjs
            validate-blocks-1-8-integration.mjs
            validate-main-menu-equipped-ranger.mjs
            validate-inventory-guild-chat-chapters.mjs
            validate-player-profile.mjs
            validate-public-player-profile.mjs
            validate-friends-public-profiles.mjs
            validate-online-presence.mjs
            validate-elite-outside-profile.mjs
            validate-menu-copy-relic-progression.mjs
            validate-profile-badge-compact.mjs
            validate-upgrade-economy.mjs
            validate-armor-progression.mjs
            validate-chapter-reward-contract.mjs
            validate-final-balance-integration.mjs
            validate-final-balance-curve.mjs
            validate-boss-room-telegraphs-and-meadow.mjs
          )
          for script in "${scripts[@]}"; do
            echo "===== ${script} =====" | tee -a room-audit-deploy.log
            if node "scripts/${script}" 2>&1 | tee -a room-audit-deploy.log; then
              echo "PASS ${script}" | tee -a room-audit-deploy.log
            else
              echo "FAIL ${script}" | tee -a room-audit-deploy.log
              exit 1
            fi
          done

      - name: Upload room audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-room-audit-evidence
          path: artifacts/dungeon-rpg/room-audit-deploy.log
          retention-days: 1

      - name: Stop on room audit failure
        if: steps.room_audits.outcome != 'success'
        run: exit 1

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build GitHub Pages output
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
          grep -q '/DungeonVeil/' artifacts/dungeon-rpg/dist/public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout target branch for deployment marker
        uses: actions/checkout@v4
        with:
          ref: fix/mobile-telegraphs-room-21-50-balance
          fetch-depth: 0

      - name: Record successful deployment
        env:
          DEPLOYED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          mkdir -p .ci
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          payload = {
              "workflow": "Temporary deploy target branch",
              "status": "success",
              "attemptedCommit": os.environ["DEPLOYED_COMMIT"],
              "deployedCommit": os.environ["DEPLOYED_COMMIT"],
              "validationResult": "success",
              "deploymentResult": "success",
              "pageUrl": os.environ["PAGE_URL"],
              "completedAt": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
          }
          with open(".ci/dungeon-veil-pages.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
              handle.write("\n")
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .ci/dungeon-veil-pages.json
          git commit -m "Record Dungeon Veil target-branch deployment success" || exit 0
          git push origin HEAD:fix/mobile-telegraphs-room-21-50-balance
