name: Temporary deploy target branch

on:
  push:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/temporary-deploy-target-branch.yml'
  pull_request:
    branches:
      - test/pages-deploy-base-187
    paths:
      - '.github/workflows/temporary-deploy-target-branch.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Verify rooms
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build GitHub Pages output
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
          grep -q '/DungeonVeil/' artifacts/dungeon-rpg/dist/public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout target branch for deployment marker
        uses: actions/checkout@v4
        with:
          ref: fix/mobile-telegraphs-room-21-50-balance
          fetch-depth: 0

      - name: Record successful deployment
        env:
          DEPLOYED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          mkdir -p .ci
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          payload = {
              "workflow": "Temporary deploy target branch",
              "status": "success",
              "attemptedCommit": os.environ["DEPLOYED_COMMIT"],
              "deployedCommit": os.environ["DEPLOYED_COMMIT"],
              "validationResult": "success",
              "deploymentResult": "success",
              "pageUrl": os.environ["PAGE_URL"],
              "completedAt": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
          }
          with open(".ci/dungeon-veil-pages.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
              handle.write("\n")
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .ci/dungeon-veil-pages.json
          git commit -m "Record Dungeon Veil target-branch deployment success" || exit 0
          git push origin HEAD:fix/mobile-telegraphs-room-21-50-balance
