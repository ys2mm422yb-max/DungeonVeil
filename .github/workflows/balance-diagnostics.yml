name: Final Balance Diagnostics

on:
  push:
    branches:
      - test/final-balance-integration
  pull_request:
    branches:
      - 'fix/**'

permissions:
  contents: read

jobs:
  focused-audits:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: artifacts/dungeon-rpg
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        working-directory: .
        run: pnpm install --frozen-lockfile
      - name: All rooms
        continue-on-error: true
        run: node scripts/validate-all-rooms.mjs
      - name: Production rooms
        continue-on-error: true
        run: node scripts/validate-production-rooms.mjs
      - name: Spawn hitboxes
        continue-on-error: true
        run: node scripts/validate-spawn-hitboxes.mjs
      - name: Enemy visibility
        continue-on-error: true
        run: node scripts/validate-enemy-visibility.mjs
      - name: Mobile combat
        continue-on-error: true
        run: node scripts/validate-mobile-combat.mjs
      - name: Late combat telegraphs
        continue-on-error: true
        run: node scripts/validate-combat-telegraphs-late-balance.mjs
      - name: World boss performance
        continue-on-error: true
        run: node scripts/validate-worldboss-performance.mjs
      - name: Run identity and spectator
        continue-on-error: true
        run: node scripts/validate-run-identity-social-spectator.mjs
      - name: Gift fusions
        continue-on-error: true
        run: node scripts/validate-gift-fusions.mjs
      - name: Dust and avatar overhaul
        continue-on-error: true
        run: node scripts/validate-dust-avatar-overhaul.mjs
      - name: Room quality 6-50
        continue-on-error: true
        run: node scripts/validate-room-quality-6-50.mjs
      - name: Blocks 1-8 integration
        continue-on-error: true
        run: node scripts/validate-blocks-1-8-integration.mjs
      - name: Inventory guild chat chapters
        continue-on-error: true
        run: node scripts/validate-inventory-guild-chat-chapters.mjs
      - name: Menu copy relic progression
        continue-on-error: true
        run: node scripts/validate-menu-copy-relic-progression.mjs
      - name: Upgrade economy
        continue-on-error: true
        run: node scripts/validate-upgrade-economy.mjs
      - name: Armor progression
        continue-on-error: true
        run: node scripts/validate-armor-progression.mjs
      - name: Chapter reward contract
        continue-on-error: true
        run: node scripts/validate-chapter-reward-contract.mjs
      - name: Final balance integration
        continue-on-error: true
        run: node scripts/validate-final-balance-integration.mjs
      - name: Final balance curve
        continue-on-error: true
        run: node scripts/validate-final-balance-curve.mjs
      - name: Typecheck
        continue-on-error: true
        run: pnpm typecheck
