name: Build Block 7 Guild Layout

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/block-7-guild-invite-close'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/block-7-guild-invite-close
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build final Block 7 snapshot
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin fix/block-1-email-confirmation-redirect
          git checkout origin/fix/block-1-email-confirmation-redirect -- \
            artifacts/dungeon-rpg/src/components/GuildPanelMobile.tsx \
            artifacts/dungeon-rpg/src/components/GuildSocialPanel.tsx \
            artifacts/dungeon-rpg/src/components/GuildInviteLinkCard.tsx \
            artifacts/dungeon-rpg/src/components/screens/MainMenuScreen.tsx \
            artifacts/dungeon-rpg/scripts/validate-social-navigation.mjs \
            artifacts/dungeon-rpg/scripts/validate-social-progression.mjs

          python3 - <<'PY'
          from pathlib import Path

          panel = Path('artifacts/dungeon-rpg/src/components/GuildPanelMobile.tsx')
          text = panel.read_text()
          text = text.replace("import { loadMetaProgression, saveMetaProgression } from '../game/metaProgression';", "import { loadMetaProgression, saveMetaProgression } from '../game/metaProgression';\nimport { GuildInviteLinkCard } from './GuildInviteLinkCard';")
          text = text.replace("type Props = { language: 'de' | 'en' };", "type Props = { language: 'de' | 'en'; onClose: () => void };")
          text = text.replace("export function GuildPanelMobile({ language }: Props) {", "export function GuildPanelMobile({ language, onClose }: Props) {")
          text = text.replace(
            "<header data-testid=\"guild-panel-header\" className=\"shrink-0 border-b border-white/8 pb-3 pr-20\">",
            "<header data-testid=\"guild-panel-header\" className=\"relative shrink-0 border-b border-white/8 pb-3 pr-24\">\n      <button data-testid=\"guild-close-button\" type=\"button\" aria-label={de ? 'Gilde schließen' : 'Close guild'} onClick={onClose} className=\"absolute right-0 top-0 z-30 grid h-9 w-9 place-items-center rounded-xl border border-white/12 bg-black/45 text-lg font-black text-white/72 active:scale-90\">×</button>"
          )
          text = text.replace(
            "{tab === 'invite' && <section data-testid=\"guild-invite-tab\" className={`${scrollClass} space-y-3`}>\n        <div",
            "{tab === 'invite' && <section data-testid=\"guild-invite-tab\" className={`${scrollClass} space-y-3`}>\n        <GuildInviteLinkCard language={language} />\n        <div"
          )
          panel.write_text(text)

          social = Path('artifacts/dungeon-rpg/src/components/GuildSocialPanel.tsx')
          text = social.read_text()
          text = text.replace("type Props = { language: 'de' | 'en' };", "type Props = { language: 'de' | 'en'; onClose: () => void };")
          text = text.replace("export function GuildSocialPanel({ language }: Props) {", "export function GuildSocialPanel({ language, onClose }: Props) {")
          text = text.replace("<GuildPanelMobile language={language} />", "<GuildPanelMobile language={language} onClose={onClose} />")
          text = text.replace("absolute right-3 top-3", "absolute right-14 top-3")
          social.write_text(text)

          card = Path('artifacts/dungeon-rpg/src/components/GuildInviteLinkCard.tsx')
          text = card.read_text()
          text = text.replace("border-sky-300/18 bg-[linear-gradient(135deg,rgba(20,48,65,.88),rgba(9,16,24,.94))]", "border-amber-300/14 bg-amber-400/[.035]")
          text = text.replace("border-sky-300/18 bg-sky-400/8 text-lg text-sky-100", "border-amber-300/16 bg-amber-400/8 text-lg text-amber-100")
          text = text.replace("text-sky-200/52", "text-amber-100/52")
          text = text.replace("border-sky-300/24 bg-sky-400/10", "border-amber-300/24 bg-amber-400/10")
          text = text.replace("text-sky-100", "text-amber-100")
          card.write_text(text)

          menu = Path('artifacts/dungeon-rpg/src/components/screens/MainMenuScreen.tsx')
          text = menu.read_text()
          text = text.replace("import { GuildInviteLinkCard } from '../GuildInviteLinkCard';\n", "")
          text = text.replace("{overlay === 'guild' && <div className=\"space-y-3\"><GuildInviteLinkCard language={language} /><GuildSocialPanel language={language} /></div>}", "{overlay === 'guild' && <GuildSocialPanel language={language} onClose={() => setOverlay(null)} />}")
          text = text.replace("      <button type=\"button\" onPointerDown={event => { event.preventDefault(); setOverlay(null); }} className=\"mt-3", "      {overlay !== 'guild' && <button type=\"button\" onPointerDown={event => { event.preventDefault(); setOverlay(null); }} className=\"mt-3")
          text = text.replace("{language === 'de' ? 'SCHLIESSEN' : 'CLOSE'}</button>\n", "{language === 'de' ? 'SCHLIESSEN' : 'CLOSE'}</button>}\n")
          menu.write_text(text)

          nav = Path('artifacts/dungeon-rpg/scripts/validate-social-navigation.mjs')
          text = nav.read_text()
          text = text.replace("menu.includes('<GuildInviteLinkCard') && inviteCard.includes('createGuildInviteLinkOnline') && inviteCard.includes('navigator.share')", "!menu.includes('<GuildInviteLinkCard') && inviteCard.includes('createGuildInviteLinkOnline') && inviteCard.includes('navigator.share') && menu.includes('onClose={() => setOverlay(null)}')")
          text = text.replace("'shareable guild invite link UI is missing'", "'guild link sharing is not isolated inside the closable guild panel'")
          nav.write_text(text)

          progression = Path('artifacts/dungeon-rpg/scripts/validate-social-progression.mjs')
          text = progression.read_text()
          text = text.replace("guildSocial.includes('guild-profile-list-button') && guildSocial.includes('PlayerProfileCard') && menu.includes('<GuildSocialPanel')", "guildSocial.includes('guild-profile-list-button') && guildSocial.includes('PlayerProfileCard') && guildSocial.includes('onClose') && menu.includes('<GuildSocialPanel')")
          text = text.replace("'guild member profile cards are missing'", "'guild profile cards or fixed close control are missing'")
          progression.write_text(text)
          PY

          rm .github/workflows/build-block-7-guild.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Move guild sharing into invite tab and add fixed close control'
          git push origin HEAD:fix/block-7-guild-invite-close
