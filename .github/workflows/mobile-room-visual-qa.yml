name: Mobile Room Visual QA

on:
  push:
    branches:
      - fix/guild-mail-equipment-currency-ux-v1
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/mobile-room-visual-qa.yml'
      - 'artifacts/dungeon-rpg/**'
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/mobile-room-visual-qa.yml'
      - 'artifacts/dungeon-rpg/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rooms-1-50:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: iphone-webkit
            browser: webkit
          - project: android-chromium
            browser: chromium
          - project: ipad-portrait-webkit
            browser: webkit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Install deterministic browser runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@1.55.0 --lockfile=false
      - name: Install browser engine
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install --with-deps ${{ matrix.browser }}
      - name: Build current branch
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Capture and validate every room from 1 to 50
        id: room-tests
        continue-on-error: true
        env:
          DUNGEON_VEIL_URL: http://127.0.0.1:4173/DungeonVeil/
          BASE_PATH: /DungeonVeil/
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-mobile-room-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/DungeonVeil/ > /dev/null; then break; fi
            sleep 1
          done
          curl --fail http://127.0.0.1:4173/DungeonVeil/ > /dev/null
          timeout --signal=TERM --kill-after=30s 90m pnpm --dir artifacts/dungeon-rpg exec playwright test \
            --config=playwright.regression.config.mjs \
            --project=${{ matrix.project }} \
            tests/visual-room-chunks.spec.mjs \
            --grep 'full room visual evidence'
      - name: Upload all 50 room screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rooms-1-50-${{ matrix.project }}
          if-no-files-found: error
          retention-days: 21
          compression-level: 6
          path: artifacts/dungeon-rpg/test-results/room-evidence/*-${{ matrix.project }}.png
      - name: Upload room reports, videos and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-results-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/full-game-results.json
            artifacts/dungeon-rpg/playwright-report/**
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/test-failed-*.png
            /tmp/dungeon-veil-mobile-room-preview.log
      - name: Publish room failure to pull request
        if: steps.room-tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEVICE_PROJECT: ${{ matrix.project }}
        with:
          script: |
            const project = process.env.DEVICE_PROJECT;
            const marker = `<!-- dungeon-veil-mobile-room-qa-${project} -->`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              `## Raumprüfung 1–50 fehlgeschlagen: ${project}`,
              '',
              `Head: \`${context.payload.pull_request.head.sha}\``,
              '',
              `Screenshots, Videos und Traces: ${runUrl}`,
              '',
              'Der konkrete Raum-, Kamera-, Layout-, Asset-, Runtime- oder WebGL-Fehler muss behoben werden.',
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const previous = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (previous) await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
      - name: Fail after room diagnostics
        if: steps.room-tests.outcome == 'failure'
        run: exit 1
