name: Clean Obsolete Village Mode

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/clean-obsolete-village-mode.yml'

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore unchanged combat rig and self-clean
        shell: bash
        run: |
          git fetch origin integration/block-8-final-device-review
          git checkout origin/integration/block-8-final-device-review -- artifacts/dungeon-rpg/src/components/kaykitPlayer3D.ts
          rm -f .github/workflows/clean-obsolete-village-mode.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Keep the dungeon combat rig unchanged'
          git push origin HEAD:fix/main-menu-equipped-ranger
