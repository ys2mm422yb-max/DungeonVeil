name: Apply requested room and spectator pass

on:
  push:
    branches:
      - work/room-loading-spectator-firelands
    paths:
      - '.ci/apply-room-spectator-firelands.mjs'
      - '.github/workflows/apply-room-spectator-firelands.yml'

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[applied-room-spectator-firelands]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply requested changes
        run: node .ci/apply-room-spectator-firelands.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate requested pass
        run: pnpm --filter @workspace/dungeon-rpg audit:requested-pass

      - name: TypeScript
        run: pnpm run typecheck

      - name: Production build
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Commit validated branch changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg supabase/migrations
          git commit -m "[applied-room-spectator-firelands] implement requested gameplay pass"
          git push origin HEAD:work/room-loading-spectator-firelands
