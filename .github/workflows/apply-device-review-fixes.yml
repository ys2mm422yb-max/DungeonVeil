name: Apply Device Review Fixes

on:
  push:
    branches:
      - work/blocks-1-7-production-pass
    paths:
      - .github/workflows/apply-device-review-fixes.yml
      - artifacts/dungeon-rpg/scripts/apply-device-review-fixes.mjs

permissions:
  contents: write

jobs:
  apply-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply review fixes
        run: node artifacts/dungeon-rpg/scripts/apply-device-review-fixes.mjs

      - name: Verify fixes
        run: |
          git diff --check
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:rooms
          pnpm --filter @workspace/dungeon-rpg typecheck
          pnpm --filter @workspace/dungeon-rpg build

      - name: Commit verified fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm artifacts/dungeon-rpg/scripts/apply-device-review-fixes.mjs .github/workflows/apply-device-review-fixes.yml
          git add -A
          git diff --cached --check
          git commit -m "Fix room 6 architecture and crossbow previews"
          git push origin HEAD:work/blocks-1-7-production-pass
