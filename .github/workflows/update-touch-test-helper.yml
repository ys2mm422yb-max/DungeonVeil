name: Update touch test helper

on:
  push:
    branches:
      - fix/spectator-upgrade-resource-actions-v1
    paths:
      - .github/workflows/update-touch-test-helper.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/spectator-upgrade-resource-actions-v1
      - name: Use a complete mobile tap in visual journeys
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('artifacts/dungeon-rpg/tests/guild-mail-equipment-visual.spec.mjs')
          text = path.read_text()
          old = "  await locator.dispatchEvent('pointerdown', { pointerType: 'touch', button: 0, isPrimary: true });"
          new = "  await locator.tap();"
          if text.count(old) != 1:
              raise SystemExit(f'expected one legacy pointer helper, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit test helper update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/tests/guild-mail-equipment-visual.spec.mjs
          git commit -m "Use complete touch taps in mobile visual journeys"
          git push origin HEAD:fix/spectator-upgrade-resource-actions-v1
