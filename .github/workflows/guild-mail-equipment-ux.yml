name: Guild Mail Equipment UX

on:
  push:
    branches: ['fix/guild-mail-equipment-currency-ux-v1']
  pull_request:
    branches: ['fix/mobile-telegraphs-room-21-50-balance']
    paths:
      - '.github/workflows/guild-mail-equipment-ux.yml'
      - 'artifacts/dungeon-rpg/playwright.regression.config.mjs'
      - 'artifacts/dungeon-rpg/src/components/CompanionManagementPanel.tsx'
      - 'artifacts/dungeon-rpg/src/components/MailboxPanel.tsx'
      - 'artifacts/dungeon-rpg/src/components/PlayerProfilePanel.tsx'
      - 'artifacts/dungeon-rpg/src/components/ProfileEquipmentLoadout.tsx'
      - 'artifacts/dungeon-rpg/src/components/kaykitLoot3D.ts'
      - 'artifacts/dungeon-rpg/src/components/kaykitPlayer3D.ts'
      - 'artifacts/dungeon-rpg/src/components/kaykitVillagePlayer3D.ts'
      - 'artifacts/dungeon-rpg/src/components/screens/MainMenuScreen.tsx'
      - 'artifacts/dungeon-rpg/src/components/screens/VeilChamberScreenV4.tsx'
      - 'artifacts/dungeon-rpg/src/game/companionOptionalSelection.ts'
      - 'artifacts/dungeon-rpg/src/game/equipmentCombatV4.ts'
      - 'artifacts/dungeon-rpg/src/game/guildMailboxOnline.ts'
      - 'artifacts/dungeon-rpg/src/game/optionalEquipmentState.ts'
      - 'artifacts/dungeon-rpg/src/game/profileEquipment.ts'
      - 'artifacts/dungeon-rpg/src/game/veilRelics.ts'
      - 'artifacts/dungeon-rpg/tests/guild-mail-equipment-ux-contract.mjs'
      - 'artifacts/dungeon-rpg/tests/guild-mail-equipment-visual.spec.mjs'
      - 'artifacts/dungeon-rpg/tests/visual-render-readiness.mjs'
      - 'supabase/migrations/20260721135000_mailbox_delete_rpc.sql'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-qa-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/guild-mail-equipment-currency-ux-v1
      - name: Stabilize the filled mailbox QA state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('artifacts/dungeon-rpg/src/components/screens/MainMenuScreen.tsx')
          source = path.read_text()
          stable = 'const FILLED_MAILBOX_QA_STATE = { signedIn: true, messages: FILLED_MAILBOX_QA };'
          inline = 'qaState={qaMode ? { signedIn: true, messages: FILLED_MAILBOX_QA } : undefined}'
          if stable not in source:
              closing = """  },
];

function filledSocialQaEnabled(): boolean {"""
              replacement = """  },
];

const FILLED_MAILBOX_QA_STATE = { signedIn: true, messages: FILLED_MAILBOX_QA };

function filledSocialQaEnabled(): boolean {"""
              if source.count(closing) != 1:
                  raise SystemExit('Expected filled mailbox QA array closing exactly once')
              source = source.replace(closing, replacement, 1)
          if inline in source:
              source = source.replace(inline, 'qaState={qaMode ? FILLED_MAILBOX_QA_STATE : undefined}', 1)
          elif 'qaState={qaMode ? FILLED_MAILBOX_QA_STATE : undefined}' not in source:
              raise SystemExit('Expected mailbox QA state binding exactly once')
          path.write_text(source)
          PY
      - name: Commit the focused fix when needed
        shell: bash
        run: |
          if git diff --quiet -- artifacts/dungeon-rpg/src/components/screens/MainMenuScreen.tsx; then
            echo "Mailbox QA state already stable."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add artifacts/dungeon-rpg/src/components/screens/MainMenuScreen.tsx
          git commit -m "Stabilize mailbox QA state across renders"
          git push origin HEAD:fix/guild-mail-equipment-currency-ux-v1

  focused-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Verify focused static UX contracts
        run: node artifacts/dungeon-rpg/tests/guild-mail-equipment-ux-contract.mjs
      - name: Typecheck full workspace
        run: pnpm run typecheck
      - name: Build GitHub Pages output
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Verify core audits
        run: |
          pnpm --filter @workspace/dungeon-rpg audit:assets
          pnpm --filter @workspace/dungeon-rpg audit:social

  focused-visual:
    needs: focused-contract
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: iphone-webkit
            browser: webkit
          - project: android-chromium
            browser: chromium
          - project: ipad-landscape-webkit
            browser: webkit
          - project: desktop-chromium
            browser: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Install deterministic browser runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@1.55.0 --lockfile=false
      - name: Install browser engine
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install --with-deps ${{ matrix.browser }}
      - name: Build branch under test
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Run focused visual journeys and screenshots
        env:
          DUNGEON_VEIL_URL: http://127.0.0.1:4173/DungeonVeil/
          BASE_PATH: /DungeonVeil/
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-guild-mail-equipment-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/DungeonVeil/ > /dev/null; then break; fi
            sleep 1
          done
          curl --fail http://127.0.0.1:4173/DungeonVeil/ > /dev/null
          timeout --signal=TERM --kill-after=30s 52m pnpm --dir artifacts/dungeon-rpg exec playwright test \
            --config=playwright.regression.config.mjs \
            --project=${{ matrix.project }} \
            tests/guild-mail-equipment-visual.spec.mjs
      - name: Upload focused visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guild-mail-equipment-visual-${{ matrix.project }}
          if-no-files-found: error
          retention-days: 21
          compression-level: 6
          path: artifacts/dungeon-rpg/test-results/visual-*-${{ matrix.project }}.png
      - name: Upload reports and failure diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guild-mail-equipment-results-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/full-game-results.json
            artifacts/dungeon-rpg/playwright-report/**
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/test-failed-*.png
            /tmp/dungeon-veil-guild-mail-equipment-preview.log
