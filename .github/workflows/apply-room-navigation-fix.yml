name: Apply room navigation fix

on:
  push:
    branches: [fix/room13-and-room-navigation-audit]
    paths: ['.github/workflows/apply-room-navigation-fix.yml']

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/room13-and-room-navigation-audit
      - name: Apply targeted room fix and navigation audit
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('artifacts/dungeon-rpg/src/game/logicalRoomSetpieces.ts')
          text = path.read_text()
          old = """    p(`${D}/wall_corner_gated.gltf`, -8.0, -4.2, Math.PI / 2, 0.86, [1.8, 1.8]),
    p(`${D}/wall_corner_gated.gltf`, 8.0, -4.2, -Math.PI / 2, 0.86, [1.8, 1.8]),
    p(`${D}/wall_corner_gated.gltf`, -8.0, 3.7, Math.PI / 2, 0.86, [1.8, 1.8]),
    p(`${D}/wall_corner_gated.gltf`, 8.0, 3.7, -Math.PI / 2, 0.86, [1.8, 1.8]),"""
          new = """    p(`${D}/wall_corner_gated.gltf`, -8.25, -4.2, Math.PI / 2, 0.86, [1.15, 1.3]),
    p(`${D}/wall_corner_gated.gltf`, 8.25, -4.2, -Math.PI / 2, 0.86, [1.15, 1.3]),
    p(`${D}/wall_corner_gated.gltf`, -8.25, 3.7, Math.PI / 2, 0.86, [1.15, 1.3]),
    p(`${D}/wall_corner_gated.gltf`, 8.25, 3.7, -Math.PI / 2, 0.86, [1.15, 1.3]),"""
          if old not in text:
              raise SystemExit('room 13 source block not found')
          path.write_text(text.replace(old, new))

          pkg = Path('artifacts/dungeon-rpg/package.json')
          ptext = pkg.read_text()
          ptext = ptext.replace(
              '"audit:rooms": "node scripts/validate-all-rooms.mjs',
              '"audit:rooms": "node --experimental-strip-types --experimental-specifier-resolution=node scripts/validate-room-navigation.mjs && node scripts/validate-all-rooms.mjs'
          )
          pkg.write_text(ptext)
          PY
          cat > artifacts/dungeon-rpg/scripts/validate-room-navigation.mjs <<'EOF'
          const { roomPropColliders } = await import('../src/game/roomPropCollision.ts');
          const { roomBibleSpec } = await import('../src/game/roomBible.ts');
          const { CHAPTER_ROOMS } = await import('../src/game/chapterRun.ts');
          const STEP = 0.35;
          const HALF_PLAYER = 0.46;
          const MIN_X = -10.2, MAX_X = 10.2, MIN_Z = -13.0, MAX_Z = 9.6;
          const key = (x, z) => `${Math.round((x - MIN_X) / STEP)},${Math.round((z - MIN_Z) / STEP)}`;
          const free = (cs, x, z) => x >= MIN_X && x <= MAX_X && z >= MIN_Z && z <= MAX_Z && !cs.some(c => Math.abs(x-c.x) < c.halfW+HALF_PLAYER && Math.abs(z-c.z) < c.halfH+HALF_PLAYER);
          const nearestFree = (cs, s) => { if (free(cs,s.x,s.z)) return s; for(let r=STEP;r<=2.8;r+=STEP) for(let a=0;a<Math.PI*2;a+=Math.PI/12){const p={x:s.x+Math.cos(a)*r,z:s.z+Math.sin(a)*r};if(free(cs,p.x,p.z))return p;} return null; };
          const reachable = (cs, si, ti) => { const s=nearestFree(cs,si),t=nearestFree(cs,ti); if(!s||!t)return false; const q=[s],seen=new Set([key(s.x,s.z)]); for(let i=0;i<q.length;i++){const c=q[i];if(Math.hypot(c.x-t.x,c.z-t.z)<=STEP*1.8)return true;for(const[dX,dZ]of[[STEP,0],[-STEP,0],[0,STEP],[0,-STEP]]){const n={x:c.x+dX,z:c.z+dZ},id=key(n.x,n.z);if(!seen.has(id)&&free(cs,n.x,n.z)){seen.add(id);q.push(n);}}}return false; };
          const failures=[];
          for(let room=1;room<=CHAPTER_ROOMS;room++){const cs=roomPropColliders(room),portal=roomBibleSpec(room).portal,target={x:portal.x,z:portal.z < -8 ? -8.5 : portal.z};for(const[lane,start]of Object.entries({center:{x:0,z:8.5},left:{x:-6.4,z:7.2},right:{x:6.4,z:7.2}})){if(!reachable(cs,start,target))failures.push(`room ${room}: ${lane} route cannot reach portal`);}}
          if(failures.length){console.error(`Room navigation audit failed with ${failures.length} blocked route(s):`);failures.forEach(x=>console.error(`  - ${x}`));process.exit(1);}
          console.log(`Room navigation audit passed: center, left and right portal routes are reachable in all ${CHAPTER_ROOMS} rooms.`);
          EOF
          rm .github/workflows/apply-room-navigation-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix room 13 passage and audit all room routes"
          git push origin HEAD:fix/room13-and-room-navigation-audit
