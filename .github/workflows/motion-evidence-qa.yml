name: Motion Evidence QA

on:
  push:
    branches:
      - fix/guild-mail-equipment-currency-ux-v1
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/motion-evidence-qa.yml'
      - 'artifacts/dungeon-rpg/**'
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/motion-evidence-qa.yml'
      - 'artifacts/dungeon-rpg/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  motion-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: iphone-webkit
            browser: webkit
          - project: android-chromium
            browser: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Install deterministic browser runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@1.55.0 --lockfile=false
      - name: Install browser engine
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install --with-deps ${{ matrix.browser }}
      - name: Build current branch
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Record run, transitions, world boss and spectator motion
        id: motion-tests
        continue-on-error: true
        env:
          DUNGEON_VEIL_URL: http://127.0.0.1:4173/DungeonVeil/
          BASE_PATH: /DungeonVeil/
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-motion-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/DungeonVeil/ > /dev/null; then break; fi
            sleep 1
          done
          curl --fail http://127.0.0.1:4173/DungeonVeil/ > /dev/null
          timeout --signal=TERM --kill-after=30s 80m pnpm --dir artifacts/dungeon-rpg exec playwright test \
            --config=playwright.motion.config.mjs \
            --project=${{ matrix.project }} \
            tests/full-game-smoke.spec.mjs \
            tests/loading-continuity.spec.mjs \
            tests/worldboss-block1.spec.mjs \
            tests/spectator-performance.spec.mjs
      - name: Upload successful motion videos and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: motion-evidence-${{ matrix.project }}
          if-no-files-found: error
          retention-days: 21
          compression-level: 6
          path: |
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.png
            artifacts/dungeon-rpg/test-results/motion-results.json
            artifacts/dungeon-rpg/playwright-motion-report/**
            /tmp/dungeon-veil-motion-preview.log
      - name: Publish motion failure to pull request
        if: steps.motion-tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEVICE_PROJECT: ${{ matrix.project }}
        with:
          script: |
            const project = process.env.DEVICE_PROJECT;
            const marker = `<!-- dungeon-veil-motion-evidence-${project} -->`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              `## Bewegungsprüfung fehlgeschlagen: ${project}`,
              '',
              `Head: \`${context.payload.pull_request.head.sha}\``,
              '',
              `Videos, Traces und Screenshots: ${runUrl}`,
              '',
              'Timing, Übergänge, WebGL, Kampf-, Weltboss- oder Spectator-Abläufe müssen anhand des konkreten Artefakts behoben werden.',
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const previous = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (previous) await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
      - name: Fail after motion diagnostics
        if: steps.motion-tests.outcome == 'failure'
        run: exit 1
