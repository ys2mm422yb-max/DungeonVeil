name: Dragon Asset Inspection

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dragon-asset-inspection.yml'
      - '.ci/dragon-asset-inspection-trigger.txt'

permissions:
  contents: read

jobs:
  inspect:
    if: github.event.pull_request.head.ref == 'rework/worldboss-full-3d-arena'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rework/worldboss-full-3d-arena
      - name: Inspect dragon FBX
        run: |
          mkdir -p dragon-inspection
          DRAGON='artifacts/dungeon-rpg/public/assets/3d/Dragon.fbx'
          {
            echo 'DRAGON FILE'
            ls -lh "$DRAGON"
            file "$DRAGON"
            sha256sum "$DRAGON"
            echo
            echo 'FBX STRUCTURE KEYWORDS'
            strings "$DRAGON" | grep -Ei 'AnimationStack|AnimationLayer|AnimationCurve|Deformer|Skin|Cluster|Skeleton|LimbNode|Model::|Material::|Texture::|dragon|wing|head|tail|jaw|idle|attack|fly|walk|run|death|fire|bite' | sort -u | head -n 400 || true
            echo
            echo 'DUPLICATE CHECK'
            sha256sum artifacts/dungeon-rpg/public/assets/3d/Dragon.fbx artifacts/dungeon-rpg/public/assets/3d/library/monsters/Dragon.fbx
          } > dragon-inspection/report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: dragon-asset-inspection
          path: dragon-inspection/report.txt
          retention-days: 3
