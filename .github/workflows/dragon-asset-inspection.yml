name: Dragon Asset Inspection

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dragon-asset-inspection.yml'
      - '.ci/dragon-asset-inspection-trigger.txt'

permissions:
  contents: read

jobs:
  inspect:
    if: github.event.pull_request.head.ref == 'rework/worldboss-full-3d-arena'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rework/worldboss-full-3d-arena
      - name: Build concise enemy report
        run: |
          mkdir -p dragon-inspection
          {
            echo 'IMPORTED ENEMY FILES'
            find artifacts/dungeon-rpg/public/assets/imported/enemies -maxdepth 2 -type f | sort
            echo
            echo 'MATCHED NAMES AND ANIMATIONS'
            for file in artifacts/dungeon-rpg/public/assets/imported/enemies/*; do
              [ -f "$file" ] || continue
              echo "--- $(basename "$file")"
              strings "$file" | grep -Ei 'dragon|wyvern|drake|idle|attack|fly|walk|run|death|bite|fire' | sort -u | head -n 120 || true
            done
          } > dragon-inspection/report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: dragon-asset-inspection
          path: dragon-inspection/report.txt
          retention-days: 3
