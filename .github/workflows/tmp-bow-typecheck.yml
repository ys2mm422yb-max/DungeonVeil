name: Temporary Bow Typecheck
on:
  push:
    branches:
      - sprint/gameplay-foundation-rooms
  workflow_dispatch:
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/dungeon-rpg typecheck > typecheck.log 2>&1
          code=$?
          echo "$code" > typecheck.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: bow-typecheck-log
          path: |
            typecheck.log
            typecheck.exit
          if-no-files-found: error
