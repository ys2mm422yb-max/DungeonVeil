name: Apply Main Menu Ranger Visual Fix

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/apply-main-menu-ranger-visual-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply verified visual corrections
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          rig_path = Path('artifacts/dungeon-rpg/src/components/kaykitPlayer3D.ts')
          rig = rig_path.read_text()
          replacements = [
              (
                  "  ranger: `${KAYKIT_ROOT}/adventurers/KayKit_Adventurers_2.0_FREE/Characters/gltf/Ranger.glb`,\n",
                  "  ranger: `${KAYKIT_ROOT}/adventurers/KayKit_Adventurers_2.0_FREE/Characters/gltf/Ranger.glb`,\n  villageArcher: `${KAYKIT_ROOT}/adventurers/KayKit_Adventurers_2.0_FREE/Characters/gltf/Rogue_Hooded.glb`,\n",
              ),
              (
                  "  holder.position.set(crossbow ? 0.48 : 0.42, crossbow ? 0.98 : 1.05, crossbow ? 0.02 : -0.2);\n  holder.rotation.set(crossbow ? 0.12 : 0.08, crossbow ? -0.42 : -0.18, crossbow ? -0.24 : -0.82);",
                  "  holder.position.set(crossbow ? 0.58 : 0.62, crossbow ? 0.86 : 0.92, 0.34);\n  holder.rotation.set(crossbow ? 0.06 : 0.02, crossbow ? -0.18 : 0.08, crossbow ? -0.3 : -0.56);",
              ),
              (
                  "  holder.position.set(-0.38, 1.05, -0.2);\n  holder.rotation.set(-0.05, 0.18, 0.28);",
                  "  holder.position.set(-0.58, 1.04, 0.18);\n  holder.rotation.set(-0.08, 0.28, 0.34);",
              ),
              (
                  "  holder.position.set(-0.24, 0.68, 0.14);",
                  "  holder.position.set(-0.32, 0.66, 0.32);",
              ),
              (
                  "  const [rangerGltf, quiverGltf, generalGltf, movementGltf, advancedGltf, weapons, quiverVariantGltf, talismanGltf] = await Promise.all([\n    loader.loadAsync(KAYKIT_PLAYER_ASSETS.ranger),",
                  "  const characterAsset = presentation === 'village' ? KAYKIT_PLAYER_ASSETS.villageArcher : KAYKIT_PLAYER_ASSETS.ranger;\n  const [rangerGltf, quiverGltf, generalGltf, movementGltf, advancedGltf, weapons, quiverVariantGltf, talismanGltf] = await Promise.all([\n    loader.loadAsync(characterAsset),",
              ),
              (
                  "  visual.name = 'KayKitRanger';",
                  "  visual.name = presentation === 'village' ? 'KayKitHoodedArcher' : 'KayKitRanger';",
              ),
              (
                  "  const idleClip = chooseClip(clips, [['idle', 'a'], ['idle']], ['crouch', 'sit', 'sleep', 'aim', 'bow']);",
                  "  const idleClip = presentation === 'village'\n    ? chooseClip(clips, [['idle', 'b'], ['idle', 'a'], ['idle']], ['crouch', 'sit', 'sleep', 'aim', 'bow'])\n    : chooseClip(clips, [['idle', 'a'], ['idle']], ['crouch', 'sit', 'sleep', 'aim', 'bow']);",
              ),
          ]
          for old, new in replacements:
              if old not in rig:
                  raise SystemExit(f'Missing rig replacement marker: {old[:100]}')
              rig = rig.replace(old, new, 1)
          rig_path.write_text(rig)

          scene_path = Path('artifacts/dungeon-rpg/src/components/ModernVillageSquareScene.tsx')
          scene = scene_path.read_text()
          scene_replacements = [
              ("rig.root.position.set(0, 0.02, -4.55);", "rig.root.position.set(0, -0.02, -4.35);"),
              ("rig.root.rotation.y = -0.28;", "rig.root.rotation.y = -0.5;"),
              ("rig.root.scale.setScalar(0.45);", "rig.root.scale.setScalar(0.5);"),
          ]
          for old, new in scene_replacements:
              if old not in scene:
                  raise SystemExit(f'Missing scene replacement marker: {old}')
              scene = scene.replace(old, new, 1)
          scene_path.write_text(scene)

          audit_path = Path('artifacts/dungeon-rpg/scripts/validate-main-menu-equipped-ranger.mjs')
          audit = audit_path.read_text()
          audit = audit.replace(
              "village.includes('rig.root.rotation.y = -0.28') && village.includes('rig.root.scale.setScalar(0.45)')",
              "village.includes('rig.root.rotation.y = -0.5') && village.includes('rig.root.scale.setScalar(0.5)')",
          )
          audit = audit.replace(
              "[rig.includes(\"export type KayKitRangerPresentation = 'combat' | 'village'\"), 'ranger rig has no separate village presentation mode'],",
              "[rig.includes(\"export type KayKitRangerPresentation = 'combat' | 'village'\"), 'ranger rig has no separate village presentation mode'],\n  [rig.includes('Rogue_Hooded.glb') && rig.includes(\"[['idle', 'b'], ['idle', 'a'], ['idle']]\"), 'village does not use the hooded archer outfit and calmer Idle_B'],",
          )
          audit = audit.replace(
              "console.log('Main-menu equipped ranger audit passed: the clean Ranger outfit and the selected bow, quiver and talisman are visible without combat-rig clipping.');",
              "console.log('Main-menu equipped ranger audit passed: the hooded archer uses Idle_B with the selected bow, quiver and talisman visibly separated from the body.');",
          )
          audit_path.write_text(audit)

          Path('ranger-clip-diagnostic.txt').unlink(missing_ok=True)
          Path('.github/workflows/apply-main-menu-ranger-visual-fix.yml').unlink(missing_ok=True)
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Correct the main-menu archer pose and equipment visibility'
          git push origin HEAD:fix/main-menu-equipped-ranger
