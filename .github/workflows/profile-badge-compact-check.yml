name: Profile Badge Compact Check

on:
  push:
    branches: [fix/profile-badge-compact]
    paths:
      - 'artifacts/dungeon-rpg/src/components/ProfileBadge.tsx'
      - 'artifacts/dungeon-rpg/scripts/validate-profile-badge-compact.mjs'
      - '.github/workflows/profile-badge-compact-check.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-badge-compact
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node artifacts/dungeon-rpg/scripts/validate-profile-badge-compact.mjs
      - run: pnpm --filter @workspace/dungeon-rpg typecheck
      - run: pnpm --filter @workspace/dungeon-rpg build
      - name: Remove temporary workflow and note
        run: |
          rm -f .github/workflows/profile-badge-compact-check.yml .ci/profile-badge-compact-note.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove temporary compact badge validation files'
          git push origin HEAD:fix/profile-badge-compact
