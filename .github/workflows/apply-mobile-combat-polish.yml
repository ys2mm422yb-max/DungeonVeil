name: Apply Mobile Combat Polish

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-mobile-combat-polish
  cancel-in-progress: true

jobs:
  apply-and-build:
    if: github.event.pull_request.head.ref == 'validation/mobile-combat-polish'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      product_sha: ${{ steps.product.outputs.sha }}
    steps:
      - name: Checkout validation patch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Preserve trusted patch script
        run: cp scripts/apply_mobile_combat_polish.py /tmp/apply_mobile_combat_polish.py

      - name: Checkout current product branch
        run: |
          git fetch origin work/blocks-1-7-production-pass
          git checkout -B work/blocks-1-7-production-pass origin/work/blocks-1-7-production-pass

      - name: Apply mobile combat polish
        run: python /tmp/apply_mobile_combat_polish.py

      - name: Commit repaired product branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg
          git commit -m "Polish mobile combat layout and performance"
          git pull --rebase origin work/blocks-1-7-production-pass
          git push origin HEAD:work/blocks-1-7-production-pass

      - name: Resolve product commit
        id: product
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room, collision and mobile combat audits
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck Dungeon Veil
        run: pnpm --filter @workspace/dungeon-rpg typecheck

      - name: Build Dungeon Veil for GitHub Pages
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.product.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write deployment marker
        env:
          DEPLOYED_COMMIT: ${{ steps.product.outputs.sha }}
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "$DEPLOYED_COMMIT" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    if: github.event.pull_request.head.ref == 'validation/mobile-combat-polish'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: apply-and-build
    steps:
      - name: Deploy polished Dungeon Veil build
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout main for deployment receipt
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record verified live deployment
        env:
          DEPLOYED_COMMIT: ${{ needs.apply-and-build.outputs.product_sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          mkdir -p .ci
          printf '{"status":"success","deployedCommit":"%s","pageUrl":"%s","completedAt":"%s"}\n' "$DEPLOYED_COMMIT" "$PAGE_URL" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .ci/dungeon-veil-live.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci/dungeon-veil-live.json
          git commit -m "Record live Dungeon Veil deployment ${DEPLOYED_COMMIT:0:7}"
          git push origin HEAD:main
