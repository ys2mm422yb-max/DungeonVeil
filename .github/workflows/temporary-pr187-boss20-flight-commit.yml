name: Temporary PR 187 boss 20 flight commit

on:
  push:
    branches:
      - work/boss-telegraphs-room-21-30-theme
    paths:
      - .github/workflows/temporary-pr187-boss20-flight-commit.yml

permissions:
  contents: write

jobs:
  patch-audit-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/boss-telegraphs-room-21-30-theme
          fetch-depth: 0

      - name: Reuse the reviewed implementation patch
        shell: bash
        run: |
          awk '
            /python <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/temporary-pr187-boss20-flight.yml > /tmp/patch-boss20.py
          test -s /tmp/patch-boss20.py
          python /tmp/patch-boss20.py
          git diff --check
          node artifacts/dungeon-rpg/scripts/validate-boss-room-telegraphs-and-meadow.mjs

      - name: Commit product code and remove temporary runners
        shell: bash
        run: |
          rm .github/workflows/temporary-pr187-boss20-flight.yml
          rm .github/workflows/temporary-pr187-boss20-flight-commit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/components/kaykitEnemy3D.ts artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx artifacts/dungeon-rpg/scripts/validate-boss-room-telegraphs-and-meadow.mjs .github/workflows/temporary-pr187-boss20-flight.yml .github/workflows/temporary-pr187-boss20-flight-commit.yml
          git commit -m "Complete room 20 boss flight and landing"
          git push origin HEAD:work/boss-telegraphs-room-21-30-theme
