name: Deploy Dungeon Veil Test Site

# Final exact deployment trigger for the world-orb village and cohesive Ash Warden hall.
on:
  push:
    branches:
      - work/blocks-1-7-production-pass
    paths-ignore:
      - '.ci/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      product_sha: ${{ steps.product.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve product commit
        id: product
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build Dungeon Veil for GitHub Pages
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.product.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify GitHub Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "${{ steps.product.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json

      - name: Disable Jekyll processing
        run: touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  record-pages:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Record deployment result
        uses: actions/github-script@v7
        env:
          PRODUCT_SHA: ${{ needs.build.outputs.product_sha }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.ci/dungeon-veil-pages.json';
            const branch = 'main';
            const productSha = process.env.PRODUCT_SHA || context.sha;
            const success = process.env.BUILD_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success';
            const marker = {
              workflow: 'Deploy Dungeon Veil Test Site',
              status: success ? 'success' : 'failure',
              attemptedCommit: productSha,
              deployedCommit: success ? productSha : null,
              validationResult: process.env.BUILD_RESULT,
              deploymentResult: process.env.DEPLOY_RESULT,
              pageUrl: process.env.PAGE_URL || 'https://ys2mm422yb-max.github.io/DungeonVeil/',
              completedAt: new Date().toISOString(),
            };
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha,
              message: `Record Dungeon Veil deployment ${success ? 'success' : 'failure'} for ${productSha.slice(0, 7)}`,
              content: Buffer.from(JSON.stringify(marker, null, 2) + '\n').toString('base64'),
            });
