name: Deploy Dungeon Veil Test Site

on:
  push:
    branches:
      - fix/deploy-final-canonical-test
    paths-ignore:
      - '.ci/**'

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-pages
  cancel-in-progress: true

env:
  PRODUCT_SHA: 189406c6d87623926b4059c4b1c3ac2c5332fe7d
  PAGE_URL: https://ys2mm422yb-max.github.io/DungeonVeil/

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    outputs:
      product_sha: ${{ steps.product.outputs.sha }}
    steps:
      - name: Checkout exact merged product
        uses: actions/checkout@v4
        with:
          ref: 189406c6d87623926b4059c4b1c3ac2c5332fe7d

      - name: Confirm exact product commit
        id: product
        shell: bash
        run: |
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$PRODUCT_SHA"
          echo "sha=$actual" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Room and collision audit
        run: pnpm --filter @workspace/dungeon-rpg audit:rooms

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build exact merged product for GitHub Pages
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: 189406c6d87623926b4059c4b1c3ac2c5332fe7d
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify GitHub Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write exact deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "$PRODUCT_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact merged product to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    timeout-minutes: 20
    steps:
      - name: Verify fixed test link serves exact merge commit
        shell: bash
        run: |
          set -euo pipefail
          marker_url="${PAGE_URL}deployment.json"
          for attempt in $(seq 1 90); do
            body="$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$marker_url" 2>/dev/null || true)"
            served="$(printf '%s' "$body" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{process.stdout.write(String(JSON.parse(s).commit||''))}catch{}})")"
            if [ "$served" = "$PRODUCT_SHA" ]; then
              curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PAGE_URL" > /tmp/dungeon-veil-index.html
              grep -q '/DungeonVeil/' /tmp/dungeon-veil-index.html
              echo "Verified live product commit $served"
              exit 0
            fi
            echo "Waiting for Pages propagation; currently served: ${served:-unavailable}"
            sleep 10
          done
          echo "The fixed test link did not expose $PRODUCT_SHA within the verification window" >&2
          exit 1

  record-pages:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy, verify-live]
    steps:
      - name: Record machine-readable deployment result on deploy branch
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          VERIFY_RESULT: ${{ needs.verify-live.result }}
          DEPLOYED_PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const branch = 'fix/deploy-final-canonical-test';
            const path = '.ci/final-canonical-pages.json';
            const success = process.env.BUILD_RESULT === 'success'
              && process.env.DEPLOY_RESULT === 'success'
              && process.env.VERIFY_RESULT === 'success';
            const report = {
              workflow: 'Deploy Dungeon Veil Test Site',
              status: success ? 'success' : 'failure',
              attemptedCommit: process.env.PRODUCT_SHA,
              deployedCommit: success ? process.env.PRODUCT_SHA : null,
              validationResult: process.env.BUILD_RESULT,
              deploymentResult: process.env.DEPLOY_RESULT,
              liveVerificationResult: process.env.VERIFY_RESULT,
              pageUrl: process.env.DEPLOYED_PAGE_URL || process.env.PAGE_URL,
              completedAt: new Date().toISOString(),
            };
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha,
              message: `${success ? 'Record' : 'Record failed'} final Dungeon Veil deployment for ${process.env.PRODUCT_SHA.slice(0, 7)}`,
              content: Buffer.from(`${JSON.stringify(report, null, 2)}\n`).toString('base64'),
            });
