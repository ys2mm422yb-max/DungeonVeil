name: Deploy Dungeon Veil Test Site

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    paths:
      - '.github/workflows/dungeon-veil-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-pages
  cancel-in-progress: true

env:
  PRODUCT_SHA: f9b1144e2f99f8462372f2d3bdb02c8a2d045bbd
  PAGE_URL: https://ys2mm422yb-max.github.io/DungeonVeil/

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Checkout exact merged product
        uses: actions/checkout@v4
        with:
          ref: f9b1144e2f99f8462372f2d3bdb02c8a2d045bbd
      - name: Confirm exact product commit
        shell: bash
        run: |
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$PRODUCT_SHA"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - run: pnpm run typecheck
      - name: Build exact merged product for GitHub Pages
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: f9b1144e2f99f8462372f2d3bdb02c8a2d045bbd
        run: pnpm --dir artifacts/dungeon-rpg run build
      - name: Verify GitHub Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages
      - name: Write exact deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "$PRODUCT_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4

  verify_live:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    timeout-minutes: 20
    steps:
      - name: Verify fixed test link serves exact merge commit
        shell: bash
        run: |
          set -euo pipefail
          marker_url="${PAGE_URL}deployment.json"
          for attempt in $(seq 1 90); do
            body="$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$marker_url" 2>/dev/null || true)"
            served="$(printf '%s' "$body" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{process.stdout.write(String(JSON.parse(s).commit||''))}catch{}})")"
            if [ "$served" = "$PRODUCT_SHA" ]; then
              curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PAGE_URL" > /tmp/dungeon-veil-index.html
              grep -q '/DungeonVeil/' /tmp/dungeon-veil-index.html
              echo "Verified live product commit $served"
              exit 0
            fi
            sleep 10
          done
          exit 1
