name: Deploy Dungeon Veil Test Site

# Deploy review branches to the shared project-root test site.
on:
  push:
    branches:
      - work/blocks-1-7-production-pass
      - 'fix/**'
      - 'work/block-*'
      - test/final-balance-integration
    paths-ignore:
      - '.ci/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-pages
  cancel-in-progress: true

jobs:
  build:
    # The final integration branch requires an explicit deployment approval marker.
    if: github.event_name == 'workflow_dispatch' || github.ref_name != 'test/final-balance-integration' || contains(github.event.head_commit.message, '[deploy-test]')
    runs-on: ubuntu-latest
    timeout-minutes: 65
    outputs:
      product_sha: ${{ steps.product.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve product commit
        id: product
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for required integration validations
        if: github.ref_name == 'test/final-balance-integration'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const required = ['Dungeon RPG CI', 'Dungeon RPG Check', 'Full Game Regression'];
            const failedConclusions = new Set(['failure', 'cancelled', 'timed_out', 'action_required', 'stale']);
            const deadline = Date.now() + 50 * 60 * 1000;
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            const { owner, repo } = context.repo;

            while (Date.now() < deadline) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: context.sha,
                per_page: 100,
              });
              const latest = new Map();
              for (const run of data.workflow_runs) {
                if (!required.includes(run.name)) continue;
                const previous = latest.get(run.name);
                if (!previous || new Date(run.created_at) > new Date(previous.created_at)) latest.set(run.name, run);
              }

              const states = required.map(name => {
                const run = latest.get(name);
                return { name, status: run?.status || 'missing', conclusion: run?.conclusion || null };
              });
              core.info(`Validation states: ${JSON.stringify(states)}`);

              const failed = states.find(state => state.status === 'completed' && failedConclusions.has(state.conclusion));
              if (failed) throw new Error(`${failed.name} finished with ${failed.conclusion}`);

              if (states.every(state => state.status === 'completed' && state.conclusion === 'success')) {
                core.info(`All required validations passed for ${context.sha}`);
                return;
              }
              await sleep(30_000);
            }
            throw new Error(`Timed out waiting for required validations on ${context.sha}`);

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Asset audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets

      - name: Coop solo balance isolation audit
        run: node artifacts/dungeon-rpg/scripts/validate-coop-solo-balance-isolation.mjs

      - name: Coop lobby foundation audit
        run: node artifacts/dungeon-rpg/scripts/validate-coop-lobby-foundation.mjs

      - name: Coop realtime presence audit
        run: node artifacts/dungeon-rpg/scripts/validate-coop-realtime-presence.mjs

      - name: Mage ranged combat audit
        run: node artifacts/dungeon-rpg/scripts/validate-mage-ranged-combat.mjs

      - name: Core room audit suite
        run: node artifacts/dungeon-rpg/scripts/run-room-audit-suite.mjs

      - name: Boss room telegraphs and meadow audit
        run: node artifacts/dungeon-rpg/scripts/validate-boss-room-telegraphs-and-meadow.mjs

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build Dungeon Veil for GitHub Pages
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.product.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Verify GitHub Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages

      - name: Write deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s"}\n' "${{ steps.product.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json

      - name: Disable Jekyll processing
        run: touch artifacts/dungeon-rpg/dist/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  record-pages:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Record deployment result on review branch
        uses: actions/github-script@v7
        env:
          PRODUCT_SHA: ${{ needs.build.outputs.product_sha }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const path = '.ci/dungeon-veil-pages-status.json';
            const productSha = process.env.PRODUCT_SHA || context.sha;
            const success = process.env.BUILD_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success';
            const marker = {
              workflow: 'Deploy Dungeon Veil Test Site',
              branch,
              status: success ? 'success' : 'failure',
              attemptedCommit: productSha,
              deployedCommit: success ? productSha : null,
              validationResult: process.env.BUILD_RESULT,
              deploymentResult: process.env.DEPLOY_RESULT,
              pageUrl: process.env.PAGE_URL || 'https://ys2mm422yb-max.github.io/DungeonVeil/',
              workflowRunId: context.runId,
              workflowRunAttempt: context.runAttempt,
              completedAt: new Date().toISOString(),
            };
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha,
              message: `Record Dungeon Veil deployment ${success ? 'success' : 'failure'} for ${productSha.slice(0, 7)}`,
              content: Buffer.from(JSON.stringify(marker, null, 2) + '\n').toString('base64'),
            });
