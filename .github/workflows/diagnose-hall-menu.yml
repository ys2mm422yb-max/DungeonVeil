name: Diagnose Hall Menu

on:
  push:
    branches: [fix/main-menu-hall-of-veil-v4]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Hall audit only
        run: node artifacts/dungeon-rpg/scripts/validate-main-menu-equipped-ranger.mjs
