name: Apply final loading continuity and portal patch

# final commit diagnostics v3
on:
  push:
    branches:
      - fix/loading-continuity-violet-portals-final
    paths:
      - .github/workflows/apply-loading-continuity-final.yml
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    types: [opened, synchronize]
    paths:
      - .github/workflows/apply-loading-continuity-final.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/loading-continuity-violet-portals-final
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Apply focused patch
        run: node .github/scripts/apply-loading-continuity-final.mjs
      - name: Validate loading and portal continuity
        working-directory: artifacts/dungeon-rpg
        run: |
          node scripts/validate-loading-transitions.mjs
          pnpm typecheck
          pnpm build
      - name: Commit game changes
        id: commit
        continue-on-error: true
        run: |
          set -o pipefail
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git status --short
            git add artifacts/dungeon-rpg
            git diff --cached --check
            git commit -m "Prevent active-run reloads and upgrade violet portals"
            git pull --rebase origin fix/loading-continuity-violet-portals-final
            git push origin HEAD:fix/loading-continuity-violet-portals-final
          } 2>&1 | tee /tmp/loading-final-commit.log
      - name: Upload commit diagnostics
        if: steps.commit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: loading-final-commit-error
          path: /tmp/loading-final-commit.log
          retention-days: 1
      - name: Fail after commit diagnostics
        if: steps.commit.outcome == 'failure'
        run: exit 1
