name: Public Testlink Main Menu Proof

on:
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-public-testlink:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout validation script
        uses: actions/checkout@v4
      - name: Verify deployed main-menu bundle
        shell: bash
        run: bash .github/scripts/verify-public-testlink-main-menu.sh
