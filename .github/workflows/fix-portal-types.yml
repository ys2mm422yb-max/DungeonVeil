name: Apply portal type annotations

on:
  push:
    branches:
      - fix/loading-continuity-violet-portals
    paths:
      - .github/workflows/fix-portal-types.yml
  pull_request:
    branches:
      - fix/mobile-telegraphs-room-21-50-balance
    types: [opened, synchronize]
    paths:
      - .github/workflows/fix-portal-types.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/loading-continuity-violet-portals
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply type annotations
        run: node .github/scripts/fix-portal-types.mjs
      - name: Commit renderer type fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/components/GameCanvasKayKit3D.tsx
          git diff --cached --check
          git commit -m "Type portal visual collections"
          git push origin HEAD:fix/loading-continuity-violet-portals
