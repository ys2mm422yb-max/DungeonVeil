name: Dungeon Veil Round 3 Device Review Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - '.github/workflows/round3-device-review-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-device-review-pages
  cancel-in-progress: true

jobs:
  validate-and-build:
    if: github.head_ref == 'verify/mobile-fixes-round3'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      reviewed_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - run: pnpm --filter @workspace/dungeon-rpg audit:rooms
      - run: pnpm run typecheck
      - name: Build GitHub Pages application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.commit.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build
      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages
      - name: Write deployment marker
        run: |
          printf '{"commit":"%s","deployedAt":"%s","purpose":"round3-device-review"}\n' "${{ steps.commit.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public
  deploy:
    runs-on: ubuntu-latest
    needs: validate-and-build
    steps:
      - uses: actions/deploy-pages@v4
