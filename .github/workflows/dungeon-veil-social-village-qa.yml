name: Dungeon Veil Social Village QA

on:
  push:
    branches: [work/blocks-1-7-production-pass]
    paths: ['.github/workflows/dungeon-veil-social-village-qa.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dungeon-veil-social-village-qa
  cancel-in-progress: true

jobs:
  mobile-social-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact product branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass

      - name: Resolve tested product commit
        id: product
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        id: install
        run: pnpm install --frozen-lockfile

      - name: Validate social progression
        id: social
        run: pnpm --filter @workspace/dungeon-rpg audit:social

      - name: Typecheck workspace
        id: typecheck
        run: pnpm run typecheck

      - name: Build QA site
        id: build
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Install mobile browsers
        id: browsers
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium webkit

      - name: Serve QA site
        id: serve
        shell: bash
        run: |
          mkdir -p /tmp/dv-social/DungeonVeil artifacts/dungeon-rpg/visual-qa
          cp -a artifacts/dungeon-rpg/dist/public/. /tmp/dv-social/DungeonVeil/
          python3 -m http.server 4173 --directory /tmp/dv-social >/tmp/dv-social-server.log 2>&1 &
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/DungeonVeil/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/dv-social-server.log
          exit 1

      - name: Capture iPhone village
        id: menu_iphone
        run: pnpm dlx playwright@1.55.0 screenshot --browser=webkit --device="iPhone 13" --color-scheme=dark --wait-for-timeout=9000 "http://127.0.0.1:4173/DungeonVeil/?qa=menu" artifacts/dungeon-rpg/visual-qa/village-iphone.png

      - name: Capture Android village
        id: menu_android
        run: pnpm dlx playwright@1.55.0 screenshot --browser=chromium --device="Pixel 7" --color-scheme=dark --wait-for-timeout=9000 "http://127.0.0.1:4173/DungeonVeil/?qa=menu" artifacts/dungeon-rpg/visual-qa/village-android.png

      - name: Capture iPhone tutorial
        id: tutorial_iphone
        run: pnpm dlx playwright@1.55.0 screenshot --browser=webkit --device="iPhone 13" --color-scheme=dark --wait-for-timeout=3000 "http://127.0.0.1:4173/DungeonVeil/?qa=tutorial" artifacts/dungeon-rpg/visual-qa/tutorial-iphone.png

      - name: Capture Android tutorial
        id: tutorial_android
        run: pnpm dlx playwright@1.55.0 screenshot --browser=chromium --device="Pixel 7" --color-scheme=dark --wait-for-timeout=3000 "http://127.0.0.1:4173/DungeonVeil/?qa=tutorial" artifacts/dungeon-rpg/visual-qa/tutorial-android.png

      - name: Validate screenshot evidence
        id: validate
        shell: bash
        run: |
          for image in artifacts/dungeon-rpg/visual-qa/village-iphone.png artifacts/dungeon-rpg/visual-qa/village-android.png artifacts/dungeon-rpg/visual-qa/tutorial-iphone.png artifacts/dungeon-rpg/visual-qa/tutorial-android.png; do
            test -s "$image"
            test "$(stat -c%s "$image")" -gt 20000
          done
          file artifacts/dungeon-rpg/visual-qa/*.png

      - name: Create review thumbnails
        id: thumbnails
        shell: bash
        run: |
          python3 -m pip install --quiet pillow
          python3 <<'PY'
          from pathlib import Path
          from PIL import Image
          root = Path('artifacts/dungeon-rpg/visual-qa')
          for source in root.glob('*.png'):
              image = Image.open(source).convert('RGB')
              image.thumbnail((300, 640), Image.Resampling.LANCZOS)
              image.save(source.with_name(source.stem + '-thumb.jpg'), quality=56, optimize=True, progressive=True)
          PY

      - name: Upload social visual QA evidence
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-social-village-qa-${{ steps.product.outputs.sha }}
          path: artifacts/dungeon-rpg/visual-qa/*
          retention-days: 14

      - name: Publish screenshots and exact marker
        uses: actions/github-script@v7
        env:
          PRODUCT_SHA: ${{ steps.product.outputs.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            const names = [
              'village-iphone.png', 'village-android.png',
              'tutorial-iphone.png', 'tutorial-android.png',
              'village-iphone-thumb.jpg', 'village-android-thumb.jpg',
              'tutorial-iphone-thumb.jpg', 'tutorial-android-thumb.jpg',
            ];

            async function write(path, buffer, message) {
              let sha;
              try {
                const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(current.data)) sha = current.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch, sha, message,
                content: buffer.toString('base64'),
              });
            }

            const screenshots = [];
            const sizes = {};
            for (const name of names) {
              const local = `artifacts/dungeon-rpg/visual-qa/${name}`;
              if (!fs.existsSync(local)) continue;
              const remote = `.ci/visual-qa/${name}`;
              await write(remote, fs.readFileSync(local), `Record ${name} for ${process.env.PRODUCT_SHA.slice(0, 7)}`);
              screenshots.push(remote);
              sizes[name] = fs.statSync(local).size;
            }

            const marker = {
              workflow: 'Dungeon Veil Social Village QA',
              status: 'success',
              validatedCommit: process.env.PRODUCT_SHA,
              outcomes: {
                install: 'success', socialAudit: 'success', typecheck: 'success', build: 'success',
                browsers: 'success', serve: 'success', menuIphone: 'success', menuAndroid: 'success',
                tutorialIphone: 'success', tutorialAndroid: 'success', validate: 'success', thumbnails: 'success', upload: 'success',
              },
              screenshots,
              sizes,
              completedAt: new Date().toISOString(),
            };
            await write(
              '.ci/dungeon-veil-social-visual-qa.json',
              Buffer.from(JSON.stringify(marker, null, 2) + '\n'),
              `Record social village QA success for ${process.env.PRODUCT_SHA.slice(0, 7)}`,
            );
