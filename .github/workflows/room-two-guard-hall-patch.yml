name: Temporary Room Two Guard Hall Patch

on:
  push:
    branches: [rework/room-two-guard-command-hall]
    paths:
      - '.ci/room-two-guard-hall-trigger.txt'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rework/room-two-guard-command-hall
      - name: Wire room two guard hall into theme builder
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('artifacts/dungeon-rpg/src/components/kaykitRoomThemes3D.ts')
          text = path.read_text()
          import_marker = "import { roomPropDisplayScale, roomPropScaleClass } from '../game/propPresentation3D';"
          import_line = "import { buildRoomTwoGuardCommandHall } from './roomTwoGuardCommandHall3D';"
          if import_line not in text:
              text = text.replace(import_marker, import_marker + "\n" + import_line, 1)

          build_marker = "  addRoomHeroEffects(THREE, root, room);\n  bindEnvironmentDriver(THREE, root, spec);"
          build_replacement = "  addRoomHeroEffects(THREE, root, room);\n  const roomTwoGuardHall = room === 2 ? buildRoomTwoGuardCommandHall(THREE) : null;\n  if (roomTwoGuardHall) root.add(roomTwoGuardHall);\n  bindEnvironmentDriver(THREE, root, spec);"
          if 'const roomTwoGuardHall = room === 2' not in text:
              if build_marker not in text:
                  raise SystemExit('room theme build marker missing')
              text = text.replace(build_marker, build_replacement, 1)

          dispose_marker = "    outer.userData?.dispose?.();"
          dispose_replacement = "    roomTwoGuardHall?.userData?.dispose?.();\n    outer.userData?.dispose?.();"
          if 'roomTwoGuardHall?.userData?.dispose?.();' not in text:
              if dispose_marker not in text:
                  raise SystemExit('room theme dispose marker missing')
              text = text.replace(dispose_marker, dispose_replacement, 1)
          path.write_text(text)

          audit = Path('artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs')
          text = audit.read_text()
          marker = "const errors = [];"
          insertion = """const guardHallSource = await readFile(new URL('../src/components/roomTwoGuardCommandHall3D.ts', import.meta.url), 'utf8');\nconst themeSource = await readFile(new URL('../src/components/kaykitRoomThemes3D.ts', import.meta.url), 'utf8');\n"""
          if 'guardHallSource' not in text:
              if marker not in text:
                  raise SystemExit('production room audit marker missing')
              text = text.replace(marker, insertion + marker, 1)
          final_marker = "if (errors.length) {"
          checks = """if (!guardHallSource.includes("root.name = 'RoomTwoGuardCommandHall'") || !guardHallSource.includes("'RoomTwoGuardGate'") || !guardHallSource.includes("'RoomTwoShieldDisplayLeft'")) errors.push('Room 2 guard command hall staging is missing');\nif (!themeSource.includes('room === 2 ? buildRoomTwoGuardCommandHall(THREE) : null')) errors.push('Room 2 guard hall is not wired into the theme builder');\n\n"""
          if 'Room 2 guard command hall staging is missing' not in text:
              if final_marker not in text:
                  raise SystemExit('production room audit final marker missing')
              text = text.replace(final_marker, checks + final_marker, 1)
          audit.write_text(text)
          PY
      - name: Commit clean scoped result
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/room-two-guard-hall-patch.yml .ci/room-two-guard-hall-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/components/kaykitRoomThemes3D.ts artifacts/dungeon-rpg/src/components/roomTwoGuardCommandHall3D.ts artifacts/dungeon-rpg/scripts/validate-production-rooms.mjs
          git commit -m "Stage room two as a fortified guard command hall"
          git push origin HEAD:rework/room-two-guard-command-hall
