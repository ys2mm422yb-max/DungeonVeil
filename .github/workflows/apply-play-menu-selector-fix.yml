name: Apply Play menu selector fix

on:
  push:
    branches:
      - fix/play-mode-menu-deploy-status
    paths:
      - .github/workflows/apply-play-menu-selector-fix.yml

permissions:
  contents: write

jobs:
  patch-selector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/play-mode-menu-deploy-status
          fetch-depth: 0

      - name: Patch selector and remove temporary workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('artifacts/dungeon-rpg/tests/full-game-smoke.spec.mjs')
          text = path.read_text(encoding='utf-8')
          old = "    await openMenuButton(page, /Weltboss|World Boss/i);"
          new = "    await clickAnimatedUi(page.getByRole('button', { name: /Weltboss|World Boss/i }).last());"
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one world-boss selector, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          rm .github/workflows/apply-play-menu-selector-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/tests/full-game-smoke.spec.mjs .github/workflows/apply-play-menu-selector-fix.yml
          git commit -m "Scope world boss browser selector to Play overlay"
          git push origin HEAD:fix/play-mode-menu-deploy-status
