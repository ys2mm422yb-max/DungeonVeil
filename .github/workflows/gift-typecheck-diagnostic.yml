name: Gift Typecheck Diagnostic

on:
  pull_request:
    branches:
      - main
      - 'fix/**'
      - 'work/**'

permissions:
  contents: read

jobs:
  capture-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture TypeScript output
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm --dir artifacts/dungeon-rpg typecheck > gift-typecheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: gift-typecheck-log
          path: gift-typecheck.log
          if-no-files-found: error
      - name: Preserve typecheck result
        if: steps.typecheck.outputs.status != '0'
        run: exit 1
