name: Apply heavy fireball pass

on:
  push:
    branches: [rework/worldboss-heavy-fireball]
    paths: ['.github/workflows/apply-heavy-fireball.yml']

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply validated boss base and heavy fireball visuals
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin rework/worldboss-fireball-wing-pass
          for path in \
            artifacts/dungeon-rpg/scripts/validate-mobile-combat.mjs \
            artifacts/dungeon-rpg/scripts/validate-social-navigation.mjs \
            artifacts/dungeon-rpg/scripts/validate-worldboss-performance.mjs \
            artifacts/dungeon-rpg/src/components/WorldBossAggressiveStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossBattleScreen.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossCohesiveStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossCombatBandStage.tsx \
            artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx \
            artifacts/dungeon-rpg/src/components/worldBossMobileVisual3D.ts \
            artifacts/dungeon-rpg/src/game/runEngine.ts; do
            git checkout origin/rework/worldboss-fireball-wing-pass -- "$path"
          done
          python3 - <<'PY'
          from pathlib import Path

          stage = Path('artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx')
          text = stage.read_text()
          text = text.replace(
              "type ProjectileSlot = { mesh: any; material: any };",
              "type ProjectileSlot = { mesh: any; material: any; fireCore: any; fireGlow: any; fireMaterial: any; glowMaterial: any };"
          )
          text = text.replace(
              """    const buildProjectilePool = () => {\n      const geometry = keepGeometry(new THREE.CapsuleGeometry(0.05, 0.5, 3, 6));\n      for (let index = 0; index < MAX_PROJECTILES; index++) {\n        const material = keepMaterial(new THREE.MeshBasicMaterial({ color: 0xf4d7a3, transparent: true, opacity: 0.9, depthWrite: false }));\n        const mesh = new THREE.Mesh(geometry, material);\n        mesh.visible = false;\n        scene.add(mesh);\n        projectileSlots.push({ mesh, material });\n      }\n    };""",
              """    const buildProjectilePool = () => {\n      const arrowGeometry = keepGeometry(new THREE.CapsuleGeometry(0.05, 0.5, 3, 6));\n      const fireCoreGeometry = keepGeometry(new THREE.IcosahedronGeometry(0.42, 1));\n      const fireGlowGeometry = keepGeometry(new THREE.SphereGeometry(0.72, 14, 10));\n      for (let index = 0; index < MAX_PROJECTILES; index++) {\n        const material = keepMaterial(new THREE.MeshBasicMaterial({ color: 0xf4d7a3, transparent: true, opacity: 0.9, depthWrite: false }));\n        const mesh = new THREE.Mesh(arrowGeometry, material);\n        const fireMaterial = keepMaterial(new THREE.MeshBasicMaterial({ color: 0xff7a20, transparent: true, opacity: 0.98, depthWrite: false }));\n        const glowMaterial = keepMaterial(new THREE.MeshBasicMaterial({ color: 0xff2f0a, transparent: true, opacity: 0.34, depthWrite: false, blending: THREE.AdditiveBlending }));\n        const fireCore = new THREE.Mesh(fireCoreGeometry, fireMaterial);\n        const fireGlow = new THREE.Mesh(fireGlowGeometry, glowMaterial);\n        mesh.visible = false;\n        fireCore.visible = false;\n        fireGlow.visible = false;\n        scene.add(mesh, fireGlow, fireCore);\n        projectileSlots.push({ mesh, material, fireCore, fireGlow, fireMaterial, glowMaterial });\n      }\n    };"""
          )
          text = text.replace(
              "projectileSlots.forEach(slot => { slot.mesh.visible = false; });",
              "projectileSlots.forEach(slot => { slot.mesh.visible = false; slot.fireCore.visible = false; slot.fireGlow.visible = false; });"
          )
          old = """        slot.mesh.visible = true;\n        slot.mesh.position.set(mapX(effect.x) + Math.cos(angle) * travel * progress, bossShot ? 1.55 : 1.0, mapZ(effect.y) + Math.sin(angle) * travel * progress);\n        slot.mesh.rotation.set(Math.PI / 2, -angle, 0);\n        slot.material.color.set(bossShot ? effect.color : '#d8b77a');\n        slot.material.opacity = Math.max(0.25, 0.9 - progress * 0.48);\n        slot.mesh.scale.setScalar(bossShot ? 1.35 : 0.88 + Math.sin(now * 0.018 + slotIndex) * 0.08);"""
          new = """        const projectileX = mapX(effect.x) + Math.cos(angle) * travel * progress;\n        const projectileZ = mapZ(effect.y) + Math.sin(angle) * travel * progress;\n        if (bossShot) {\n          const pulse = 1 + Math.sin(now * 0.024 + slotIndex) * 0.14;\n          slot.fireCore.visible = true;\n          slot.fireGlow.visible = true;\n          slot.fireCore.position.set(projectileX, 1.72, projectileZ);\n          slot.fireGlow.position.copy(slot.fireCore.position);\n          slot.fireCore.rotation.set(now * 0.003, -angle, now * 0.004);\n          slot.fireCore.scale.setScalar(1.55 * pulse);\n          slot.fireGlow.scale.setScalar(1.72 + pulse * 0.28);\n          slot.fireMaterial.color.set('#ff9a32');\n          slot.fireMaterial.opacity = Math.max(0.68, 1 - progress * 0.24);\n          slot.glowMaterial.opacity = Math.max(0.16, 0.42 - progress * 0.16);\n        } else {\n          slot.mesh.visible = true;\n          slot.mesh.position.set(projectileX, 1.0, projectileZ);\n          slot.mesh.rotation.set(Math.PI / 2, -angle, 0);\n          slot.material.color.set('#d8b77a');\n          slot.material.opacity = Math.max(0.25, 0.9 - progress * 0.48);\n          slot.mesh.scale.setScalar(0.88 + Math.sin(now * 0.018 + slotIndex) * 0.08);\n        }"""
          if old not in text:
              raise SystemExit('projectile sync marker not found')
          text = text.replace(old, new)
          stage.write_text(text)

          aggressive = Path('artifacts/dungeon-rpg/src/components/WorldBossAggressiveStage.tsx')
          text = aggressive.read_text()
          text = text.replace('const FIREBALL_HIT_RADIUS = 40;', 'const FIREBALL_HIT_RADIUS = 58;')
          text = text.replace('maxRadius: 58,', 'maxRadius: 88,')
          text = text.replace('radius: 18,', 'radius: 34,')
          text = text.replace('width: 28,', 'width: 64,')
          text = text.replace('Math.round(boss.attack * 0.72 - player.defense * 0.45)', 'Math.round(boss.attack * 0.9 - player.defense * 0.4)')
          aggressive.write_text(text)
          PY
          rm .github/workflows/apply-heavy-fireball.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make dragon fireball visually powerful"
          git push origin HEAD:rework/worldboss-heavy-fireball
