name: One-shot PR 322 real-tap test migration

on:
  push:
    branches:
      - fix/spectator-upgrade-resource-actions-v1
    paths:
      - '.github/workflows/one-shot-pr322-real-taps.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/spectator-upgrade-resource-actions-v1
          fetch-depth: 0
      - name: Replace legacy pointerdown helpers with real taps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('artifacts/dungeon-rpg/tests')
          files = [
              root / 'autopilot-product-journeys.spec.mjs',
              root / 'autopilot-outside-guild.spec.mjs',
              root / 'kaykit-chapter-evidence.spec.mjs',
          ]
          old = "  await locator.dispatchEvent('pointerdown', { pointerType: 'touch', button: 0, isPrimary: true });"
          new = '  await locator.tap();'
          for path in files:
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one legacy helper, found {count}')
              path.write_text(text.replace(old, new, 1))
          PY
          grep -q 'await locator.tap();' artifacts/dungeon-rpg/tests/autopilot-product-journeys.spec.mjs
          grep -q 'await locator.tap();' artifacts/dungeon-rpg/tests/autopilot-outside-guild.spec.mjs
          grep -q 'await locator.tap();' artifacts/dungeon-rpg/tests/kaykit-chapter-evidence.spec.mjs
          ! grep -n "dispatchEvent('pointerdown'" artifacts/dungeon-rpg/tests/autopilot-product-journeys.spec.mjs artifacts/dungeon-rpg/tests/autopilot-outside-guild.spec.mjs artifacts/dungeon-rpg/tests/kaykit-chapter-evidence.spec.mjs
      - name: Commit migration and remove helper
        shell: bash
        run: |
          git rm .github/workflows/one-shot-pr322-real-taps.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add artifacts/dungeon-rpg/tests
          git commit -m 'Use real taps in mobile product journeys'
          git push origin HEAD:fix/spectator-upgrade-resource-actions-v1
