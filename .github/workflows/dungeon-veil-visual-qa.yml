name: Dungeon Veil Mobile Visual QA

# QA trigger for stable ritual arena and social menu 8cd0c88.
on:
  push:
    branches: [main]
    paths: ['.github/workflows/dungeon-veil-visual-qa.yml']
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dungeon-veil-mobile-visual-qa
  cancel-in-progress: true

jobs:
  worldboss-mobile-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout current product branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass

      - name: Resolve tested commit
        id: product
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build QA site
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Install Chromium
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium

      - name: Serve QA site
        shell: bash
        run: |
          mkdir -p /tmp/dungeon-veil-qa/DungeonVeil artifacts/dungeon-rpg/visual-qa
          cp -a artifacts/dungeon-rpg/dist/public/. /tmp/dungeon-veil-qa/DungeonVeil/
          python3 -m http.server 4173 --directory /tmp/dungeon-veil-qa >/tmp/dungeon-veil-qa-server.log 2>&1 &
          echo $! >/tmp/dungeon-veil-qa-server.pid
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/DungeonVeil/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/dungeon-veil-qa-server.log
          exit 1

      - name: Capture iPhone world boss
        run: pnpm dlx playwright@1.55.0 screenshot --device="iPhone 13" --color-scheme=dark --wait-for-timeout=12000 "http://127.0.0.1:4173/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png

      - name: Capture Android world boss
        run: pnpm dlx playwright@1.55.0 screenshot --device="Pixel 7" --color-scheme=dark --wait-for-timeout=12000 "http://127.0.0.1:4173/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-android.png

      - name: Validate screenshots
        shell: bash
        run: |
          test -s artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png
          test -s artifacts/dungeon-rpg/visual-qa/worldboss-android.png
          test "$(stat -c%s artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png)" -gt 70000
          test "$(stat -c%s artifacts/dungeon-rpg/visual-qa/worldboss-android.png)" -gt 70000
          file artifacts/dungeon-rpg/visual-qa/*.png

      - name: Upload visual QA evidence
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-mobile-visual-qa-${{ steps.product.outputs.sha }}
          path: artifacts/dungeon-rpg/visual-qa/*.png
          retention-days: 14

      - name: Publish visual QA evidence and result
        if: success()
        uses: actions/github-script@v7
        env:
          VALIDATED_SHA: ${{ steps.product.outputs.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            async function write(path, buffer, message) {
              let sha;
              try {
                const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(existing.data)) sha = existing.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch, sha, message,
                content: buffer.toString('base64'),
              });
            }

            await write(
              '.ci/visual-qa/worldboss-iphone.png',
              fs.readFileSync('artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png'),
              `Record iPhone world boss visual QA for ${process.env.VALIDATED_SHA.slice(0, 7)}`,
            );
            await write(
              '.ci/visual-qa/worldboss-android.png',
              fs.readFileSync('artifacts/dungeon-rpg/visual-qa/worldboss-android.png'),
              `Record Android world boss visual QA for ${process.env.VALIDATED_SHA.slice(0, 7)}`,
            );

            const payload = {
              workflow: 'Dungeon Veil Mobile Visual QA',
              status: 'success',
              validatedCommit: process.env.VALIDATED_SHA,
              screenshots: ['.ci/visual-qa/worldboss-iphone.png', '.ci/visual-qa/worldboss-android.png'],
              completedAt: new Date().toISOString(),
            };
            await write(
              '.ci/dungeon-veil-visual-qa.json',
              Buffer.from(JSON.stringify(payload, null, 2) + '\n'),
              `Record Dungeon Veil visual QA success for ${process.env.VALIDATED_SHA.slice(0, 7)}`,
            );
