name: Dungeon Veil Mobile Visual QA

# Self-reporting QA trigger for final audited product head 07b1f74.
on:
  push:
    branches: [main]
    paths: ['.github/workflows/dungeon-veil-visual-qa.yml']
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dungeon-veil-mobile-visual-qa
  cancel-in-progress: true

jobs:
  worldboss-mobile-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout current product branch
        uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass

      - name: Resolve tested commit
        id: product
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile

      - name: Build QA site
        id: build
        if: steps.install.outcome == 'success'
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build

      - name: Install Chromium
        id: chromium
        if: steps.build.outcome == 'success'
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium

      - name: Serve QA site
        id: serve
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          mkdir -p /tmp/dungeon-veil-qa/DungeonVeil artifacts/dungeon-rpg/visual-qa
          cp -a artifacts/dungeon-rpg/dist/public/. /tmp/dungeon-veil-qa/DungeonVeil/
          python3 -m http.server 4173 --directory /tmp/dungeon-veil-qa >/tmp/dungeon-veil-qa-server.log 2>&1 &
          echo $! >/tmp/dungeon-veil-qa-server.pid
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/DungeonVeil/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/dungeon-veil-qa-server.log
          exit 1

      - name: Capture iPhone world boss
        id: iphone
        if: steps.chromium.outcome == 'success' && steps.serve.outcome == 'success'
        run: pnpm dlx playwright@1.55.0 screenshot --device="iPhone 13" --color-scheme=dark --wait-for-timeout=12000 "http://127.0.0.1:4173/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png

      - name: Capture Android world boss
        id: android
        if: steps.chromium.outcome == 'success' && steps.serve.outcome == 'success'
        run: pnpm dlx playwright@1.55.0 screenshot --device="Pixel 7" --color-scheme=dark --wait-for-timeout=12000 "http://127.0.0.1:4173/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-android.png

      - name: Validate screenshots
        id: validate
        if: steps.iphone.outcome == 'success' && steps.android.outcome == 'success'
        shell: bash
        run: |
          test -s artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png
          test -s artifacts/dungeon-rpg/visual-qa/worldboss-android.png
          test "$(stat -c%s artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png)" -gt 20000
          test "$(stat -c%s artifacts/dungeon-rpg/visual-qa/worldboss-android.png)" -gt 20000
          file artifacts/dungeon-rpg/visual-qa/*.png

      - name: Upload visual QA evidence
        id: upload
        if: steps.validate.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-mobile-visual-qa-${{ steps.product.outputs.sha }}
          path: artifacts/dungeon-rpg/visual-qa/*.png
          retention-days: 14

      - name: Publish visual QA evidence and result
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATED_SHA: ${{ steps.product.outputs.sha }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          CHROMIUM_OUTCOME: ${{ steps.chromium.outcome }}
          SERVE_OUTCOME: ${{ steps.serve.outcome }}
          IPHONE_OUTCOME: ${{ steps.iphone.outcome }}
          ANDROID_OUTCOME: ${{ steps.android.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            async function write(path, buffer, message) {
              let sha;
              try {
                const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(existing.data)) sha = existing.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch, sha, message,
                content: buffer.toString('base64'),
              });
            }

            const iphonePath = 'artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png';
            const androidPath = 'artifacts/dungeon-rpg/visual-qa/worldboss-android.png';
            const outcomes = {
              install: process.env.INSTALL_OUTCOME,
              build: process.env.BUILD_OUTCOME,
              chromium: process.env.CHROMIUM_OUTCOME,
              serve: process.env.SERVE_OUTCOME,
              iphone: process.env.IPHONE_OUTCOME,
              android: process.env.ANDROID_OUTCOME,
              validate: process.env.VALIDATE_OUTCOME,
              upload: process.env.UPLOAD_OUTCOME,
            };
            const success = ['install', 'build', 'chromium', 'serve', 'iphone', 'android', 'validate', 'upload']
              .every(key => outcomes[key] === 'success');

            if (fs.existsSync(iphonePath)) {
              await write(
                '.ci/visual-qa/worldboss-iphone.png',
                fs.readFileSync(iphonePath),
                `Record iPhone world boss visual QA for ${process.env.VALIDATED_SHA.slice(0, 7)}`,
              );
            }
            if (fs.existsSync(androidPath)) {
              await write(
                '.ci/visual-qa/worldboss-android.png',
                fs.readFileSync(androidPath),
                `Record Android world boss visual QA for ${process.env.VALIDATED_SHA.slice(0, 7)}`,
              );
            }

            const payload = {
              workflow: 'Dungeon Veil Mobile Visual QA',
              status: success ? 'success' : 'failure',
              validatedCommit: process.env.VALIDATED_SHA || null,
              outcomes,
              screenshots: [
                fs.existsSync(iphonePath) ? '.ci/visual-qa/worldboss-iphone.png' : null,
                fs.existsSync(androidPath) ? '.ci/visual-qa/worldboss-android.png' : null,
              ].filter(Boolean),
              sizes: {
                iphone: fs.existsSync(iphonePath) ? fs.statSync(iphonePath).size : 0,
                android: fs.existsSync(androidPath) ? fs.statSync(androidPath).size : 0,
              },
              completedAt: new Date().toISOString(),
            };
            await write(
              '.ci/dungeon-veil-visual-qa.json',
              Buffer.from(JSON.stringify(payload, null, 2) + '\n'),
              `Record Dungeon Veil visual QA ${success ? 'success' : 'failure'} for ${(process.env.VALIDATED_SHA || 'unknown').slice(0, 7)}`,
            );
