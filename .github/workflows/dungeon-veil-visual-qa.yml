name: Dungeon Veil Mobile Visual QA

on:
  push:
    branches: [main]
    paths: ['.github/workflows/dungeon-veil-visual-qa.yml']
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dungeon-veil-mobile-visual-qa
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/blocks-1-7-production-pass
      - id: product
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - id: install
        run: pnpm install --frozen-lockfile
      - id: build
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
        run: pnpm --dir artifacts/dungeon-rpg run build
      - id: browsers
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium webkit
      - id: serve
        shell: bash
        run: |
          mkdir -p /tmp/dv/DungeonVeil artifacts/dungeon-rpg/visual-qa
          cp -a artifacts/dungeon-rpg/dist/public/. /tmp/dv/DungeonVeil/
          python3 -m http.server 4173 --directory /tmp/dv >/tmp/dv-server.log 2>&1 &
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/DungeonVeil/ >/dev/null && exit 0
            sleep 1
          done
          exit 1
      - id: iphone
        continue-on-error: true
        run: pnpm dlx playwright@1.55.0 screenshot --device="iPhone 13" --color-scheme=dark --wait-for-timeout=12000 "http://127.0.0.1:4173/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png
      - id: android
        if: always()
        continue-on-error: true
        run: pnpm dlx playwright@1.55.0 screenshot --device="Pixel 7" --color-scheme=dark --wait-for-timeout=12000 "http://127.0.0.1:4173/DungeonVeil/?qa=worldboss" artifacts/dungeon-rpg/visual-qa/worldboss-android.png
      - id: validate
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          test -s artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png
          test -s artifacts/dungeon-rpg/visual-qa/worldboss-android.png
          test "$(stat -c%s artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png)" -gt 20000
          test "$(stat -c%s artifacts/dungeon-rpg/visual-qa/worldboss-android.png)" -gt 20000
      - id: thumbnails
        if: always() && steps.validate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          python3 -m pip install --quiet pillow
          python3 <<'PY'
          from pathlib import Path
          from PIL import Image
          root = Path('artifacts/dungeon-rpg/visual-qa')
          for name in ('worldboss-iphone', 'worldboss-android'):
              image = Image.open(root / f'{name}.png').convert('RGB')
              image.thumbnail((260, 560), Image.Resampling.LANCZOS)
              image.save(root / f'{name}-thumb.jpg', quality=48, optimize=True, progressive=True)
          PY
      - id: upload
        if: always() && steps.validate.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-mobile-visual-qa-${{ steps.product.outputs.sha }}
          path: artifacts/dungeon-rpg/visual-qa/*
          retention-days: 14
      - if: always()
        uses: actions/github-script@v7
        env:
          PRODUCT_SHA: ${{ steps.product.outputs.sha }}
          INSTALL: ${{ steps.install.outcome }}
          BUILD: ${{ steps.build.outcome }}
          BROWSERS: ${{ steps.browsers.outcome }}
          SERVE: ${{ steps.serve.outcome }}
          IPHONE: ${{ steps.iphone.outcome }}
          ANDROID: ${{ steps.android.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
          THUMBNAILS: ${{ steps.thumbnails.outcome }}
          UPLOAD: ${{ steps.upload.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            async function write(path, data, message) {
              let sha;
              try {
                const result = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(result.data)) sha = result.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch, sha, message,
                content: Buffer.from(data).toString('base64'),
              });
            }
            const local = {
              iphone: 'artifacts/dungeon-rpg/visual-qa/worldboss-iphone.png',
              android: 'artifacts/dungeon-rpg/visual-qa/worldboss-android.png',
              iphoneThumb: 'artifacts/dungeon-rpg/visual-qa/worldboss-iphone-thumb.jpg',
              androidThumb: 'artifacts/dungeon-rpg/visual-qa/worldboss-android-thumb.jpg',
            };
            const remote = {
              iphone: '.ci/visual-qa/worldboss-iphone.png',
              android: '.ci/visual-qa/worldboss-android.png',
              iphoneThumb: '.ci/visual-qa/worldboss-iphone-thumb.jpg',
              androidThumb: '.ci/visual-qa/worldboss-android-thumb.jpg',
            };
            for (const key of Object.keys(local)) {
              if (fs.existsSync(local[key])) await write(remote[key], fs.readFileSync(local[key]), `Record ${key} visual QA for ${process.env.PRODUCT_SHA.slice(0, 7)}`);
            }
            const outcomes = {
              install: process.env.INSTALL,
              build: process.env.BUILD,
              browsers: process.env.BROWSERS,
              serve: process.env.SERVE,
              iphone: process.env.IPHONE,
              android: process.env.ANDROID,
              validate: process.env.VALIDATE,
              thumbnails: process.env.THUMBNAILS,
              upload: process.env.UPLOAD,
            };
            const success = ['install','build','browsers','serve','iphone','android','validate','thumbnails','upload'].every(key => outcomes[key] === 'success');
            const marker = {
              workflow: 'Dungeon Veil Mobile Visual QA',
              status: success ? 'success' : 'failure',
              validatedCommit: process.env.PRODUCT_SHA || null,
              outcomes,
              screenshots: Object.keys(local).filter(key => fs.existsSync(local[key])).map(key => remote[key]),
              sizes: Object.fromEntries(Object.keys(local).map(key => [key, fs.existsSync(local[key]) ? fs.statSync(local[key]).size : 0])),
              completedAt: new Date().toISOString(),
            };
            await write('.ci/dungeon-veil-visual-qa.json', JSON.stringify(marker, null, 2) + '\n', `Record visual QA ${success ? 'success' : 'failure'} for ${(process.env.PRODUCT_SHA || 'unknown').slice(0, 7)}`);
