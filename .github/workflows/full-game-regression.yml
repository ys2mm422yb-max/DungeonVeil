name: Full Game Regression

on:
  push:
    branches: [test/full-game-regression-pass, 'fix/**', 'work/block-*']
    paths:
      - '.github/workflows/full-game-regression.yml'
      - 'artifacts/dungeon-rpg/**'
      - '.ci/full-game-regression-trigger*.txt'
  pull_request:
    branches: [main, 'fix/**', 'work/block-*']
    paths:
      - '.github/workflows/full-game-regression.yml'
      - 'artifacts/dungeon-rpg/**'
      - '.ci/full-game-regression-trigger*.txt'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Verify regression coverage
        continue-on-error: true
        run: node artifacts/dungeon-rpg/scripts/validate-full-game-regression-scope.mjs
      - name: Audit every asset
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Audit all social and menu systems
        id: social-audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @workspace/dungeon-rpg audit:social 2>&1 | tee /tmp/dungeon-veil-social-audit.log
      - name: Upload social audit failure diagnostics
        if: steps.social-audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-social-audit-failure
          retention-days: 7
          path: /tmp/dungeon-veil-social-audit.log
      - name: Fail after social audit diagnostics
        if: steps.social-audit.outcome == 'failure'
        run: exit 1
      - name: Audit rooms 1-50, collision, enemies and mobile combat
        id: room-audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @workspace/dungeon-rpg audit:rooms 2>&1 | tee /tmp/dungeon-veil-room-audit.log
      - name: Upload room audit failure diagnostics
        if: steps.room-audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-room-audit-failure
          retention-days: 7
          path: /tmp/dungeon-veil-room-audit.log
      - name: Fail after room audit diagnostics
        if: steps.room-audit.outcome == 'failure'
        run: exit 1
      - name: Typecheck full workspace
        run: pnpm run typecheck
      - name: Build GitHub Pages production output
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
          grep -q '/DungeonVeil/' artifacts/dungeon-rpg/dist/public/index.html

  browser-regression:
    needs: static-regression
    runs-on: ubuntu-latest
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: iphone-webkit
            browser: webkit
            evidence_name: visual-evidence-iphone-webkit
            screenshot_token: iphone-webkit
          - project: android-chromium
            browser: chromium
            evidence_name: visual-evidence-android-chromium
            screenshot_token: android-chromium
          - project: ipad-landscape-webkit
            browser: webkit
            evidence_name: visual-evidence-ipad-webkit
            screenshot_token: ipad
          - project: desktop-chromium
            browser: chromium
            evidence_name: visual-evidence-desktop-chromium
            screenshot_token: desktop-chromium
    env:
      BROWSER_PROJECT: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Install isolated browser test runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@1.55.0 --lockfile=false
      - name: Install isolated browser engine
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install --with-deps ${{ matrix.browser }}
      - name: Build current branch for browser regression
        run: BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
      - name: Test current branch on isolated device runner
        id: browser-tests
        continue-on-error: true
        env:
          DUNGEON_VEIL_URL: http://127.0.0.1:4173/DungeonVeil/
          BASE_PATH: /DungeonVeil/
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/DungeonVeil/ > /dev/null; then break; fi
            sleep 1
          done
          curl --fail http://127.0.0.1:4173/DungeonVeil/ > /dev/null
          timeout --signal=TERM --kill-after=30s 70m pnpm --dir artifacts/dungeon-rpg exec playwright test --config=playwright.regression.config.mjs --project="$BROWSER_PROJECT" --grep-invert "rooms 1-50 produce stable visual evidence across the full run"
      - name: Build compact Playwright failure summary
        if: steps.browser-tests.outcome == 'failure'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const project = process.env.BROWSER_PROJECT || 'unknown-project';
          const path = 'artifacts/dungeon-rpg/test-results/full-game-results.json';
          const marker = `<!-- dungeon-veil-browser-regression-${project} -->`;
          let report;
          try {
            report = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch (error) {
            fs.writeFileSync('/tmp/playwright-failure.md', `${marker}\n## Browser regression failed: ${project}\n\nThe JSON report could not be read: \`${String(error.message).replace(/`/g, "'")}\``);
            process.exit(0);
          }
          const failures = [];
          const walk = (suite, parents = []) => {
            const next = suite.title ? [...parents, suite.title] : parents;
            for (const spec of suite.specs || []) {
              for (const test of spec.tests || []) {
                if (test.status === 'expected' || test.status === 'skipped') continue;
                const result = [...(test.results || [])].reverse().find(item => item.status !== 'passed') || test.results?.at(-1) || {};
                const errors = [...(result.errors || []), ...(result.error ? [result.error] : [])]
                  .map(error => error?.message || error?.value || String(error))
                  .filter(Boolean)
                  .join('\n');
                failures.push({
                  title: [...next, spec.title].filter(Boolean).join(' › '),
                  project: test.projectName || result.projectName || project,
                  status: test.status || result.status || 'failed',
                  errors,
                });
              }
            }
            for (const child of suite.suites || []) walk(child, next);
          };
          for (const suite of report.suites || []) walk(suite);
          const lines = [marker, `## Browser regression failed: ${project}`, '', `Commit: \`${process.env.GITHUB_SHA}\``, `Failures: **${failures.length}**`, ''];
          for (const failure of failures.slice(0, 20)) {
            lines.push(`### ${failure.project}: ${failure.title}`, `Status: \`${failure.status}\``, '', '```text', (failure.errors || 'No detailed error recorded').slice(0, 5000).replace(/```/g, "'''"), '```', '');
          }
          fs.writeFileSync('/tmp/playwright-failure.md', lines.join('\n').slice(0, 60000));
          NODE
      - name: Publish Playwright failure summary to pull request
        if: steps.browser-tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const project = process.env.BROWSER_PROJECT || 'unknown-project';
            const marker = `<!-- dungeon-veil-browser-regression-${project} -->`;
            const body = fs.readFileSync('/tmp/playwright-failure.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const previous = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
      - name: Upload device visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.evidence_name }}
          if-no-files-found: warn
          retention-days: 14
          compression-level: 6
          path: artifacts/dungeon-rpg/test-results/**/*${{ matrix.screenshot_token }}*.png
      - name: Upload browser result manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-game-regression-results-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            artifacts/dungeon-rpg/test-results/full-game-results.json
            /tmp/dungeon-veil-preview.log
      - name: Upload failure traces for device
        if: steps.browser-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: full-game-regression-failure-traces-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 7
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/test-failed-*.png
      - name: Fail browser regression after diagnostics
        if: steps.browser-tests.outcome == 'failure'
        run: exit 1
