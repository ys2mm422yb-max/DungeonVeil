name: Full Game Regression

on:
  workflow_dispatch:
    inputs:
      full_evidence:
        description: Run the complete four-device portrait mobile regression
        required: false
        default: true
        type: boolean
  push:
    branches: [test/full-game-regression-pass, 'fix/**', 'work/block-*']
    paths:
      - '.github/workflows/full-game-regression.yml'
      - 'artifacts/dungeon-rpg/**'
      - '.ci/full-game-regression-trigger*.txt'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, 'fix/**', 'work/block-*']
    paths:
      - '.github/workflows/full-game-regression.yml'
      - 'artifacts/dungeon-rpg/**'
      - '.ci/full-game-regression-trigger*.txt'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_VERSION: '1.55.0'
  BASE_PATH: /DungeonVeil/
  DUNGEON_VEIL_URL: http://127.0.0.1:4173/DungeonVeil/

jobs:
  static-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Verify regression coverage
        run: node artifacts/dungeon-rpg/scripts/validate-full-game-regression-scope.mjs
      - name: Audit every asset
        run: pnpm --filter @workspace/dungeon-rpg audit:assets
      - name: Audit all social and menu systems
        id: social-audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @workspace/dungeon-rpg audit:social 2>&1 | tee /tmp/dungeon-veil-social-audit.log
      - name: Upload social audit failure diagnostics
        if: steps.social-audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-social-audit-failure
          retention-days: 5
          compression-level: 9
          path: /tmp/dungeon-veil-social-audit.log
      - name: Fail after social audit diagnostics
        if: steps.social-audit.outcome == 'failure'
        run: exit 1
      - name: Audit rooms 1-50, collision, enemies and mobile combat
        id: room-audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @workspace/dungeon-rpg audit:rooms 2>&1 | tee /tmp/dungeon-veil-room-audit.log
      - name: Upload room audit failure diagnostics
        if: steps.room-audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-room-audit-failure
          retention-days: 5
          compression-level: 9
          path: /tmp/dungeon-veil-room-audit.log
      - name: Fail after room audit diagnostics
        if: steps.room-audit.outcome == 'failure'
        run: exit 1
      - name: Typecheck full workspace
        run: pnpm run typecheck
      - name: Build GitHub Pages production output once
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg run build
          test -f artifacts/dungeon-rpg/dist/public/index.html
          grep -q '/DungeonVeil/' artifacts/dungeon-rpg/dist/public/index.html
      - name: Reuse production output in browser jobs
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-veil-pages-build-${{ github.sha }}
          retention-days: 1
          compression-level: 9
          path: artifacts/dungeon-rpg/dist/public

  browser-smoke:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.full_evidence != true) ||
      (github.event_name == 'push' && github.ref_name != 'fix/mobile-telegraphs-room-21-50-balance') ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == true)
    needs: static-regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - project: iphone-webkit
            browser: webkit
          - project: android-chromium
            browser: chromium
    env:
      BROWSER_PROJECT: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Install deterministic browser runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@${PLAYWRIGHT_VERSION} --lockfile=false
      - name: Restore browser engine cache
        id: browser-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ matrix.browser }}
      - name: Install browser system dependencies
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install-deps ${{ matrix.browser }}
      - name: Install browser engine
        if: steps.browser-cache.outputs.cache-hit != 'true'
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install ${{ matrix.browser }}
      - name: Download production output
        uses: actions/download-artifact@v4
        with:
          name: dungeon-veil-pages-build-${{ github.sha }}
          path: artifacts/dungeon-rpg/dist/public
      - name: Run compact portrait mobile menu, combat and world-boss smoke
        id: smoke-tests
        continue-on-error: true
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent "$DUNGEON_VEIL_URL" > /dev/null; then break; fi
            sleep 1
          done
          curl --fail "$DUNGEON_VEIL_URL" > /dev/null
          timeout --signal=TERM --kill-after=30s 22m pnpm --dir artifacts/dungeon-rpg exec playwright test \
            tests/full-game-smoke.spec.mjs \
            tests/worldboss-block1.spec.mjs \
            --config=playwright.regression.config.mjs \
            --project="$BROWSER_PROJECT" \
            --grep='new run renders responsive combat controls and stays stable|world boss'
      - name: Upload smoke failure evidence
        if: steps.smoke-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fast-smoke-failure-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 5
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/full-game-results.json
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/test-failed-*.png
            /tmp/dungeon-veil-preview.log
      - name: Fail compact smoke after diagnostics
        if: steps.smoke-tests.outcome == 'failure'
        run: exit 1

  browser-regression:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.full_evidence == true) ||
      (github.event_name == 'push' && github.ref_name == 'fix/mobile-telegraphs-room-21-50-balance') ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    needs: static-regression
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - project: iphone-webkit
            browser: webkit
          - project: android-chromium
            browser: chromium
          - project: ipad-portrait-webkit
            browser: webkit
          - project: android-tablet-chromium
            browser: chromium
    env:
      BROWSER_PROJECT: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Install deterministic browser runner
        run: pnpm --dir artifacts/dungeon-rpg add -D @playwright/test@${PLAYWRIGHT_VERSION} --lockfile=false
      - name: Restore browser engine cache
        id: browser-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ matrix.browser }}
      - name: Install browser system dependencies
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install-deps ${{ matrix.browser }}
      - name: Install browser engine
        if: steps.browser-cache.outputs.cache-hit != 'true'
        run: pnpm --dir artifacts/dungeon-rpg exec playwright install ${{ matrix.browser }}
      - name: Download production output
        uses: actions/download-artifact@v4
        with:
          name: dungeon-veil-pages-build-${{ github.sha }}
          path: artifacts/dungeon-rpg/dist/public
      - name: Test complete non-room regression on current portrait mobile device
        id: browser-tests
        continue-on-error: true
        shell: bash
        run: |
          BASE_PATH=/DungeonVeil/ pnpm --dir artifacts/dungeon-rpg exec vite preview --config vite.config.ts --host 127.0.0.1 --port 4173 > /tmp/dungeon-veil-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent "$DUNGEON_VEIL_URL" > /dev/null; then break; fi
            sleep 1
          done
          curl --fail "$DUNGEON_VEIL_URL" > /dev/null
          GREP_INVERT='rooms 1-50 produce stable visual evidence across the full run|full room visual evidence'
          timeout --signal=TERM --kill-after=30s 65m pnpm --dir artifacts/dungeon-rpg exec playwright test \
            --config=playwright.regression.config.mjs \
            --project="$BROWSER_PROJECT" \
            --grep-invert "$GREP_INVERT"
      - name: Build compact Playwright failure summary
        if: steps.browser-tests.outcome == 'failure'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const project = process.env.BROWSER_PROJECT || 'unknown-project';
          const path = 'artifacts/dungeon-rpg/test-results/full-game-results.json';
          const marker = `<!-- dungeon-veil-browser-regression-${project} -->`;
          let report;
          try {
            report = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch (error) {
            fs.writeFileSync('/tmp/playwright-failure.md', `${marker}\n## Browser regression failed: ${project}\n\nThe JSON report could not be read: \`${String(error.message).replace(/`/g, "'")}\``);
            process.exit(0);
          }
          const failures = [];
          const walk = (suite, parents = []) => {
            const next = suite.title ? [...parents, suite.title] : parents;
            for (const spec of suite.specs || []) {
              for (const test of spec.tests || []) {
                if (test.status === 'expected' || test.status === 'skipped') continue;
                const result = [...(test.results || [])].reverse().find(item => item.status !== 'passed') || test.results?.at(-1) || {};
                const errors = [...(result.errors || []), ...(result.error ? [result.error] : [])]
                  .map(error => error?.message || error?.value || String(error))
                  .filter(Boolean)
                  .join('\n');
                failures.push({
                  title: [...next, spec.title].filter(Boolean).join(' › '),
                  project: test.projectName || result.projectName || project,
                  status: test.status || result.status || 'failed',
                  errors,
                });
              }
            }
            for (const child of suite.suites || []) walk(child, next);
          };
          for (const suite of report.suites || []) walk(suite);
          const lines = [marker, `## Browser regression failed: ${project}`, '', `Commit: \`${process.env.GITHUB_SHA}\``, `Failures: **${failures.length}**`, ''];
          for (const failure of failures.slice(0, 20)) {
            lines.push(`### ${failure.project}: ${failure.title}`, `Status: \`${failure.status}\``, '', '```text', (failure.errors || 'No detailed error recorded').slice(0, 5000).replace(/```/g, "'''"), '```', '');
          }
          fs.writeFileSync('/tmp/playwright-failure.md', lines.join('\n').slice(0, 60000));
          NODE
      - name: Publish Playwright failure summary to pull request
        if: steps.browser-tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const project = process.env.BROWSER_PROJECT || 'unknown-project';
            const marker = `<!-- dungeon-veil-browser-regression-${project} -->`;
            const body = fs.readFileSync('/tmp/playwright-failure.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const previous = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
      - name: Upload compact regression manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-game-regression-results-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 3
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/full-game-results.json
            /tmp/dungeon-veil-preview.log
      - name: Upload failure traces for device
        if: steps.browser-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: full-game-regression-failure-traces-${{ matrix.project }}
          if-no-files-found: warn
          retention-days: 5
          compression-level: 9
          path: |
            artifacts/dungeon-rpg/test-results/**/trace.zip
            artifacts/dungeon-rpg/test-results/**/*.webm
            artifacts/dungeon-rpg/test-results/**/test-failed-*.png
      - name: Fail browser regression after diagnostics
        if: steps.browser-tests.outcome == 'failure'
        run: exit 1
