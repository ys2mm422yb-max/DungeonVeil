name: Apply World Boss Final Polish

on:
  pull_request:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx'
      - 'artifacts/dungeon-rpg/src/components/WorldBossBattleScreen.tsx'
      - '.github/workflows/apply-worldboss-final-polish.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: rework/worldboss-full-3d-arena
          fetch-depth: 0
      - name: Apply final visual polish
        run: |
          python3 - <<'PY'
          from pathlib import Path

          stage_path = Path('artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx')
          stage = stage_path.read_text()
          if 'WorldBossFrontWallClearance_' not in stage:
              marker = '      replacement.name = `WorldBossCleanFloor_${index}`;'
              marker_pos = stage.find(marker)
              if marker_pos < 0:
                  raise SystemExit('front-wall marker not found')
              loop_close = stage.find('    });', marker_pos)
              if loop_close < 0:
                  raise SystemExit('front-wall loop close not found')
              loop_close += len('    });')
              front_wall_block = """
              shell.children.forEach((object: any) => {
                const frontWall = object.userData?.roomOccluder === 'front-wall';
                if (!frontWall || Math.abs(object.position.x) >= 5.2) return;
                object.visible = false;
                object.name = `WorldBossFrontWallClearance_${object.name || 'segment'}`;
              });"""
              stage = stage[:loop_close] + front_wall_block + stage[loop_close:]
              stage_path.write_text(stage)

          battle_path = Path('artifacts/dungeon-rpg/src/components/WorldBossBattleScreen.tsx')
          battle = battle_path.read_text()
          if 'worldboss-compact-status' not in battle:
              start_marker = '      <div className="pointer-events-none absolute inset-x-3 top-[max(12px,calc(env(safe-area-inset-top)+6px))] z-50">'
              end_marker = '\n\n      {!arenaReady'
              start = battle.find(start_marker)
              end = battle.find(end_marker, start)
              if start < 0 or end < 0:
                  raise SystemExit(f'compact HUD markers not found: start={start}, end={end}')
              hud = """      <div data-testid="worldboss-compact-status" className="pointer-events-none absolute inset-x-3 top-[max(10px,calc(env(safe-area-inset-top)+4px))] z-50">
                <div className="mx-auto max-w-md rounded-xl border border-orange-300/22 bg-black/84 px-3 py-2 shadow-xl backdrop-blur-sm">
                  <div className="flex items-center justify-between gap-2">
                    <div className="min-w-0">
                      <div className="text-[6px] font-black uppercase tracking-[.25em] text-orange-200/48">{de ? 'WELTBOSS-ANGRIFF' : 'WORLD BOSS ATTACK'}</div>
                      <div className="truncate text-[13px] font-black text-orange-50">{event.name}</div>
                    </div>
                    <div className="flex shrink-0 items-center gap-1.5">
                      <div className="rounded-full border border-amber-300/22 bg-amber-400/10 px-2.5 py-1 text-[10px] font-black text-amber-100">{arenaReady ? `${seconds}s` : (de ? 'LÄDT' : 'LOAD')}</div>
                      <button type="button" onPointerDown={pointerEvent => { pointerEvent.preventDefault(); closeAndReset(); }} className="pointer-events-auto grid h-7 w-7 place-items-center rounded-full border border-white/10 bg-black/70 text-[11px] font-black text-white/55 active:scale-90">×</button>
                    </div>
                  </div>
                  <div className="mt-1.5 flex items-center gap-2">
                    <span className="w-8 text-[6px] font-black uppercase tracking-[.12em] text-white/38">BOSS</span>
                    <div className="h-2 flex-1 overflow-hidden rounded-full bg-black/70"><div className="h-full bg-gradient-to-r from-red-700 via-orange-500 to-amber-300 transition-[width] duration-100" style={{ width: `${localBossPercent}%` }} /></div>
                    <span className="w-[54px] text-right text-[7px] text-white/42">{Math.max(0, Math.ceil(localBoss?.hp ?? 0))}/{Math.ceil(localBoss?.maxHp ?? 0)}</span>
                  </div>
                  <div className="mt-1 flex items-center gap-2">
                    <span className="w-8 text-[6px] font-black uppercase tracking-[.12em] text-white/28">{de ? 'DU' : 'YOU'}</span>
                    <div className="h-1.5 flex-1 overflow-hidden rounded-full bg-black/70"><div className="h-full bg-emerald-400 transition-[width] duration-100" style={{ width: `${playerPercent}%` }} /></div>
                    <span className="w-[54px] text-right text-[7px] text-white/32">{Math.max(0, Math.ceil(gameState.player.hp))}/{Math.ceil(gameState.player.maxHp)}</span>
                  </div>
                </div>
              </div>"""
              battle = battle[:start] + hud + battle[end:]
              battle = battle.replace(
                  'Der Angriff startet erst, wenn die leichte Bossarena vollständig sichtbar ist.',
                  'Der Angriff startet erst, wenn die Bossarena vollständig sichtbar ist.',
              ).replace(
                  'The attack starts only after the lightweight boss arena is fully visible.',
                  'The attack starts only after the boss arena is fully visible.',
              )
              battle_path.write_text(battle)
          PY
      - name: Commit final polish
        run: |
          if git diff --quiet; then
            echo "No final polish changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/dungeon-rpg/src/components/WorldBossPerspectiveStage.tsx artifacts/dungeon-rpg/src/components/WorldBossBattleScreen.tsx
          git commit -m "Polish world boss framing and compact HUD [worldboss-final-polish]"
          git push origin HEAD:rework/worldboss-full-3d-arena
