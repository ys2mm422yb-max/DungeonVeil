name: Temporary Menu Mobile Diagnostic

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - '.github/workflows/menu-mobile-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/menu-village-visible-mobile'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck and menu audits
        shell: bash
        run: |
          mkdir -p menu-diagnostic
          set +e
          pnpm run typecheck > menu-diagnostic/typecheck.log 2>&1
          echo $? > menu-diagnostic/typecheck.exit
          node artifacts/dungeon-rpg/scripts/validate-social-navigation.mjs > menu-diagnostic/social-navigation.log 2>&1
          echo $? > menu-diagnostic/social-navigation.exit
          node artifacts/dungeon-rpg/scripts/validate-social-progression.mjs > menu-diagnostic/social-progression.log 2>&1
          echo $? > menu-diagnostic/social-progression.exit
          cat menu-diagnostic/typecheck.log
          cat menu-diagnostic/social-navigation.log
          cat menu-diagnostic/social-progression.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: menu-mobile-diagnostic
          path: menu-diagnostic
