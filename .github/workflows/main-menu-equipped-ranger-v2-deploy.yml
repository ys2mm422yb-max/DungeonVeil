name: Main Menu Equipped Ranger V2 Deploy

on:
  push:
    branches: [fix/main-menu-equipped-ranger]
    paths:
      - '.github/workflows/main-menu-equipped-ranger-v2-deploy.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dungeon-veil-main-menu-equipped-ranger-v2
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout exact fix head
        uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve deployment commit
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Full Dungeon Veil audit
        run: pnpm --filter @workspace/dungeon-rpg audit:assets && pnpm --filter @workspace/dungeon-rpg audit:rooms
      - name: Typecheck workspace
        run: pnpm run typecheck
      - name: Build GitHub Pages application
        env:
          BASE_PATH: /DungeonVeil/
          NODE_ENV: production
          VITE_BUILD_SHA: ${{ steps.commit.outputs.sha }}
        run: pnpm --dir artifacts/dungeon-rpg run build
      - name: Verify Pages artifact
        env:
          EXPECTED_BASE_PATH: /DungeonVeil/
        run: pnpm --filter @workspace/dungeon-rpg audit:pages
      - name: Write deployment marker
        shell: bash
        run: |
          printf '{"commit":"%s","deployedAt":"%s","source":"main-menu-equipped-ranger-v2"}\n' "${{ steps.commit.outputs.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > artifacts/dungeon-rpg/dist/public/deployment.json
          touch artifacts/dungeon-rpg/dist/public/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/dungeon-rpg/dist/public

  deploy:
    needs: validate-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  verify-and-clean:
    needs: [validate-and-build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-menu-equipped-ranger
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify fixed live link and self-clean
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.validate-and-build.outputs.sha }}
        run: |
          set -euo pipefail
          verified=0
          for attempt in $(seq 1 24); do
            if curl -fsSL --retry 2 --retry-delay 2 "https://ys2mm422yb-max.github.io/DungeonVeil/deployment.json?verify=${GITHUB_RUN_ID}-${attempt}" -o live-response.json; then
              if python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path('live-response.json').read_text())
          assert data.get('source') == 'main-menu-equipped-ranger-v2', data
          assert data.get('commit') == os.environ['EXPECTED_COMMIT'], data
          PY
              then
                verified=1
                break
              fi
            fi
            sleep 5
          done
          test "$verified" = 1
          rm -f live-response.json .github/workflows/main-menu-equipped-ranger-v2-deploy.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove temporary equipped archer v2 deployment workflow'
          git push origin HEAD:fix/main-menu-equipped-ranger
