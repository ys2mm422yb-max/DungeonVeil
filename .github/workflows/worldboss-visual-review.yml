name: World Boss Visual Review

on:
  push:
    branches: [rework/worldboss-full-3d-arena]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build visual review
        run: pnpm --filter @workspace/dungeon-rpg build
      - name: Install Chromium
        run: npx -y playwright@1.54.2 install --with-deps chromium
      - name: Start preview
        env:
          PORT: 4173
        run: |
          pnpm --filter @workspace/dungeon-rpg serve > /tmp/worldboss-preview.log 2>&1 &
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/worldboss-preview.log
          exit 1
      - name: Capture iPhone and Android
        run: |
          mkdir -p screenshots
          npx -y playwright@1.54.2 screenshot --browser=chromium --device="iPhone 13" --wait-for-timeout=9000 --timeout=45000 "http://127.0.0.1:4173/?qa=worldboss" screenshots/worldboss-iphone13.png
          npx -y playwright@1.54.2 screenshot --browser=chromium --device="Pixel 5" --wait-for-timeout=9000 --timeout=45000 "http://127.0.0.1:4173/?qa=worldboss" screenshots/worldboss-pixel5.png
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: worldboss-mobile-review
          path: screenshots/*.png
          if-no-files-found: error
          retention-days: 3
