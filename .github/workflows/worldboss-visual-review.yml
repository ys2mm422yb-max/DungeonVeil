name: World Boss Visual Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'artifacts/dungeon-rpg/**'
      - '.github/workflows/worldboss-visual-review.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build visual review
        run: pnpm --filter @workspace/dungeon-rpg build
      - name: Install Chromium
        run: npx -y playwright@1.54.2 install --with-deps chromium
      - name: Start preview
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 --directory artifacts/dungeon-rpg/dist/public > /tmp/worldboss-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/worldboss-preview.log
          exit 1
      - name: Capture iPhone and Android
        run: |
          mkdir -p screenshots
          npx -y playwright@1.54.2 screenshot --browser=chromium --viewport-size="390,844" --wait-for-timeout=9000 --timeout=45000 "http://127.0.0.1:4173/?qa=worldboss" screenshots/worldboss-iphone.png
          npx -y playwright@1.54.2 screenshot --browser=chromium --viewport-size="393,851" --wait-for-timeout=9000 --timeout=45000 "http://127.0.0.1:4173/?qa=worldboss" screenshots/worldboss-android.png
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: worldboss-mobile-review
          path: screenshots/*.png
          if-no-files-found: error
          retention-days: 3
