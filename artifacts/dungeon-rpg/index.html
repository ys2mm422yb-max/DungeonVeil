<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Dungeon Veil</title>
    <meta name="description" content="Dungeon Veil — a stylized 3D room-run action roguelite." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Dungeon Veil" />
    <meta property="og:description" content="Dungeon Veil — a stylized 3D room-run action roguelite." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dungeon Veil" />
    <meta name="twitter:description" content="Dungeon Veil — a stylized 3D room-run action roguelite." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; background: #070706; }
      body { overflow: hidden; }
      #dv-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #ead8b7;
        background:
          radial-gradient(circle at 50% 32%, rgba(102, 66, 154, .22), transparent 34%),
          linear-gradient(180deg, #100d0b 0%, #070706 72%);
        font-family: Inter, system-ui, sans-serif;
      }
      #dv-boot > div { text-align: center; }
      #dv-boot strong { display: block; font-size: 28px; letter-spacing: .18em; }
      #dv-boot span { display: block; margin-top: 12px; font-size: 9px; font-weight: 700; letter-spacing: .28em; opacity: .48; }
      #dv-boot i {
        display: block;
        width: 34px;
        height: 34px;
        margin: 22px auto 0;
        border: 2px solid rgba(234, 216, 183, .16);
        border-top-color: rgba(234, 216, 183, .78);
        border-radius: 50%;
        animation: dv-boot-spin .8s linear infinite;
      }
      @keyframes dv-boot-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      (() => {
        try {
          const url = new URL(window.location.href);
          const requestedBuild = url.searchParams.get('dv_build');
          if (requestedBuild && !url.searchParams.has('dv_loaded')) {
            url.searchParams.set('dv_loaded', '1');
            url.searchParams.set('dv_nonce', Date.now().toString(36));
            window.location.replace(url.toString());
          }
        } catch {}
      })();
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"><div id="dv-boot"><div><strong>DUNGEON VEIL</strong><span>SCHLEIER WIRD GEÖFFNET</span><i></i></div></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
