<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#030206"/><stop offset=".45" stop-color="#0b0712"/><stop offset="1" stop-color="#020104"/></linearGradient>
  <linearGradient id="stone" x1="0" x2="1"><stop stop-color="#08070d"/><stop offset=".38" stop-color="#211a2a"/><stop offset=".58" stop-color="#372c43"/><stop offset="1" stop-color="#09070e"/></linearGradient>
  <linearGradient id="stoneFace" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#2a2133"/><stop offset="1" stop-color="#100c17"/></linearGradient>
  <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#4b176d"/><stop offset=".55" stop-color="#260b3f"/><stop offset="1" stop-color="#100617"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#261c2f"/><stop offset=".4" stop-color="#120d18"/><stop offset="1" stop-color="#030205"/></linearGradient>
