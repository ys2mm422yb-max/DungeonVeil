  <g transform="translate(868 740)"><ellipse rx="96" ry="96" fill="url(#torchGlow)"/><path d="M-24 20h48l-7 55h-34z" fill="#17111c" stroke="#8d6737" stroke-width="5"/><path d="M0 25c-34-42 18-55-3-98 54 31 66 73 3 98z" fill="#ffb45b" filter="url(#glowSmall)"/><path d="M3 9c-15-24 8-32 0-55 26 19 27 37 0 55z" fill="#fff0b0"/></g>
