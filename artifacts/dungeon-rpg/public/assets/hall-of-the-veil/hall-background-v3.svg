<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#020107"/><stop offset=".44" stop-color="#090411"/><stop offset="1" stop-color="#020205"/></linearGradient>
  <linearGradient id="stone" x1="0" x2="1"><stop stop-color="#090711"/><stop offset=".32" stop-color="#2c2337"/><stop offset=".55" stop-color="#15101d"/><stop offset=".8" stop-color="#3a2c45"/><stop offset="1" stop-color="#08060d"/></linearGradient>
  <linearGradient id="stoneDark" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#21192b"/><stop offset="1" stop-color="#07050b"/></linearGradient>
  <linearGradient id="gold" x1="0" x2="1"><stop stop-color="#5b3514"/><stop offset=".45" stop-color="#d1a357"/><stop offset=".7" stop-color="#70431a"/><stop offset="1" stop-color="#2a1708"/></linearGradient>
  <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#2d0c49"/><stop offset=".52" stop-color="#160620"/><stop offset="1" stop-color="#09030f"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#21172c"/><stop offset=".45" stop-color="#0e0a14"/><stop offset="1" stop-color="#030205"/></linearGradient>
  <radialGradient id="portalCore" cx="50%" cy="42%" r="62%"><stop stop-color="#6f26c9"/><stop offset=".28" stop-color="#2f0c61"/><stop offset=".58" stop-color="#130328"/><stop offset="1" stop-color="#030105"/></radialGradient>
  <radialGradient id="portalHalo" cx="50%" cy="50%" r="50%"><stop stop-color="#c084fc" stop-opacity=".72"/><stop offset=".38" stop-color="#7c3aed" stop-opacity=".34"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
  <radialGradient id="torchGlow"><stop stop-color="#ffd58a" stop-opacity=".92"/><stop offset=".3" stop-color="#ff8a35" stop-opacity=".42"/><stop offset="1" stop-color="#ff6a00" stop-opacity="0"/></radialGradient>
  <pattern id="masonry" width="96" height="54" patternUnits="userSpaceOnUse"><rect width="96" height="54" fill="#0d0a12"/><path d="M0 1h96M0 53h96M48 1v26M0 27h96M24 27v26M72 27v26" stroke="#2d2435" stroke-width="2" opacity=".42"/></pattern>
  <pattern id="floorTile" width="120" height="120" patternUnits="userSpaceOnUse"><rect width="120" height="120" fill="#0b0810"/><path d="M0 0h120v120H0z" fill="none" stroke="#3f334b" stroke-width="3"/><path d="M60 0v120M0 60h120" stroke="#201827" stroke-width="2"/></pattern>
  <filter id="glowSmall"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glowLarge"><feGaussianBlur stdDeviation="22" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="mist"><feGaussianBlur stdDeviation="28"/></filter>
</defs>
<rect width="1080" height="1920" fill="url(#sky)"/>
<rect y="80" width="1080" height="1180" fill="url(#masonry)" opacity=".92"/>

<!-- vaulted ceiling -->
<g fill="none" stroke="url(#stone)" opacity=".98">
  <path d="M-50 500C20 60 260 -80 540 165C820 -80 1060 60 1130 500" stroke-width="92"/>
  <path d="M40 530C85 150 295 15 540 230C785 15 995 150 1040 530" stroke-width="42"/>
  <path d="M140 555C165 245 330 120 540 295C750 120 915 245 940 555" stroke-width="26"/>
</g>
<g fill="none" stroke="#5d466d" opacity=".28" stroke-width="8">
  <path d="M55 455C160 130 320 40 540 220"/><path d="M1025 455C920 130 760 40 540 220"/>
  <path d="M145 480C250 190 375 130 540 275"/><path d="M935 480C830 190 705 130 540 275"/>
</g>

