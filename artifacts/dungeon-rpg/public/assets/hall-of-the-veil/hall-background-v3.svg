  <g transform="translate(910 160)"><rect x="-52" width="104" height="900" rx="24" fill="url(#stone)"/><rect x="-70" y="-18" width="140" height="46" rx="10" fill="url(#gold)"/><rect x="-74" y="858" width="148" height="72" rx="12" fill="url(#stone)"/><path d="M-34 70h68v690h-68z" fill="#0c0911" opacity=".5"/></g>
  <g transform="translate(305 270) scale(.72)"><rect x="-52" width="104" height="850" rx="24" fill="url(#stone)"/><rect x="-70" y="-18" width="140" height="46" rx="10" fill="url(#gold)"/><rect x="-74" y="808" width="148" height="72" rx="12" fill="url(#stone)"/></g>
  <g transform="translate(775 270) scale(.72)"><rect x="-52" width="104" height="850" rx="24" fill="url(#stone)"/><rect x="-70" y="-18" width="140" height="46" rx="10" fill="url(#gold)"/><rect x="-74" y="808" width="148" height="72" rx="12" fill="url(#stone)"/></g>
</g>

<!-- banners -->
<g>
  <g transform="translate(108 285)"><path d="M0 0h142v430l-71 96L0 430z" fill="url(#banner)" stroke="#8c5e25" stroke-width="7"/><path d="M18 20h106v374l-53 72-53-72z" fill="none" stroke="#6f3cd2" stroke-width="3" opacity=".65"/><path d="M71 128l30 49-30 49-30-49z" fill="#9f67ff" filter="url(#glowSmall)"/><path d="M71 238l15 25-15 25-15-25z" fill="#c4b5fd" opacity=".7"/></g>
  <g transform="translate(830 285)"><path d="M0 0h142v430l-71 96L0 430z" fill="url(#banner)" stroke="#8c5e25" stroke-width="7"/><path d="M18 20h106v374l-53 72-53-72z" fill="none" stroke="#6f3cd2" stroke-width="3" opacity=".65"/><path d="M71 128l30 49-30 49-30-49z" fill="#9f67ff" filter="url(#glowSmall)"/><path d="M71 238l15 25-15 25-15-25z" fill="#c4b5fd" opacity=".7"/></g>
</g>

